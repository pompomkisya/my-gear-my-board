<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ユーザーページ — My Gear My Board</title>
<meta name="robots" content="index, follow">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d0d0e;--sf:#151517;--sf2:#1c1c1f;--bd:#272729;--ac:#e8552d;--tx:#eae8e2;--tm:#9a9890;--td:#6e6c68}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh}
header{position:sticky;top:0;z-index:300;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(13,13,14,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.logo-img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.logo-sub{font-size:9px;letter-spacing:2px;color:var(--ac);text-transform:uppercase;margin-top:2px}
.h-right{display:flex;align-items:center;gap:8px}
.back-btn{padding:7px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;font-size:11px;font-weight:600;color:var(--tm);cursor:pointer;transition:all .15s;text-decoration:none;display:flex;align-items:center}
.back-btn:hover{border-color:var(--ac);color:var(--ac)}
.lang-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;color:var(--tm);transition:all .15s}
.lang-btn:hover{border-color:var(--ac);color:var(--ac)}
.page{max-width:680px;margin:0 auto;padding:24px 20px 60px}
.loading{text-align:center;padding:60px;color:var(--td)}
.error-box{text-align:center;padding:60px;color:var(--td)}
/* プロフィール */
.profile-hero{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:24px;margin-bottom:16px;display:flex;gap:16px;align-items:flex-start}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#e85c2f,#b03020);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;flex-shrink:0;border:2px solid var(--bd);overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-info{flex:1;min-width:0}
.profile-username{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:4px}
.profile-bio{font-size:13px;color:var(--tm);margin-bottom:8px;line-height:1.6}
.profile-amp{font-size:12px;color:var(--td);margin-bottom:8px}
.profile-links{display:flex;gap:8px;flex-wrap:wrap}
.profile-link{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;font-size:11px;font-weight:600;color:var(--tm);text-decoration:none;transition:all .15s}
.profile-link:hover{border-color:var(--ac);color:var(--ac)}
/* セクション */
.section-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:16px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;margin-bottom:14px;color:var(--tx)}
/* 投稿一覧 */
.posts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.post-card{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;overflow:hidden;text-decoration:none;color:var(--tx);display:block;transition:border-color .2s}
.post-card:hover{border-color:var(--ac)}
.post-thumb{width:100%;aspect-ratio:4/3;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.3}
.post-thumb img{width:100%;height:100%;object-fit:cover;opacity:1}
.post-card-body{padding:8px}
.post-card-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.post-card-meta{font-size:10px;color:var(--td)}
/* 機材リスト */
.gear-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.gear-item:last-child{border-bottom:none}
.gear-item-info{flex:1;min-width:0}
.gear-item-name{font-size:13px;font-weight:600;margin-bottom:2px}
.gear-item-brand{font-size:11px;color:var(--td)}
.gear-item-price{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ac);font-weight:600;flex-shrink:0}
.gear-total-box{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:12px 14px;margin-top:12px}
.gear-total-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:4px}
.gear-total-row:last-child{margin-bottom:0}
.gear-total-label{color:var(--tm)}
.gear-total-value{color:var(--ac);font-weight:700}
.private-note{text-align:center;padding:24px;font-size:13px;color:var(--td)}
@media(max-width:480px){.posts-grid{grid-template-columns:1fr}.profile-hero{flex-direction:column;align-items:center;text-align:center}.profile-links{justify-content:center}}
</style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <img class="logo-img" src="/IMG_0206.PNG" alt="MGMB" onerror="this.style.display='none'">
    <div>
      <div class="logo-main">MY GEAR MY BOARD</div>
      <div class="logo-sub" id="logo-sub">ペダルボードSNS</div>
    </div>
  </a>
  <div class="h-right">
    <a class="back-btn" href="/" id="back-btn">← ホーム</a>
    <div class="lang-btn" onclick="toggleLang()">🌐 <span id="lang-label">EN</span></div>
  </div>
</header>
<div class="page">
  <div id="content"><div class="loading">読み込み中...</div></div>
</div>
<script>
const SUPABASE_URL='https://yzqfockzgyfjmngygbhp.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cWZvY2t6Z3lmam1uZ3lnYmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxODksImV4cCI6MjA4OTY3MjE4OX0.Cn4UMJ8y6CHuIMDeFEShej4t1p4syweLgo5ZXZNs-_g';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function detectLang(){const saved=localStorage.getItem('mgmb_lang');if(saved)return saved;const bl=navigator.language||'ja';return bl.toLowerCase().startsWith('ja')?'ja':'en';}
let lang=detectLang();

const I18N={
  ja:{logoSub:'ペダルボードSNS',backBtn:'← ホーム',langLabel:'EN',
    notFound:'ユーザーが見つかりませんでした',backHome:'← ホームに戻る',
    sectionPosts:'投稿一覧',sectionGear:'機材リスト',
    gearPrivate:'このユーザーの機材リストは非公開です',
    gearEmpty:'機材が登録されていません',
    noPosts:'まだ投稿がありません',
    totalJpy:'円合計',totalUsd:'ドル合計',
    gearSortLabel:'並べ替え：',
    gearSortDefault:'登録順',gearSortDateAsc:'購入日（古い順）',gearSortDateDesc:'購入日（新しい順）',
    gearSortPriceAsc:'金額（安い順）',gearSortPriceDesc:'金額（高い順）',
    gearSortNameAsc:'名前（A→Z）',gearSortNameDesc:'名前（Z→A）',
    ampLabel:'使用アンプ：',
    untitled:'無題のボード',anon:'匿名'},
  en:{logoSub:'Pedalboard SNS',backBtn:'← Home',langLabel:'JA',
    notFound:'User not found',backHome:'← Back to Home',
    sectionPosts:'Posts',sectionGear:'Gear List',
    gearPrivate:'This user\'s gear list is private',
    gearEmpty:'No gear registered',
    noPosts:'No posts yet',
    totalJpy:'JPY Total',totalUsd:'USD Total',
    gearSortLabel:'Sort: ',
    gearSortDefault:'Default',gearSortDateAsc:'Date (oldest)',gearSortDateDesc:'Date (newest)',
    gearSortPriceAsc:'Price (low→high)',gearSortPriceDesc:'Price (high→low)',
    gearSortNameAsc:'Name (A→Z)',gearSortNameDesc:'Name (Z→A)',
    ampLabel:'Amp: ',
    untitled:'Untitled Board',anon:'Anonymous'}
};
function tr(key){return(I18N[lang]||I18N.ja)[key]||I18N.ja[key]||key;}

function applyLang(){
  document.getElementById('logo-sub').textContent=tr('logoSub');
  document.getElementById('back-btn').textContent=tr('backBtn');
  document.getElementById('lang-label').textContent=tr('langLabel');
}
function toggleLang(){lang=lang==='ja'?'en':'ja';localStorage.setItem('mgmb_lang',lang);applyLang();loadUser();}

function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function timeAgo(ts){const d=Math.floor((Date.now()-new Date(ts))/1000);if(lang==='en'){if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}if(d<60)return'たった今';if(d<3600)return Math.floor(d/60)+'分前';if(d<86400)return Math.floor(d/3600)+'時間前';return Math.floor(d/86400)+'日前';}

async function loadUser(){
  const params=new URLSearchParams(window.location.search);
  const username=params.get('username');
  if(!username){showError(tr('notFound'));return;}

  // ユーザー情報取得（メールアドレス・password_hashは取得しない）
  const{data:user}=await sb.from('users')
    .select('id,username,bio,amp,x_url,instagram_url,avatar_url,gear_list_public,created_at')
    .eq('username',username).maybeSingle();

  if(!user){showError(tr('notFound'));return;}

  document.title=`${user.username} — My Gear My Board`;

  // 投稿・機材を並列取得
  const[postsRes,gearRes]=await Promise.all([
    sb.from('posts').select('id,title,image_urls,likes,created_at,post_type').eq('user_id',user.id).order('created_at',{ascending:false}).limit(12),
    user.gear_list_public
      ? sb.from('user_gear').select('*').eq('user_id',user.id).order('sort_order').order('created_at')
      : Promise.resolve({data:null})
  ]);

  const posts=postsRes.data||[];
  const gear=gearRes.data||null;

  renderUser(user,posts,gear);
}

function renderUser(user,posts,gear){
  const initial=(user.username||'U')[0].toUpperCase();
  const avatarHtml=user.avatar_url
    ?`<img src="${escHtml(user.avatar_url)}" alt="${escHtml(user.username)}">`
    :initial;

  const linksHtml=[
    user.x_url?`<a class="profile-link" href="${escHtml(user.x_url)}" target="_blank" rel="noopener">𝕏 Twitter</a>`:'',
    user.instagram_url?`<a class="profile-link" href="${escHtml(user.instagram_url)}" target="_blank" rel="noopener">📸 Instagram</a>`:''
  ].filter(Boolean).join('');

  // 投稿セクション
  let postsHtml='';
  if(!posts.length){
    postsHtml=`<div class="private-note">${tr('noPosts')}</div>`;
  }else{
    postsHtml=`<div class="posts-grid">${posts.map(p=>{
      const thumb=p.image_urls&&p.image_urls[0]
        ?`<img src="${escHtml(p.image_urls[0])}" alt="" loading="lazy">`
        :`${p.post_type==='gear'?'🎸':'🎛'}`;
      return`<a href="/post?id=${p.id}" class="post-card">
        <div class="post-thumb">${thumb}</div>
        <div class="post-card-body">
          <div class="post-card-title">${escHtml(p.title||tr('untitled'))}</div>
          <div class="post-card-meta">❤️${p.likes||0} · ${timeAgo(p.created_at)}</div>
        </div>
      </a>`;
    }).join('')}</div>`;
  }

  // 機材セクション
  let gearHtml='';
  if(!user.gear_list_public){
    gearHtml=`<div class="private-note">🔒 ${tr('gearPrivate')}</div>`;
  }else if(!gear||!gear.length){
    gearHtml=`<div class="private-note">${tr('gearEmpty')}</div>`;
  }else{
    let totalJpy=0,totalUsd=0,hasJpy=false,hasUsd=false;
    // 並べ替えセレクト
    const sortSelectHtml=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px">
      <span style="font-family:Noto Sans JP,sans-serif;font-size:11px;color:var(--td)">${tr('gearSortLabel')}</span>
      <select id="user-gear-sort" onchange="applyUserGearSort()"
        style="background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:5px 8px;font-size:11px;color:var(--tx);font-family:Noto Sans JP,sans-serif;outline:none;cursor:pointer">
        <option value="default">${tr('gearSortDefault')}</option>
        <option value="date_asc">${tr('gearSortDateAsc')}</option>
        <option value="date_desc">${tr('gearSortDateDesc')}</option>
        <option value="price_asc">${tr('gearSortPriceAsc')}</option>
        <option value="price_desc">${tr('gearSortPriceDesc')}</option>
        <option value="name_asc">${tr('gearSortNameAsc')}</option>
        <option value="name_desc">${tr('gearSortNameDesc')}</option>
      </select>
    </div>`;
    window._userGearData=gear;
    // ペダルDBとの照合（slugを取得）
    let userPedalSlugMap={};
    if(gear&&gear.length){
      const names=gear.map(g=>g.name).filter(Boolean);
      const{data:pedals}=await sb.from('pedals').select('full_name,slug').in('full_name',names);
      if(pedals)pedals.forEach(p=>{userPedalSlugMap[p.full_name]=p.slug;});
    }
    window._userPedalSlugMap=userPedalSlugMap;
    const items=gear.map(g=>{
      const priceStr=g.price?(g.currency==='USD'?`$${g.price.toLocaleString()}`:`¥${g.price.toLocaleString()}`): '';
      if(g.price){if(g.currency==='USD'){totalUsd+=g.price;hasUsd=true;}else{totalJpy+=g.price;hasJpy=true;}}
      const uSlug=userPedalSlugMap[g.name]||null;
      const uPedalBtn=uSlug?`<a href="/pedal?slug=${uSlug}" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--ac);font-family:'JetBrains Mono',monospace;text-decoration:none;margin-top:4px" onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">🎛 ${lang==='en'?'Pedal detail →':'ペダル詳細ページへ →'}</a>`:'';
      return`<div class="gear-item">
        <div class="gear-item-info">
          <div class="gear-item-name">${escHtml(g.name)}</div>
          ${g.brand?`<div class="gear-item-brand">${escHtml(g.brand)}</div>`:''}
          ${g.memo?`<div style="font-size:11px;color:var(--tm);margin-top:3px">${escHtml(g.memo)}</div>`:''}
          ${uPedalBtn}
        </div>
        ${priceStr?`<div class="gear-item-price">${priceStr}</div>`:''}
      </div>`;
    }).join('');
    let totalRows='';
    if(hasJpy)totalRows+=`<div class="gear-total-row"><span class="gear-total-label">${tr('totalJpy')}</span><span class="gear-total-value">¥${totalJpy.toLocaleString()}</span></div>`;
    if(hasUsd)totalRows+=`<div class="gear-total-row"><span class="gear-total-label">${tr('totalUsd')}</span><span class="gear-total-value">$${totalUsd.toLocaleString()}</span></div>`;
    gearHtml=sortSelectHtml+`<div id="user-gear-items">`+items+`</div>`+(totalRows?`<div class="gear-total-box">${totalRows}</div>`:'');
  }

  document.getElementById('content').innerHTML=`
    <div class="profile-hero">
      <div class="profile-avatar">${avatarHtml}</div>
      <div class="profile-info">
        <div class="profile-username">${escHtml(user.username)}</div>
        ${user.bio?`<div class="profile-bio">${escHtml(user.bio)}</div>`:''}
        ${user.amp?`<div class="profile-amp">🎸 ${tr('ampLabel')}${escHtml(user.amp)}</div>`:''}
        ${linksHtml?`<div class="profile-links">${linksHtml}</div>`:''}
      </div>
    </div>
    <div class="section-card">
      <div class="section-title">📸 ${tr('sectionPosts')}</div>
      ${postsHtml}
    </div>
    <div class="section-card">
      <div class="section-title">🎸 ${tr('sectionGear')}</div>
      ${gearHtml}
    </div>`;
}

function applyUserGearSort(){
  const sel=document.getElementById('user-gear-sort');
  const wrap=document.getElementById('user-gear-items');
  if(!sel||!wrap||!window._userGearData)return;
  const val=sel.value;
  let sorted=[...window._userGearData];
  if(val==='date_asc')sorted.sort((a,b)=>(a.purchased_at||'').localeCompare(b.purchased_at||''));
  else if(val==='date_desc')sorted.sort((a,b)=>(b.purchased_at||'').localeCompare(a.purchased_at||''));
  else if(val==='price_asc')sorted.sort((a,b)=>(a.price||0)-(b.price||0));
  else if(val==='price_desc')sorted.sort((a,b)=>(b.price||0)-(a.price||0));
  else if(val==='name_asc')sorted.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if(val==='name_desc')sorted.sort((a,b)=>(b.name||'').localeCompare(a.name||''));
  else sorted=[...window._userGearData];
  wrap.innerHTML=sorted.map(g=>{
    const priceStr=g.price?(g.currency==='USD'?`$${g.price.toLocaleString()}`:`¥${g.price.toLocaleString()}`): '';
    const sSlug=window._userPedalSlugMap&&window._userPedalSlugMap[g.name]||null;
    const sPedalBtn=sSlug?`<a href="/pedal?slug=${sSlug}" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--ac);font-family:'JetBrains Mono',monospace;text-decoration:none;margin-top:4px" onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">🎛 ${lang==='en'?'Pedal detail →':'ペダル詳細ページへ →'}</a>`:'';
    return`<div class="gear-item">
      <div class="gear-item-info">
        <div class="gear-item-name">${escHtml(g.name)}</div>
        ${g.brand?`<div class="gear-item-brand">${escHtml(g.brand)}</div>`:''}
        ${g.memo?`<div style="font-size:11px;color:var(--tm);margin-top:3px">${escHtml(g.memo)}</div>`:''}
        ${sPedalBtn}
      </div>
      ${priceStr?`<div class="gear-item-price">${priceStr}</div>`:''}
    </div>`;
  }).join('');
}

function showError(msg){
  document.getElementById('content').innerHTML=`<div class="error-box"><p>${msg}</p><a href="/" style="color:var(--ac);display:block;margin-top:16px">${tr('backHome')}</a></div>`;
}

applyLang();
loadUser();
</script>
</body>
</html>
