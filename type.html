<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイプ別エフェクター | My Gear My Board</title>
  <meta name="description" content="">
  <link rel="icon" href="/IMG_0206.PNG">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #111;
      --card: #1a1a1a;
      --card2: #222;
      --border: #333;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #e05a00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
    }
    header {
      background: #0a0a0a;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .header-logo img { width: 40px; height: 40px; border-radius: 50%; }
    .header-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; line-height: 1.2; }
    .header-sub { font-size: 10px; color: var(--muted); }
    .header-home {
      margin-left: auto;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      text-decoration: none;
      white-space: nowrap;
    }
    .breadcrumb {
      background: #1e1e1e;
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .breadcrumb a { color: #aaa; text-decoration: none; }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb .sep { color: #555; }
    .breadcrumb .current { color: var(--text); }
    .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .error-box {
      background: var(--card);
      border: 1px solid #c0392b;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }

    /* タイプヘッダー */
    .type-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 16px;
      text-align: center;
    }
    .type-name {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .type-count { font-size: 13px; color: var(--muted); }
    .type-count span { color: var(--accent); font-weight: 700; }

    /* ペダルグリッド */
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .section-card h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .pedal-list { display: flex; flex-direction: column; gap: 8px; }
    .pedal-item {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .pedal-item:hover { border-color: var(--accent); }
    .pedal-item-brand {
      font-size: 10px;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      width: 80px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pedal-item-name { flex: 1; font-size: 14px; font-weight: 600; }
    .pedal-item-arrow { color: var(--muted); font-size: 14px; flex-shrink: 0; }

    /* 使用ボード */
    .boards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .board-item {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: border-color 0.2s;
    }
    .board-item:hover { border-color: var(--accent); }
    .board-thumb { width: 100%; aspect-ratio: 4/3; background: #2a2a2a; overflow: hidden; }
    .board-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .board-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--border); }
    .board-meta { padding: 10px; }
    .board-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .board-user { font-size: 11px; color: var(--muted); }
    .no-content { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }
    .no-content a { color: var(--accent); text-decoration: none; display: block; margin-top: 10px; font-weight: 600; }

    .load-more {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .load-more:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <a href="/" class="header-logo">
    <img src="/IMG_0206.PNG" alt="MGMB">
    <div>
      <div class="header-title">MY GEAR MY BOARD</div>
      <div class="header-sub">ペダルボードSNS</div>
    </div>
  </a>
  <a href="/" class="header-home">🏠 ホーム</a>
</header>

<div class="breadcrumb">
  <a href="/">ホーム</a>
  <span class="sep">›</span>
  <a href="/pedals">ペダル一覧</a>
  <span class="sep">›</span>
  <span id="breadcrumb-type" class="current">読み込み中...</span>
</div>

<div class="container">
  <div id="content">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://yzqfockzgyfjmngygbhp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cWZvY2t6Z3lmam1uZ3lnYmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxODksImV4cCI6MjA4OTY3MjE4OX0.Cn4UMJ8y6CHuIMDeFEShej4t1p4syweLgo5ZXZNs-_g';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const TYPE_LABELS = {
  'overdrive': 'オーバードライブ (OD)',
  'od': 'オーバードライブ (OD)',
  'distortion': 'ディストーション',
  'dist': 'ディストーション',
  'fuzz': 'ファズ',
  'boost': 'ブースター',
  'reverb': 'リバーブ',
  'delay': 'ディレイ',
  'chorus': 'コーラス',
  'flanger': 'フランジャー',
  'phaser': 'フェイザー',
  'modulation': 'モジュレーション',
  'mod': 'モジュレーション',
  'tremolo': 'トレモロ',
  'vibrato': 'ビブラート',
  'pitch': 'ピッチシフター',
  'wah': 'ワウ',
  'comp': 'コンプレッサー',
  'compressor': 'コンプレッサー',
  'eq': 'イコライザー',
  'noise_gate': 'ノイズゲート',
  'looper': 'ルーパー',
  'volume': 'ボリューム',
  'tuner': 'チューナー',
  'multi': 'マルチエフェクター',
  'preamp': 'プリアンプ',
  'pre': 'プリアンプ',
  'switcher': 'スイッチャー',
  'buffer': 'バッファー',
  'junction_box': 'ジャンクションボックス',
  'acoustic': 'アコースティック用',
  'other': 'その他'
};

const TYPE_BADGES = {
  'overdrive': 'OD', 'od': 'OD', 'distortion': 'Dist', 'dist': 'Dist',
  'fuzz': 'Fuzz', 'boost': 'Boost', 'reverb': 'Reverb', 'delay': 'Delay',
  'chorus': 'Chorus', 'flanger': 'Flanger', 'phaser': 'Phaser',
  'modulation': 'Mod', 'mod': 'Mod', 'tremolo': 'Tremolo', 'vibrato': 'Vibrato',
  'pitch': 'Pitch', 'wah': 'Wah', 'compressor': 'Comp', 'comp': 'Comp',
  'eq': 'EQ', 'noise_gate': 'Noise Gate', 'looper': 'Looper',
  'volume': 'Volume', 'tuner': 'Tuner', 'multi': 'Multi FX',
  'preamp': 'Preamp', 'pre': 'Preamp', 'switcher': 'Switcher',
  'buffer': 'Buffer', 'junction_box': 'Junction Box',
  'acoustic': 'Acoustic', 'other': 'Other'
};
function getTypeBadge(t) { return TYPE_BADGES[t?.toLowerCase()] || t; }

const LIMIT = 20;
let offset = 0;
let total = 0;
let currentTypeName = '';

async function loadType() {
  const params = new URLSearchParams(window.location.search);
  const typeName = params.get('name');
  if (!typeName) { showError('タイプが指定されていません。'); return; }

  currentTypeName = decodeURIComponent(typeName).toLowerCase();
  const displayName = TYPE_LABELS[currentTypeName] || currentTypeName;

  document.getElementById('breadcrumb-type').textContent = displayName;
  document.title = `${displayName} | My Gear My Board`;
  document.querySelector('meta[name="description"]').setAttribute(
    'content', `${displayName}エフェクターの一覧と実際のボードでの使用例。`
  );

  // 総数取得
  const { count } = await db
    .from('pedals')
    .select('*', { count: 'exact', head: true })
    .contains('types', [currentTypeName]);
  total = count || 0;

  // ペダル一覧
  const { data: pedals } = await db
    .from('pedals')
    .select('id, brand, model, slug, types')
    .contains('types', [currentTypeName])
    .order('brand', { ascending: true })
    .range(0, LIMIT - 1);
  offset = LIMIT;

  // 使用ボード
  const { data: posts } = await db
    .from('posts')
    .select('id, title, username, image_urls')
    .order('created_at', { ascending: false })
    .limit(6);

  renderType(displayName, pedals || [], posts || [], total);
}

function renderType(displayName, pedals, posts, total) {
  const pedalItemsHtml = pedals.map(p => `
    <a href="/pedal?slug=${p.slug}" class="pedal-item">
      <span class="pedal-item-brand">${p.brand}</span>
      <span class="pedal-item-name">${p.model}</span>
      <span class="pedal-item-arrow">›</span>
    </a>`).join('');

  const loadMoreBtn = total > LIMIT
    ? `<button class="load-more" id="load-more-btn" onclick="loadMorePedals()">さらに読み込む（残り ${total - LIMIT} 件）</button>`
    : '';

  const pedalsSection = pedals.length > 0
    ? `<div class="pedal-list" id="pedal-list">${pedalItemsHtml}</div>${loadMoreBtn}`
    : `<div class="no-content">このタイプのペダルデータはまだありません。</div>`;

  const boardsHtml = posts.length > 0
    ? posts.map(post => {
        const thumb = (post.image_urls?.length > 0)
          ? `<img src="${post.image_urls[0]}" alt="" loading="lazy">`
          : `<div class="board-thumb-placeholder">🎸</div>`;
        return `
          <a href="/post?id=${post.id}" class="board-item">
            <div class="board-thumb">${thumb}</div>
            <div class="board-meta">
              <div class="board-title">${post.title || '無題のボード'}</div>
              <div class="board-user">${post.username ? '@' + post.username : '匿名'}</div>
            </div>
          </a>`;
      }).join('')
    : `<div class="no-content">ボードの投稿はまだありません。<a href="/">投稿する →</a></div>`;

  document.getElementById('content').innerHTML = `
    <div class="type-header">
      <div class="type-name">${displayName}</div>
      <div class="type-count">ペダル <span>${total}</span> 件</div>
    </div>
    <div class="section-card">
      <h3>🎛 ペダル一覧</h3>
      ${pedalsSection}
    </div>
    <div class="section-card">
      <h3>📸 最新のボード</h3>
      <div class="boards-grid">${boardsHtml}</div>
    </div>`;
}

async function loadMorePedals() {
  const { data: pedals } = await db
    .from('pedals')
    .select('id, brand, model, slug, types')
    .contains('types', [currentTypeName])
    .order('brand', { ascending: true })
    .range(offset, offset + LIMIT - 1);

  offset += LIMIT;
  const list = document.getElementById('pedal-list');
  if (list && pedals) {
    pedals.forEach(p => {
      const item = document.createElement('a');
      item.href = `/pedal?slug=${p.slug}`;
      item.className = 'pedal-item';
      item.innerHTML = `
        <span class="pedal-item-brand">${p.brand}</span>
        <span class="pedal-item-name">${p.model}</span>
        <span class="pedal-item-arrow">›</span>`;
      list.appendChild(item);
    });
  }
  const remaining = total - offset;
  const btn = document.getElementById('load-more-btn');
  if (btn) {
    if (remaining <= 0) btn.remove();
    else btn.textContent = `さらに読み込む（残り ${remaining} 件）`;
  }
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="error-box">
      <p>${msg}</p>
      <a href="/pedals" style="color:var(--accent);margin-top:16px;display:block;">← ペダル一覧に戻る</a>
    </div>`;
}

loadType();
</script>
</body>
</html>
