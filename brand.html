<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブランド | My Gear My Board</title>
  <meta name="description" content="" id="meta-description">
  <meta property="og:description" content="" id="og-description">
  <link rel="canonical" href="" id="canonical">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0e; --sf: #151517; --sf2: #1c1c1f;
      --bd: #272729; --ac: #e8552d; --tx: #eae8e2; --tm: #9a9890; --td: #6e6c68;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--tx); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 100vh; }
    header {
      background: rgba(13,13,14,.96); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--bd); padding: 0;
      display: flex; flex-direction: column; position: sticky; top: 0; z-index: 100;
    }
    .header-row1 {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 8px 16px 4px; border-bottom: 1px solid rgba(39,39,41,.6);
    }
    .header-row2 {
      display: flex; align-items: center; justify-content: flex-start; gap: 6px;
      padding: 4px 16px 6px;
    }
    .header-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex: 1; min-width: 0; }
    .header-logo img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 3px; color: var(--tx); white-space: nowrap; }
    .header-sub { font-size: 9px; letter-spacing: 2px; color: var(--ac); text-transform: uppercase; margin-top: 1px; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .lang-btn {
      display: flex; align-items: center; gap: 4px; padding: 6px 10px;
      background: var(--sf); border: 1px solid var(--bd); border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600;
      color: var(--tm); cursor: pointer; transition: all .15s; touch-action: manipulation;
    }
    .lang-btn:hover { border-color: var(--ac); color: var(--ac); }
    .home-btn {
      display: flex; align-items: center; gap: 4px; padding: 5px 10px;
      background: var(--sf); border: 1px solid var(--bd); border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 600;
      color: var(--tm); cursor: pointer; transition: all .15s; text-decoration: none; white-space: nowrap;
    }
    .home-btn:hover { border-color: var(--ac); color: var(--ac); }
    .breadcrumb {
      background: var(--sf); border-bottom: 1px solid var(--bd);
      padding: 10px 16px; font-size: 12px; color: var(--tm);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .breadcrumb a { color: var(--tm); text-decoration: none; }
    .breadcrumb a:hover { color: var(--tx); }
    .breadcrumb .sep { color: var(--bd); }
    .breadcrumb .current { color: var(--tx); }
    .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
    .loading { text-align: center; padding: 60px 20px; color: var(--tm); font-family: 'Noto Sans JP', sans-serif; }
    .error-box { background: var(--sf); border: 1px solid #c0392b; border-radius: 12px; padding: 40px 20px; text-align: center; color: var(--tm); }
    .brand-card {
      background: var(--sf); border: 1px solid var(--bd); border-radius: 16px;
      padding: 28px 24px; margin-bottom: 16px; text-align: center;
    }
    .brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; margin-bottom: 8px; }
    .brand-count { font-size: 13px; color: var(--tm); font-family: 'Noto Sans JP', sans-serif; }
    .brand-count span { color: var(--ac); font-weight: 700; }
    /* ★ ブランド説明 */
    .brand-desc-wrap { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--bd); text-align: left; }
    .brand-desc-text {
      font-size: 13px; color: var(--tm); line-height: 1.8;
      font-family: 'Noto Sans JP', sans-serif;
      max-height: 7em; overflow: hidden; transition: max-height .4s ease;
    }
    .brand-desc-text.expanded { max-height: 9999px; }
    .brand-desc-text.wip {
      font-style: italic; color: var(--td); max-height: none;
      display: flex; align-items: center; gap: 6px;
    }
    .brand-desc-toggle {
      display: block; width: 100%; margin-top: 10px; padding: 8px;
      background: var(--sf2); border: 1px solid var(--bd); border-radius: 6px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600;
      color: var(--ac); cursor: pointer; text-align: center;
      transition: border-color .15s, background .15s; touch-action: manipulation;
    }
    .brand-desc-toggle:hover { border-color: var(--ac); background: rgba(232,85,45,.06); }
    .brand-desc-toggle.hidden { display: none; }
    .brand-desc-updated {
      margin-top: 10px; font-size: 10px; color: var(--td);
      font-family: 'JetBrains Mono', monospace; text-align: right;
    }
    .section-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .section-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    /* ★ グリッド表示 */
    .pedal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
    @media (max-width: 480px) { .pedal-grid { grid-template-columns: repeat(2, 1fr); } }
    .pedal-card {
      background: var(--sf2); border: 1px solid var(--bd); border-radius: 12px;
      overflow: hidden; text-decoration: none; color: var(--tx);
      display: block; transition: border-color .2s;
    }
    .pedal-card:hover { border-color: var(--ac); }
    .pedal-card-image {
      width: 100%; aspect-ratio: 1; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border-bottom: 1px solid var(--bd);
    }
    .pedal-card-image img { width: 100%; height: 100%; object-fit: contain; }
    .pedal-card-image .type-icon-img { width: 60%; height: 60%; object-fit: contain; opacity: .45; }
    .pedal-card-image-placeholder { font-size: 28px; opacity: .2; }
    .pedal-card-body { padding: 8px; }
    .pedal-card-name {
      font-size: 11px; font-weight: 600; line-height: 1.3; margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .pedal-card-types { display: flex; flex-wrap: wrap; gap: 3px; }
    .type-badge {
      background: var(--sf); border: 1px solid var(--bd); color: var(--tm);
      font-size: 9px; padding: 2px 6px; border-radius: 20px; white-space: nowrap;
    }
    /* ボード */
    .boards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .board-item {
      background: var(--sf2); border: 1px solid var(--bd); border-radius: 10px;
      overflow: hidden; text-decoration: none; color: var(--tx); display: block; transition: border-color .2s;
    }
    .board-item:hover { border-color: var(--ac); }
    .board-thumb { width: 100%; aspect-ratio: 4/3; background: var(--sf); overflow: hidden; }
    .board-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .board-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--bd); }
    .board-meta { padding: 10px; }
    .board-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .board-user { font-size: 11px; color: var(--tm); font-family: 'Noto Sans JP', sans-serif; }
    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; opacity: .4; }
    .empty-state-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--tm); margin-bottom: 8px; }
    .empty-state-text { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--td); line-height: 1.6; margin-bottom: 16px; }
    .empty-state-btn {
      display: inline-block; padding: 10px 24px; background: var(--ac); border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600;
      color: #fff; text-decoration: none; transition: background .15s;
    }
    .empty-state-btn:hover { background: #cf4c26; }
    .load-more {
      width: 100%; margin-top: 12px; padding: 12px;
      background: var(--sf2); border: 1px solid var(--bd); border-radius: 10px;
      color: var(--tm); font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer; transition: color .2s, border-color .2s;
    }
    .load-more:hover { color: var(--tx); border-color: var(--ac); }
  </style>
</head>
<body>
<header>
  <div class="header-row1">
    <a href="/" class="header-logo">
      <img src="/IMG_0206.PNG" alt="MGMB" onerror="this.style.display='none'">
      <div>
        <div class="header-title">MY GEAR MY BOARD</div>
        <div class="header-sub" id="header-sub">ペダルボードSNS</div>
      </div>
    </a>
    <div class="lang-btn" id="lang-btn" onclick="toggleLang()">🌐 <span id="lang-label">EN</span></div>
  </div>
  <div class="header-row2">
    <a href="/" class="home-btn">🏠 <span id="home-text">ホーム</span></a>
    <a href="/#gacha" class="home-btn">🎲 <span id="gacha-text">ペダルガチャ</span></a>
  </div>
</header>
<div class="breadcrumb">
  <a href="/" id="bc-home">ホーム</a>
  <span class="sep">›</span>
  <a href="/pedals" id="bc-pedals">ペダル一覧</a>
  <span class="sep">›</span>
  <span id="bc-brand" class="current">読み込み中...</span>
</div>
<div class="container">
  <div id="content"><div class="loading" id="loading-msg">読み込み中...</div></div>
</div>
<script>
const SUPABASE_URL = 'https://yzqfockzgyfjmngygbhp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cWZvY2t6Z3lmam1uZ3lnYmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxODksImV4cCI6MjA4OTY3MjE4OX0.Cn4UMJ8y6CHuIMDeFEShej4t1p4syweLgo5ZXZNs-_g';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const SUPABASE_STORAGE = 'https://yzqfockzgyfjmngygbhp.supabase.co/storage/v1/object/public/pedal-images/type-icons/';
function getTypeIconUrl(types) {
  if (!types || !types.length) return null;
  return SUPABASE_STORAGE + 'type_' + types[0] + '.png';
}

function detectLang() {
  const saved = localStorage.getItem('mgmb_lang');
  if (saved) return saved;
  const bl = navigator.language || navigator.userLanguage || 'ja';
  return bl.toLowerCase().startsWith('ja') ? 'ja' : 'en';
}
let lang = detectLang();

const I18N = {
  ja: {
    headerSub:'ペダルボードSNS', home:'ホーム', gacha:'ペダルガチャ', langLabel:'EN',
    bcHome:'ホーム', bcPedals:'ペダル一覧',
    pedalCount:'ペダル', pedalCountUnit:'件',
    sectionPedals:'🎛 ペダル一覧', sectionBoards:'📸 を使ったボード',
    emptyBoardTitle:'まだ投稿がありません',
    emptyBoardText:'このブランドの機材を使ったボードをあなたが最初に投稿しましょう！',
    emptyBoardBtn:'投稿する →',
    loadMore:'さらに読み込む', remaining:'残り',
    loading:'読み込み中...', notFound:'ブランドが指定されていません。',
    backHome:'← ホームに戻る', anonUser:'匿名',
    descWip:'現在編集中です。随時更新',
    readMore:'続きを読む ▼', readLess:'閉じる ▲',
    updatedAt:'最終更新：',
  },
  en: {
    headerSub:'Pedalboard SNS', home:'Home', gacha:'Pedal Gacha', langLabel:'JA',
    bcHome:'Home', bcPedals:'Pedal List',
    pedalCount:'', pedalCountUnit:' pedals',
    sectionPedals:'🎛 Pedals', sectionBoards:'📸 Boards using ',
    emptyBoardTitle:'No boards yet',
    emptyBoardText:'Be the first to post a board featuring this brand!',
    emptyBoardBtn:'Post your board →',
    loadMore:'Load more', remaining:'remaining',
    loading:'Loading...', notFound:'Brand not specified.',
    backHome:'← Back to Home', anonUser:'Anonymous',
    descWip:'Description coming soon.',
    readMore:'Read more ▼', readLess:'Close ▲',
    updatedAt:'Last updated: ',
  }
};
function tr(key) { return (I18N[lang]||I18N.ja)[key]||I18N.ja[key]||key; }

function applyLang() {
  document.getElementById('header-sub').textContent = tr('headerSub');
  document.getElementById('home-text').textContent = tr('home');
  const gt=document.getElementById('gacha-text');if(gt)gt.textContent=tr('gacha');
  document.getElementById('lang-label').textContent = tr('langLabel');
  document.getElementById('bc-home').textContent = tr('bcHome');
  document.getElementById('bc-pedals').textContent = tr('bcPedals');
}

function toggleLang() {
  lang = lang === 'ja' ? 'en' : 'ja';
  localStorage.setItem('mgmb_lang', lang);
  applyLang();
  if (currentBrand) renderBrand(currentBrand, cachedPedals, cachedPosts, totalPedals, cachedBrandData);
}

const TYPE_LABELS = {
  'overdrive':'OD','distortion':'Dist','fuzz':'Fuzz','boost':'Boost',
  'reverb':'Reverb','delay':'Delay','chorus':'Chorus','flanger':'Flanger',
  'phaser':'Phaser','modulation':'Mod','tremolo':'Tremolo','vibrato':'Vibrato',
  'pitch':'Pitch','wah':'Wah','compressor':'Comp','comp':'Comp','eq':'EQ',
  'noise_gate':'Noise Gate','looper':'Looper','volume':'Volume','tuner':'Tuner',
  'multi':'Multi FX','preamp':'Preamp','switcher':'Switcher','buffer':'Buffer',
  'junction_box':'Junction Box','pre':'Preamp'
};
function getTypeLabel(t) { return TYPE_LABELS[t?.toLowerCase()] || t; }

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

let pedalOffset = 0;
const PEDAL_LIMIT = 24;
let currentBrand = '';
let totalPedals = 0;
let cachedPedals = [];
let cachedPosts = [];
let cachedBrandData = null;

async function loadBrand() {
  const params = new URLSearchParams(window.location.search);
  const brandName = params.get('name');
  if (!brandName) { showError(tr('notFound')); return; }
  currentBrand = decodeURIComponent(brandName);
  document.getElementById('bc-brand').textContent = currentBrand;
  document.title = `${currentBrand} | My Gear My Board`;
  const brandUrl = `https://mygearmyboard.com/brand?name=${encodeURIComponent(currentBrand)}`;
  const brandDescEl = document.getElementById('meta-description');
  const brandOgEl = document.getElementById('og-description');
  const brandCanEl = document.getElementById('canonical');
  const brandDescText = lang==='en'
    ? `${currentBrand} effect pedals — ${totalPedals} pedals. Browse lineup and boards.`
    : `${currentBrand}のエフェクターペダル一覧。${totalPedals}件のペダルと使用ボードをチェック。`;
  if(brandDescEl) brandDescEl.setAttribute('content', brandDescText);
  if(brandOgEl) brandOgEl.setAttribute('content', brandDescText);
  if(brandCanEl) brandCanEl.setAttribute('href', brandUrl);

  // ★ brandsテーブルからブランド説明を取得（並列）
  const [countRes, pedalsRes, postsRes, brandRes] = await Promise.all([
    db.from('pedals').select('*', { count: 'exact', head: true }).eq('brand', currentBrand),
    db.from('pedals').select('id, brand, model, full_name, slug, types, image_url')
      .eq('brand', currentBrand).order('model', { ascending: true }).range(0, PEDAL_LIMIT - 1),
    db.from('posts').select('id, title, username, image_urls, gear_list, created_at')
      .order('created_at', { ascending: false }).limit(200),
    db.from('brands').select('*').eq('name', currentBrand).maybeSingle()
  ]);

  totalPedals = countRes.count || 0;
  pedalOffset = PEDAL_LIMIT;
  cachedPedals = pedalsRes.data || [];
  // ★ JS側でブランドフィルタリング（brand空でもname検索でマッチ）
  const allPosts = postsRes.data || [];
  const lowerBrand = currentBrand.toLowerCase();
  cachedPosts = allPosts.filter(post => {
    const gear = Array.isArray(post.gear_list) ? post.gear_list : [];
    return gear.some(g => {
      const gBrand = (g.brand || '').toLowerCase().trim();
      const gName = (g.name || g || '').replace(/\t/g,' ').replace(/ +/g,' ').toLowerCase().trim();
      return gBrand === lowerBrand || gName.startsWith(lowerBrand + ' ') || gName.includes(' ' + lowerBrand + ' ');
    });
  }).slice(0, 6);
  cachedBrandData = brandRes.data || null;

  renderBrand(currentBrand, cachedPedals, cachedPosts, totalPedals, cachedBrandData);
}

function renderBrand(brandName, pedals, posts, total, brandData) {
  // ★ ペダルグリッドHTML
  const pedalCardsHtml = pedals.map(p => {
    const typesHtml = (p.types || []).slice(0, 2).map(t =>
      `<span class="type-badge">${getTypeLabel(t)}</span>`
    ).join('');
    let imageHtml;
    if (p.image_url) {
      imageHtml = `<img src="${p.image_url}" alt="${p.model}" loading="lazy">`;
    } else {
      const iconUrl = getTypeIconUrl(p.types);
      if (iconUrl) {
        imageHtml = `<img class="type-icon-img" src="${iconUrl}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="pedal-card-image-placeholder" style="display:none">🎛</span>`;
      } else {
        imageHtml = `<span class="pedal-card-image-placeholder">🎛</span>`;
      }
    }
    return `<a href="/pedal?slug=${p.slug}" class="pedal-card">
      <div class="pedal-card-image">${imageHtml}</div>
      <div class="pedal-card-body">
        <div class="pedal-card-name">${p.model}</div>
        <div class="pedal-card-types">${typesHtml}</div>
      </div>
    </a>`;
  }).join('');

  const remaining = total - pedalOffset;
  const loadMoreBtn = total > PEDAL_LIMIT
    ? `<button class="load-more" id="load-more-btn" onclick="loadMorePedals()">
        ${tr('loadMore')}（${tr('remaining')} ${remaining > 0 ? remaining : total - cachedPedals.length} 件）
       </button>` : '';

  const pedalsSection = pedals.length > 0
    ? `<div class="pedal-grid" id="pedal-grid">${pedalCardsHtml}</div>${loadMoreBtn}`
    : `<div class="empty-state"><div class="empty-state-title">${tr('emptyBoardTitle')}</div></div>`;

  // ★ ブランド説明HTML
  const desc = lang === 'en' ? (brandData?.description_en || brandData?.description) : brandData?.description;
  const updatedStr = formatDate(brandData?.updated_at);
  let descHtml = '';
  if (desc) {
    descHtml = `
      <div class="brand-desc-wrap">
        <div class="brand-desc-text" id="brand-desc-text">${desc}</div>
        <button class="brand-desc-toggle" id="brand-desc-toggle">${tr('readMore')}</button>
        ${updatedStr ? `<div class="brand-desc-updated">${tr('updatedAt')}${updatedStr}</div>` : ''}
      </div>`;
  } else {
    descHtml = `
      <div class="brand-desc-wrap">
        <div class="brand-desc-text wip">✏️ ${tr('descWip')}</div>
      </div>`;
  }

  // ボードHTML
  let boardsHtml = '';
  if (posts.length > 0) {
    boardsHtml = posts.map(post => {
      const thumb = (post.image_urls && post.image_urls.length > 0)
        ? `<img src="${post.image_urls[0]}" alt="${post.title || ''}" loading="lazy">`
        : `<div class="board-thumb-placeholder">🎸</div>`;
      const user = post.username ? `@${post.username}` : tr('anonUser');
      return `<a href="/post?id=${post.id}" class="board-item">
        <div class="board-thumb">${thumb}</div>
        <div class="board-meta">
          <div class="board-title">${post.title || (lang === 'ja' ? '無題のボード' : 'Untitled Board')}</div>
          <div class="board-user">${user}</div>
        </div>
      </a>`;
    }).join('');
  } else {
    boardsHtml = `
      <div class="empty-state">
        <div class="empty-state-icon">🎸</div>
        <div class="empty-state-title">${tr('emptyBoardTitle')}</div>
        <div class="empty-state-text">${tr('emptyBoardText')}</div>
        <a href="/" class="empty-state-btn">${tr('emptyBoardBtn')}</a>
      </div>`;
  }

  const boardSectionTitle = lang === 'ja'
    ? `📸 ${brandName}${tr('sectionBoards')}`
    : `${tr('sectionBoards')}${brandName}`;

  document.getElementById('content').innerHTML = `
    <div class="brand-card">
      <div class="brand-name">${brandName}</div>
      <div class="brand-count">${tr('pedalCount')} <span>${total}</span>${tr('pedalCountUnit')}</div>
      ${descHtml}
    </div>
    <div class="section-card">
      <h3>${tr('sectionPedals')}</h3>
      ${pedalsSection}
    </div>
    <div class="section-card">
      <h3>${boardSectionTitle}</h3>
      <div class="boards-grid">${boardsHtml}</div>
    </div>`;

  // ★ アコーディオン初期化
  initDescAccordion();
}

function initDescAccordion() {
  const desc = document.getElementById('brand-desc-text');
  const btn = document.getElementById('brand-desc-toggle');
  if (!desc || !btn) return;
  if (desc.scrollHeight <= desc.clientHeight + 4) {
    btn.classList.add('hidden');
    return;
  }
  btn.onclick = function() {
    const expanded = desc.classList.toggle('expanded');
    btn.textContent = expanded ? tr('readLess') : tr('readMore');
  };
}

async function loadMorePedals() {
  const { data: pedals } = await db.from('pedals')
    .select('id, brand, model, full_name, slug, types, image_url')
    .eq('brand', currentBrand).order('model', { ascending: true })
    .range(pedalOffset, pedalOffset + PEDAL_LIMIT - 1);
  pedalOffset += PEDAL_LIMIT;
  cachedPedals = [...cachedPedals, ...(pedals || [])];
  const grid = document.getElementById('pedal-grid');
  if (grid && pedals) {
    pedals.forEach(p => {
      const typesHtml = (p.types || []).slice(0, 2).map(t =>
        `<span class="type-badge">${getTypeLabel(t)}</span>`
      ).join('');
      let imageHtml;
      if (p.image_url) {
        imageHtml = `<img src="${p.image_url}" alt="${p.model}" loading="lazy">`;
      } else {
        const iconUrl = getTypeIconUrl(p.types);
        if (iconUrl) {
          imageHtml = `<img class="type-icon-img" src="${iconUrl}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="pedal-card-image-placeholder" style="display:none">🎛</span>`;
        } else {
          imageHtml = `<span class="pedal-card-image-placeholder">🎛</span>`;
        }
      }
      const card = document.createElement('a');
      card.href = `/pedal?slug=${p.slug}`;
      card.className = 'pedal-card';
      card.innerHTML = `
        <div class="pedal-card-image">${imageHtml}</div>
        <div class="pedal-card-body">
          <div class="pedal-card-name">${p.model}</div>
          <div class="pedal-card-types">${typesHtml}</div>
        </div>`;
      grid.appendChild(card);
    });
  }
  const remaining = totalPedals - pedalOffset;
  const btn = document.getElementById('load-more-btn');
  if (btn) {
    if (remaining <= 0) btn.remove();
    else btn.textContent = `${tr('loadMore')}（${tr('remaining')} ${remaining} 件）`;
  }
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="error-box">
      <p>${msg}</p>
      <a href="/" style="color:var(--ac);margin-top:16px;display:block;">${tr('backHome')}</a>
    </div>`;
}

applyLang();
loadBrand();
</script>
