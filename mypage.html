<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Page — My Gear My Board</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0e;--sf:#151517;--sf2:#1c1c1f;--bd:#272729;--ac:#e8552d;--ac2:#f0a500;--tx:#eae8e2;--tm:#9a9890;--td:#6e6c68}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:Noto Sans JP,sans-serif;font-weight:300;min-height:100vh}
header{position:sticky;top:0;z-index:300;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(13,13,14,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd)}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.logo-sub{font-family:Noto Sans JP,sans-serif;font-size:9px;letter-spacing:2px;color:var(--ac);text-transform:uppercase;margin-top:2px}
.back-btn{padding:7px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;font-family:Noto Sans JP,sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--tm);cursor:pointer;transition:all .15s;touch-action:manipulation;text-decoration:none;display:flex;align-items:center}
.back-btn:hover{border-color:var(--ac);color:var(--ac)}
.page{max-width:640px;margin:0 auto;padding:32px 20px;min-height:calc(100vh - 58px)}
.auth-tabs{display:flex;border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:28px}
.auth-tab{flex:1;padding:10px;text-align:center;font-family:Noto Sans JP,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--tm);touch-action:manipulation}
.auth-tab.on{background:var(--ac);color:#fff}
.form-box{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:28px}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;margin-bottom:6px}
.form-sub{font-family:Noto Sans JP,sans-serif;font-size:12px;color:var(--td);margin-bottom:24px}
.form-row{margin-bottom:16px}
.form-lbl{font-family:Noto Sans JP,sans-serif;font-size:12px;color:#b0ada6;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;padding:10px 12px;font-size:16px;color:var(--tx);font-family:Noto Sans JP,sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--ac)}
.form-input::placeholder{color:var(--td)}
.form-err{font-family:Noto Sans JP,sans-serif;font-size:11px;color:#e05050;margin-top:6px;min-height:16px}
.submit-btn{width:100%;background:var(--ac);border:none;border-radius:4px;padding:12px;font-family:Noto Sans JP,sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;color:#fff;cursor:pointer;transition:all .18s;margin-top:8px;touch-action:manipulation}
.submit-btn:hover{background:#cf4c26}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.text-link{font-family:Noto Sans JP,sans-serif;font-size:12px;color:var(--ac);cursor:pointer;text-align:center;margin-top:14px;display:block}
.text-link:hover{text-decoration:underline}
.rf-note-box{background:rgba(232,85,45,.08);border:1px solid rgba(232,85,45,.3);border-radius:4px;padding:10px 14px;margin-top:14px;display:flex;align-items:flex-start;gap:8px}
.rf-note-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.mypage-wrap{display:none}
.mypage-wrap.show{display:block}

/* ★ プロフィールカード */
.profile-card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:20px;overflow:hidden}
.profile-card-header{display:flex;align-items:center;gap:16px;padding:20px 24px;cursor:pointer;transition:background .15s;user-select:none}
.profile-card-header:hover{background:rgba(255,255,255,.03)}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#e85c2f,#b03020);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0;position:relative;border:2px solid var(--bd)}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-info{flex:1;min-width:0}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:3px}
.profile-email{font-family:Noto Sans JP,sans-serif;font-size:11px;color:var(--td)}
.profile-chevron{font-size:14px;color:var(--td);transition:transform .25s;flex-shrink:0}
.profile-chevron.open{transform:rotate(180deg)}

/* ★ 折りたたみエリア */
.profile-body{padding:0 24px;max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),padding .35s}
.profile-body.open{max-height:700px;padding:0 24px 20px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--tm);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.edit-form-row{margin-bottom:12px}
.edit-lbl{font-family:Noto Sans JP,sans-serif;font-size:11px;color:#b0ada6;margin-bottom:5px;display:block}
.edit-input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;padding:8px 12px;font-size:16px;color:var(--tx);font-family:Noto Sans JP,sans-serif;outline:none;transition:border-color .15s}
.edit-input:focus{border-color:var(--ac)}
.edit-input::placeholder{color:var(--td)}
textarea.edit-input{resize:vertical;min-height:70px}
.save-btn{padding:9px 20px;background:var(--ac);border:none;border-radius:3px;font-family:Noto Sans JP,sans-serif;font-size:11px;font-weight:600;color:#fff;cursor:pointer;touch-action:manipulation;transition:all .15s}
.save-btn:hover{background:#cf4c26}

/* タブ */
.tab-bar{display:flex;border-bottom:1px solid var(--bd);margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:10px 14px;font-family:Noto Sans JP,sans-serif;font-size:12px;font-weight:600;color:var(--td);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;touch-action:manipulation;white-space:nowrap;flex-shrink:0}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.post-list{display:flex;flex-direction:column;gap:10px}
.post-item{display:flex;gap:12px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:12px;cursor:pointer;transition:border-color .15s;touch-action:manipulation}
.post-item:hover{border-color:rgba(232,85,45,.4)}
.post-thumb{width:72px;height:54px;border-radius:4px;object-fit:contain;background:var(--sf2);flex-shrink:0;border:1px solid var(--bd)}
.post-thumb-empty{width:72px;height:54px;border-radius:4px;background:var(--sf2);flex-shrink:0;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.4}
.post-info{flex:1;min-width:0}
.post-item-title{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-item-meta{font-family:Noto Sans JP,sans-serif;font-size:11px;color:var(--td)}
.post-item-likes{font-family:Noto Sans JP,sans-serif;font-size:11px;color:var(--tm);margin-top:4px}
.empty-msg{text-align:center;padding:40px;font-family:Noto Sans JP,sans-serif;font-size:12px;color:var(--td)}
.notif-badge{background:var(--ac);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-family:JetBrains Mono,monospace;font-weight:600;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;vertical-align:middle}
.logout-btn{width:100%;padding:10px;background:transparent;border:1px solid #5a1a1a;border-radius:4px;font-family:Noto Sans JP,sans-serif;font-size:11px;font-weight:600;color:#e05050;cursor:pointer;transition:all .15s;margin-top:12px;touch-action:manipulation}
.logout-btn:hover{background:rgba(224,80,80,.1);border-color:#e05050}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sf);border:1px solid var(--bd);border-radius:4px;padding:10px 18px;font-family:Noto Sans JP,sans-serif;font-size:12px;color:var(--tx);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ★ ガチャ保存カード */
.gacha-save-list{display:flex;flex-direction:column;gap:10px}
.gacha-save-item{display:flex;align-items:center;gap:12px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:12px;cursor:pointer;transition:border-color .2s,transform .15s;touch-action:manipulation;text-decoration:none}
.gacha-save-item:hover{border-color:rgba(232,85,45,.4);transform:translateY(-1px)}
.gacha-save-img{width:56px;height:56px;border-radius:4px;object-fit:contain;background:var(--sf2);flex-shrink:0;border:1px solid var(--bd)}
.gacha-save-img-empty{width:56px;height:56px;border-radius:4px;background:var(--sf2);flex-shrink:0;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.5}
.gacha-save-info{flex:1;min-width:0}
.gacha-save-brand{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--td);margin-bottom:2px}
.gacha-save-model{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.gacha-save-meta{display:flex;align-items:center;gap:8px}
.gacha-rarity-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px}
.rarity-SSR{background:linear-gradient(135deg,#ffd700,#ff6b35,#a855f7);color:#fff}
.rarity-SR{background:#a855f7;color:#fff}
.rarity-Sp{background:#f97316;color:#fff}
.rarity-Std{background:#4a4a48;color:#9a9890}
.gacha-save-date{font-family:Noto Sans JP,sans-serif;font-size:10px;color:var(--td)}
.gacha-save-arrow{font-size:14px;color:var(--td);flex-shrink:0;transition:color .15s}
.gacha-save-item:hover .gacha-save-arrow{color:var(--ac)}

.avatar-menu{position:fixed;background:var(--sf);border:1px solid var(--bd);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.7);z-index:500;min-width:180px;overflow:hidden;animation:fadeInMenu .15s ease}
@keyframes fadeInMenu{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.avatar-menu-item{display:flex;align-items:center;gap:8px;padding:11px 14px;font-family:Noto Sans JP,sans-serif;font-size:12px;font-weight:500;color:var(--tx);cursor:pointer;transition:background .12s;border-bottom:1px solid var(--bd)}
.avatar-menu-item:last-child{border-bottom:none}
.avatar-menu-item:hover{background:rgba(232,85,45,.08);color:var(--ac)}
.avatar-menu-item.danger{color:#e05050}
.avatar-menu-item.danger:hover{background:rgba(224,80,80,.08)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@media(max-width:600px){.page{padding:16px 14px}.form-box{padding:20px 16px}.profile-card-header{padding:16px 18px}.profile-body.open{padding:0 18px 18px}}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="location.href='/'">
    <img class="logo-img" src="IMG_0206.PNG" alt="MGMB" onerror="this.style.display='none'">
    <div class="logo-text">
      <div class="logo-main">My Gear My Board</div>
      <div class="logo-sub" id="mp-logo-sub">ペダルボードSNS</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <a class="back-btn" id="mp-back-btn" href="/">← ホームへ</a>
    <div id="mp-lang-btn" onclick="toggleLang()"
      style="display:flex;align-items:center;gap:4px;padding:6px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;cursor:pointer;transition:all .15s;touch-action:manipulation;font-size:12px;font-weight:600;color:var(--tm)"
      onmouseover="this.style.borderColor='var(--ac)';this.style.color='var(--ac)'"
      onmouseout="this.style.borderColor='var(--bd)';this.style.color='var(--tm)'">
      🌐 <span id="mp-lang-label">EN</span>
    </div>
  </div>
</header>
<div class="page" id="page">
  <!-- 未ログイン：認証フォーム -->
  <div id="auth-wrap">
    <div class="auth-tabs">
      <div class="auth-tab on" id="tab-login" onclick="switchAuthTab('login')">ログイン</div>
      <div class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">新規登録</div>
    </div>
    <div class="form-box" id="login-form">
      <div class="form-title" id="lf-title">ログイン</div>
      <div class="form-sub" id="lf-sub">メールアドレスとパスワードでログイン</div>
      <div class="form-row">
        <label class="form-lbl" id="lf-lbl-email">メールアドレス</label>
        <input class="form-input" id="login-email" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-row">
        <label class="form-lbl" id="lf-lbl-pw">パスワード</label>
        <input class="form-input" id="login-password" type="password" autocomplete="current-password">
      </div>
      <div class="form-err" id="login-err"></div>
      <button class="submit-btn" id="login-btn" onclick="doLogin()">ログイン</button>
      <span class="text-link" id="lf-reset-link" onclick="showResetForm()">パスワードを忘れた方はこちら</span>
    </div>
    <div class="form-box" id="register-form" style="display:none">
      <div class="form-title" id="rf-title">新規登録</div>
      <div class="form-sub" id="rf-sub">登録不要で投稿できますが、登録するとマイページを持てます</div>
      <div class="form-row">
        <label class="form-lbl" id="rf-lbl-name">ユーザー名 <span style="color:#e05050">*</span></label>
        <input class="form-input" id="reg-username" type="text" placeholder="あなたの名前" maxlength="30">
      </div>
      <div class="form-row">
        <label class="form-lbl" id="rf-lbl-email">メールアドレス <span style="color:#e05050">*</span></label>
        <input class="form-input" id="reg-email" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-row">
        <label class="form-lbl" id="rf-lbl-pw">パスワード <span style="color:#e05050">*</span>（6文字以上）</label>
        <input class="form-input" id="reg-password" type="password" placeholder="6文字以上" autocomplete="new-password">
      </div>
      <div class="form-err" id="register-err"></div>
      <button class="submit-btn" id="register-btn" onclick="doRegister()">登録する</button>
      <div class="rf-note-box">
        <span class="rf-note-icon">📧</span>
        <span id="rf-note" style="font-family:Noto Sans JP,sans-serif;font-size:12px;color:var(--tx);line-height:1.6">登録後、確認メールが届きます。メールのリンクをクリックして登録完了です。</span>
      </div>
    </div>
    <div class="form-box" id="reset-form" style="display:none">
      <div class="form-title" id="rst-title">パスワードリセット</div>
      <div class="form-sub" id="rst-sub">登録済みのメールアドレスにリセットリンクを送ります</div>
      <div class="form-row">
        <label class="form-lbl" id="rst-lbl-email">メールアドレス</label>
        <input class="form-input" id="reset-email" type="email" placeholder="your@email.com">
      </div>
      <div class="form-err" id="reset-err"></div>
      <button class="submit-btn" id="reset-btn" onclick="doReset()">リセットメールを送る</button>
      <span class="text-link" id="rst-back-link" onclick="showLoginForm()">← ログインに戻る</span>
    </div>
  </div>

  <!-- ログイン済み：マイページ -->
  <div class="mypage-wrap" id="mypage-wrap">

    <!-- ★ プロフィールカード（折りたたみ） -->
    <div class="profile-card">
      <!-- ヘッダー（クリックで開閉） -->
      <div class="profile-card-header" id="profile-card-header">
        <div class="profile-avatar" id="profile-avatar" onclick="openAvatarMenu(event)" title="プロフィール画像を変更" style="cursor:pointer;overflow:visible">
          <div style="width:60px;height:60px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e85c2f,#b03020);position:relative">
            <span id="avatar-initial">?</span>
            <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);font-family:Noto Sans JP,sans-serif;font-size:8px;text-align:center;padding:3px;color:#fff" id="av-edit-lbl">変更</div>
          </div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="handleAvatarChange(event)">
        <div class="profile-info" onclick="toggleProfileBody()" style="cursor:pointer;flex:1;min-width:0">
          <div class="profile-name" id="profile-name">-</div>
          <div class="profile-email" id="profile-email">-</div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;cursor:pointer" onclick="toggleProfileBody()">
          <span id="profile-edit-hint" style="font-family:Noto Sans JP,sans-serif;font-size:11px;color:var(--td)">プロフィール編集</span>
          <div class="profile-chevron" id="profile-chevron">▼</div>
        </div>
      </div>
      <!-- 折りたたみ本体 -->
      <div class="profile-body" id="profile-body">
        <div class="section-title" id="mp-section-profile">プロフィール編集</div>
        <div class="edit-form-row">
          <label class="edit-lbl" id="mp-lbl-username">ユーザー名</label>
          <input class="edit-input" id="edit-username" type="text" maxlength="30">
        </div>
        <div class="edit-form-row">
          <label class="edit-lbl" id="mp-lbl-bio">自己紹介</label>
          <textarea class="edit-input" id="edit-bio"></textarea>
        </div>
        <div class="edit-form-row">
          <label class="edit-lbl" id="mp-lbl-amp">使用アンプ</label>
          <input class="edit-input" id="edit-amp" type="text" placeholder="例: Fender Twin Reverb">
        </div>
        <div class="edit-form-row">
          <label class="edit-lbl" id="mp-lbl-x">X（Twitter）URL</label>
          <input class="edit-input" id="edit-x-url" type="url" placeholder="https://x.com/yourname">
        </div>
        <div class="edit-form-row">
          <label class="edit-lbl" id="mp-lbl-ig">Instagram URL</label>
          <input class="edit-input" id="edit-instagram-url" type="url" placeholder="https://instagram.com/yourname">
        </div>
        <button class="save-btn" id="mp-save-btn" onclick="saveProfile()">プロフィールを保存</button>
        <button class="logout-btn" id="mp-logout-btn" onclick="doLogout()">ログアウト</button>
      </div>
    </div>

    <!-- タブバー -->
    <div class="tab-bar">
      <div class="tab on" id="my-tab-posts" onclick="switchMyTab('posts')">自分の投稿</div>
      <div class="tab" id="my-tab-likes" onclick="switchMyTab('likes')">いいねした投稿</div>
      <div class="tab" id="my-tab-gacha" onclick="switchMyTab('gacha')">🎰 ガチャ保存</div>
      <div class="tab" id="my-tab-notif" onclick="switchMyTab('notif')">通知 <span class="notif-badge" id="notif-badge" style="display:none">0</span></div>
    </div>
    <div id="my-panel-posts" class="post-list"></div>
    <div id="my-panel-likes" class="post-list" style="display:none"></div>
    <div id="my-panel-gacha" class="gacha-save-list" style="display:none"></div>
    <div id="my-panel-notif" style="display:none"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://yzqfockzgyfjmngygbhp.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cWZvY2t6Z3lmam1uZ3lnYmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxODksImV4cCI6MjA4OTY3MjE4OX0.Cn4UMJ8y6CHuIMDeFEShej4t1p4syweLgo5ZXZNs-_g';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
function detectLang(){const saved=localStorage.getItem('mgmb_lang');if(saved)return saved;const bl=navigator.language||navigator.userLanguage||'ja';return bl.toLowerCase().startsWith('ja')?'ja':'en';}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();const password=document.getElementById('login-password').value;
  const err=document.getElementById('login-err');const btn=document.getElementById('login-btn');
  if(!email||!password){err.textContent=tr('errEmailPw');return;}
  btn.disabled=true;btn.textContent=tr('loginBtnLoading');
  const{error}=await sb.auth.signInWithPassword({email,password});
  btn.disabled=false;btn.textContent=tr('loginBtn');
  if(error){if(error.message.includes('Invalid login'))err.textContent=tr('errInvalidLogin');else if(error.message.includes('Email not confirmed'))err.textContent=tr('errNotConfirmed');else err.textContent='❌ '+error.message;return;}
  err.textContent='';
}
async function doRegister(){
  const username=document.getElementById('reg-username').value.trim();const email=document.getElementById('reg-email').value.trim();const password=document.getElementById('reg-password').value;
  const err=document.getElementById('register-err');const btn=document.getElementById('register-btn');
  if(!username){err.textContent=tr('errUsername');return;}if(!email){err.textContent=tr('errEmail');return;}if(password.length<6){err.textContent=tr('errPwShort');return;}
  btn.disabled=true;btn.textContent=tr('registerBtnLoading');
  const{data,error}=await sb.auth.signUp({email,password,options:{data:{username}}});
  btn.disabled=false;btn.textContent=tr('registerBtn');
  if(error){if(error.message.includes('already registered'))err.textContent=tr('errAlreadyReg');else err.textContent='❌ '+error.message;return;}
  if(data.user){await sb.from('users').upsert({id:data.user.id,email,username,password_hash:''},{onConflict:'id'});}
  err.textContent='';showToast(tr('toastRegister'));
  ['reg-username','reg-email','reg-password'].forEach(id=>document.getElementById(id).value='');
}

// ★ アバターメニュー開閉
function openAvatarMenu(e){
  e.stopPropagation();
  closeAvatarMenu();
  const isEn=lang==='en';
  const hasCustomAvatar=!!document.querySelector('#profile-avatar img');
  const menu=document.createElement('div');
  menu.className='avatar-menu';
  menu.id='avatar-menu';
  menu.innerHTML=
    `<div class="avatar-menu-item" onclick="triggerAvatarUpload()">
      <span>📷</span><span>${isEn?'Upload image':'画像をアップロード'}</span>
    </div>`+
    (hasCustomAvatar?`<div class="avatar-menu-item danger" onclick="setDefaultAvatar()">
      <span>↩️</span><span>${isEn?'Reset to default':'デフォルトに戻す'}</span>
    </div>`:'');
  // アバターの位置を取得してメニューをその直下に表示
  const av=document.getElementById('profile-avatar');
  const rect=av.getBoundingClientRect();
  // メニューをbodyに追加（アバターの子ではなく）
  document.body.appendChild(menu);
  // 位置計算：アバターの左下、画面右端に収まるよう調整
  const menuW=180;
  let left=rect.left;
  let top=rect.bottom+8;
  // 画面右端をはみ出す場合は右寄せ
  if(left+menuW>window.innerWidth-8)left=window.innerWidth-menuW-8;
  // 画面下端をはみ出す場合は上に表示
  const menuH=hasCustomAvatar?92:46;
  if(top+menuH>window.innerHeight-8)top=rect.top-menuH-8;
  menu.style.left=Math.max(8,left)+'px';
  menu.style.top=top+'px';
  setTimeout(()=>document.addEventListener('click',closeAvatarMenu,{once:true}),10);
}
function closeAvatarMenu(){
  const menu=document.getElementById('avatar-menu');
  if(menu)menu.remove();
}
function triggerAvatarUpload(){
  closeAvatarMenu();
  document.getElementById('avatar-input').click();
}

// ★ Supabase Storageから古いアバター画像を削除するヘルパー
async function deleteOldAvatar(avatarUrl){
  if(!avatarUrl)return;
  try{
    // URLからStorageのパスを抽出
    // 例: https://xxx.supabase.co/storage/v1/object/public/post-images/avatars/uid_xxx.jpg
    const match=avatarUrl.match(/\/public\/post-images\/(.+)$/);
    if(match&&match[1]){
      await sb.storage.from('post-images').remove([match[1]]);
    }
  }catch(e){console.warn('古い画像削除に失敗（続行）',e);}
}

// ★ デフォルト（頭文字）に戻す
async function setDefaultAvatar(){
  closeAvatarMenu();
  if(!currentUser)return;
  const isEn=lang==='en';
  // 現在のavatar_urlを取得して削除
  const{data}=await sb.from('users').select('avatar_url').eq('id',currentUser.id).single();
  if(data?.avatar_url)await deleteOldAvatar(data.avatar_url);
  // DBのavatar_urlをnullに
  await sb.from('users').update({avatar_url:null}).eq('id',currentUser.id);
  // UIをデフォルトに戻す
  const username=document.getElementById('profile-name').textContent||'U';
  const av=document.getElementById('profile-avatar');
  av.querySelector('div').innerHTML=
    `<span id="avatar-initial">${username[0].toUpperCase()}</span>`+
    `<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);font-family:Noto Sans JP,sans-serif;font-size:8px;text-align:center;padding:3px;color:#fff">${isEn?'Edit':'変更'}</div>`;
  showToast(isEn?'✅ Reset to default':'✅ デフォルトに戻しました');
}

async function handleAvatarChange(e){
  const file=e.target.files[0];if(!file)return;
  const isEn=lang==='en';
  const MAX=512;
  const compressed=await new Promise(resolve=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let{width,height}=img;
        if(width>MAX||height>MAX){const ratio=Math.min(MAX/width,MAX/height);width=Math.round(width*ratio);height=Math.round(height*ratio);}
        const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;
        canvas.getContext('2d').drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg',0.85));
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  });
  showToast(isEn?'📤 Uploading...':'📤 アップロード中...');
  // 古い画像を先に取得して後で削除
  const{data:userData}=await sb.from('users').select('avatar_url').eq('id',currentUser.id).single();
  const oldUrl=userData?.avatar_url||null;
  const byteStr=atob(compressed.split(',')[1]);
  const mime='image/jpeg';
  const ab=new ArrayBuffer(byteStr.length);
  const ia=new Uint8Array(ab);
  for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
  const blob=new Blob([ab],{type:mime});
  // ユーザーIDをファイル名に使うことで常に1ファイルのみ保持（upsert:true）
  const fn='avatars/'+currentUser.id+'.jpg';
  const{error}=await sb.storage.from('post-images').upload(fn,blob,{contentType:mime,upsert:true});
  if(error){showToast(isEn?'❌ Upload failed':'❌ アップロードに失敗しました');return;}
  const{data:u}=sb.storage.from('post-images').getPublicUrl(fn);
  // キャッシュバスティング用にタイムスタンプ付きURLをDBに保存
  const finalUrl=u.publicUrl+'?t='+Date.now();
  await sb.from('users').update({avatar_url:finalUrl}).eq('id',currentUser.id);
  // 旧URLが別パスだった場合は削除（ファイル名が変わった場合のみ）
  if(oldUrl&&!oldUrl.includes('/avatars/'+currentUser.id+'.jpg')){
    await deleteOldAvatar(oldUrl);
  }
  showToast(isEn?'✅ Avatar updated':'✅ アバターを更新しました');
  e.target.value='';
  setTimeout(()=>location.reload(),1200);
}

async function loadGachaSaves(){
  if(!currentUser)return;
  const el=document.getElementById('my-panel-gacha');
  el.innerHTML=`<div class="empty-msg">${tr('loading')}</div>`;
  try{
    const{data,error}=await sb
      .from('gacha_saves')
      .select('id,rarity,created_at,pedals(id,brand,model,slug,image_url,types)')
      .eq('user_id',currentUser.id)
      .order('created_at',{ascending:false})

    if(error)throw error;
    if(!data||!data.length){
      el.innerHTML=`<div class="empty-msg">${tr('emptyGacha')}</div>`;return;
    }
    el.innerHTML=data.map(s=>gachaSaveItemHTML(s)).join('');
  }catch(e){
    console.error('gacha saves error',e);
    el.innerHTML=`<div class="empty-msg">${tr('emptyGacha')}</div>`;
  }
}

function gachaSaveItemHTML(s){
  const p=s.pedals;
  if(!p)return'';
  const rarity=s.rarity||'Std';
  const rarityColors={SSR:'rarity-SSR',SR:'rarity-SR',Sp:'rarity-Sp',Std:'rarity-Std'};
  const badgeCls=rarityColors[rarity]||'rarity-Std';
  const imgSrc=p.image_url||'';
  const typeIcon=p.types&&p.types[0]?`https://yzqfockzgyfjmngygbhp.supabase.co/storage/v1/object/public/pedal-images/type-icons/type_${p.types[0]}.png`:'';
  const img=imgSrc
    ?`<img class="gacha-save-img" src="${escHtml(imgSrc)}" loading="lazy" onerror="this.src='${escHtml(typeIcon)}'">`
    :(typeIcon?`<img class="gacha-save-img" src="${escHtml(typeIcon)}" loading="lazy">`:`<div class="gacha-save-img-empty">🎛</div>`);
  const date=timeAgo(s.created_at);
  const rarityNames={SSR:'Legendary',SR:'Expert',Sp:'Specialist',Std:'Standard'};
  const rarityName=lang==='en'?(rarityNames[rarity]||rarity):(rarityNames[rarity]||rarity);
  return`<div class="gacha-save-item" onclick="location.href='/pedal?slug=${escHtml(p.slug)}'">${img}<div class="gacha-save-info"><div class="gacha-save-brand">${escHtml(p.brand)}</div><div class="gacha-save-model">${escHtml(p.model)}</div><div class="gacha-save-meta"><span class="gacha-rarity-badge ${badgeCls}">${rarity}</span><span class="gacha-save-date">${date}</span></div></div><div class="gacha-save-arrow" style="font-family:Noto Sans JP,sans-serif;font-size:10px;white-space:nowrap">${lang==='en'?'Detail →':'ペダル詳細ページへ →'}</div></div>`;
}

function postItemHTML(p){
  const thumb=p.image_urls&&p.image_urls[0]?`<img class="post-thumb" src="${p.image_urls[0]}" loading="lazy">`:`<div class="post-thumb-empty">${p.post_type==='gear'?'🎸':'🎛'}</div>`;
  return`<div class="post-item" onclick="location.href='/post?id=${p.id}'">${thumb}<div class="post-info"><div class="post-item-title">${escHtml(p.title)}</div><div class="post-item-meta">${timeAgo(p.created_at)}</div><div class="post-item-likes">❤️ ${p.likes||0}</div></div></div>`;
}
async function loadNotifCount(){
  if(!currentUser)return;
  const{count}=await sb.from('notifications').select('id',{count:'exact',head:true}).eq('user_id',currentUser.id).eq('is_read',false);
  const badge=document.getElementById('notif-badge');
  if(count&&count>0){badge.textContent=count;badge.style.display='inline-flex';}else{badge.style.display='none';}
}
async function loadNotifications(){
  if(!currentUser)return;const el=document.getElementById('my-panel-notif');el.innerHTML=`<div class="empty-msg">${tr('loading')}</div>`;
  const{data}=await sb.from('notifications').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(30);
  await sb.from('notifications').update({is_read:true}).eq('user_id',currentUser.id).eq('is_read',false);
  document.getElementById('notif-badge').style.display='none';
  if(!data||!data.length){el.innerHTML=`<div class="empty-msg">${tr('emptyNotif')}</div>`;return;}
  el.innerHTML=data.map(n=>`<div style="padding:14px;background:${n.is_read?'var(--sf)':'rgba(232,85,45,.06)'};border:1px solid ${n.is_read?'var(--bd)':'rgba(232,85,45,.2)'};border-radius:6px;margin-bottom:8px;cursor:pointer" onclick="${n.post_id?`location.href='/post?id=${n.post_id}'`:''}"><div style="font-size:13px;margin-bottom:4px">${escHtml(n.message)}</div><div style="font-family:Noto Sans JP,sans-serif;font-size:11px;color:var(--td)">${timeAgo(n.created_at)}</div></div>`).join('');
}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function timeAgo(ts){const d=Math.floor((Date.now()-new Date(ts))/1000);if(lang==='en'){if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}if(d<60)return'たった今';if(d<3600)return Math.floor(d/60)+'分前';if(d<86400)return Math.floor(d/3600)+'時間前';return Math.floor(d/86400)+'日前';}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}
</script>
