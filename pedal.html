<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペダル詳細 | My Gear My Board</title>
  <meta name="description" content="" id="meta-description">
  <meta property="og:title" content="My Gear My Board" id="og-title">
  <meta property="og:description" content="" id="og-description">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0e; --sf: #151517; --sf2: #1c1c1f;
      --bd: #272729; --ac: #e8552d; --tx: #eae8e2; --tm: #9a9890; --td: #6e6c68;
      --amazon: #ffc107; --sweetwater: #1a73e8; --soundhouse: #654874;
      --rakuten: #bf0000; --reverb: #f35936; --mercari: #ff0211; --mercari-accent: #4dc9fe;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--tx); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 100vh; }
    header { background: rgba(13,13,14,.96); backdrop-filter: blur(14px); border-bottom: 1px solid var(--bd); padding: 0; display: flex; flex-direction: column; position: sticky; top: 0; z-index: 100; }
    .header-row1 { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 16px 4px; border-bottom: 1px solid rgba(39,39,41,.6); }
    .header-row2 { display: flex; align-items: center; justify-content: flex-start; gap: 6px; padding: 4px 16px 6px; }
    .header-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex: 1; min-width: 0; }
    .header-logo img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 3px; color: var(--tx); white-space: nowrap; }
    .header-sub { font-size: 9px; letter-spacing: 2px; color: var(--ac); text-transform: uppercase; margin-top: 1px; white-space: nowrap; }
    .lang-btn { display: flex; align-items: center; gap: 4px; padding: 6px 10px; background: var(--sf); border: 1px solid var(--bd); border-radius: 4px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600; color: var(--tm); cursor: pointer; transition: all .15s; touch-action: manipulation; }
    .lang-btn:hover { border-color: var(--ac); color: var(--ac); }
    .home-btn { display: flex; align-items: center; gap: 4px; padding: 5px 10px; background: var(--sf); border: 1px solid var(--bd); border-radius: 4px; font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 600; color: var(--tm); cursor: pointer; transition: all .15s; text-decoration: none; white-space: nowrap; }
    .home-btn:hover { border-color: var(--ac); color: var(--ac); }
    .breadcrumb { background: var(--sf); border-bottom: 1px solid var(--bd); padding: 10px 16px; font-size: 12px; color: var(--tm); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .breadcrumb a { color: var(--tm); text-decoration: none; }
    .breadcrumb a:hover { color: var(--tx); }
    .breadcrumb .sep { color: var(--bd); }
    .breadcrumb .current { color: var(--tx); }
    /* ★ PCレイアウト：中央ペダル情報 + 右サイドレビュー */
    .page-wrapper { padding: 20px 16px 60px; }
    .page-layout { max-width: 760px; margin: 0 auto; }
    .page-main { width: 100%; }
    .page-side { display: none; }
    @media(min-width: 900px) {
      .page-wrapper { padding: 24px 24px 60px; }
      .page-layout { display: grid; grid-template-columns: 1fr 300px; gap: 24px; max-width: 1160px; margin: 0 auto; align-items: start; }
      .page-side { display: block; position: sticky; top: 90px; max-height: calc(100vh - 110px); overflow-y: auto; }
    }
    /* ★ スマホタブUI */
    .mob-tabs { display: none; position: sticky; top: 78px; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--bd); }
    .mob-tabs-inner { display: flex; }
    .mob-tab { flex: 1; padding: 11px 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 600; color: var(--tm); text-align: center; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; touch-action: manipulation; }
    .mob-tab.on { color: var(--ac); border-bottom-color: var(--ac); }
    .mob-panel { display: block; }
    .mob-panel.hidden { display: none; }
    @media(max-width: 899px) {
      .mob-tabs { display: block; }
      .page-main { padding-top: 0; }
    }
    /* 既存スタイル */
    .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
    .loading { text-align: center; padding: 60px 20px; color: var(--tm); }
    .error-box { background: var(--sf); border: 1px solid #c0392b; border-radius: 12px; padding: 40px 20px; text-align: center; color: var(--tm); }
    .pedal-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .pedal-top { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: 20px; text-align: center; }
    .pedal-image-block { width: 150px; flex-shrink: 0; }
    .pedal-image { width: 150px; height: 150px; background: var(--sf2); border: 1px solid var(--bd); display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; }
    .pedal-info { width: 100%; }
    .type-badges { justify-content: center; }
    .pedal-image.no-source { border-radius: 12px; }
    .pedal-image.no-img { cursor: default; }
    .pedal-image img { width: 100%; height: 100%; object-fit: contain; }
    .pedal-image-placeholder { font-size: 40px; opacity: .3; }
    .image-source { background: var(--sf2); border: 1px solid var(--bd); border-top: none; border-radius: 0 0 12px 12px; padding: 3px 6px; text-align: center; font-size: 8px; color: #555; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 150px; }
    @media(min-width: 900px) {
      .pedal-card { padding: 32px; }
      .pedal-top { flex-direction: row; align-items: flex-start; gap: 28px; text-align: left; }
      .pedal-image-block { width: 200px; }
      .pedal-image { width: 200px; height: 200px; }
      .pedal-image.has-source { border-radius: 16px 16px 0 0; }
      .pedal-image.no-source { border-radius: 16px; }
      .image-source { width: 200px; }
      .pedal-info { width: auto; }
      .type-badges { justify-content: flex-start; }
      .pedal-name { font-size: 32px; }
    }
    .pedal-info { flex: 1; min-width: 0; }
    .pedal-brand { font-size: 12px; font-weight: 700; color: var(--ac); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
    .pedal-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; line-height: 1.2; margin-bottom: 10px; word-break: break-word; }
    .type-badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .type-badge { background: var(--sf2); border: 1px solid var(--bd); color: var(--tm); font-size: 11px; padding: 3px 10px; border-radius: 20px; }
    .quick-nav { display: flex; flex-direction: row; gap: 6px; padding: 14px 0 4px; border-top: 1px solid var(--bd); }
    .quick-nav-chip { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 9px 4px; background: var(--sf2); border: 1px solid var(--bd); border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 500; color: var(--tm); cursor: pointer; text-decoration: none; transition: border-color .15s, color .15s, background .15s; touch-action: manipulation; text-align: center; min-width: 0; }
    .quick-nav-chip:hover { border-color: var(--ac); color: var(--ac); background: rgba(232,85,45,.05); }
    .quick-nav-chip-icon { font-size: 16px; line-height: 1; }
    .quick-nav-chip-label { font-size: 10px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
    .pedal-description-wrap { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--bd); position: relative; }
    .pedal-description { font-size: 14px; color: var(--tm); line-height: 1.7; font-family: 'Noto Sans JP', sans-serif; max-height: 8.5em; overflow: hidden; transition: max-height .4s ease; }
    .pedal-description.expanded { max-height: 9999px; }
    .pedal-description.empty { font-style: italic; color: var(--td); max-height: none; }
    .pedal-description h2 { font-size: 17px; font-weight: 700; color: var(--tx); margin: 14px 0 6px; }
    .pedal-description h3 { font-size: 14px; font-weight: 600; color: var(--tm); margin: 10px 0 4px; }
    .pedal-description b { font-weight: 700; color: var(--tx); }
    .desc-toggle-btn { display: block; width: 100%; margin-top: 10px; padding: 9px; background: var(--sf2); border: 1px solid var(--bd); border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600; color: var(--ac); cursor: pointer; text-align: center; transition: border-color .15s, background .15s; touch-action: manipulation; }
    .desc-toggle-btn:hover { border-color: var(--ac); background: rgba(232,85,45,.06); }
    .desc-toggle-btn.hidden { display: none; }
    .desc-updated { margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--td); text-align: right; }
    .yt-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .yt-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; margin-bottom: 14px; }
    .yt-embed-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; background: #000; }
    .yt-embed-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 10px; }
    .yt-loading { aspect-ratio: 16/9; background: var(--sf2); border-radius: 10px; border: 1px solid var(--bd); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .yt-loading-icon { font-size: 32px; opacity: .3; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.6} }
    .yt-loading-text { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--td); }
    .yt-fallback { aspect-ratio: 16/9; background: var(--sf2); border-radius: 10px; border: 1px solid var(--bd); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 20px; }
    .yt-fallback-icon { font-size: 36px; opacity: .25; }
    .yt-fallback-text { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--td); text-align: center; line-height: 1.6; }
    .yt-fallback-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #ff0000; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 600; color: #fff; text-decoration: none; transition: opacity .15s; }
    .yt-fallback-btn:hover { opacity: .85; }
    .buy-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 20px; margin-bottom: 16px; scroll-margin-top: 132px; }
    @media(min-width: 900px) { .buy-card { scroll-margin-top: 100px; } }
    .buy-card-title { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--td); margin-bottom: 12px; text-align: center; letter-spacing: 1px; }
    .buy-buttons { display: flex; flex-direction: column; gap: 10px; }
    .buy-btn { display: block; width: 100%; padding: 14px; border-radius: 10px; text-align: center; font-size: 15px; font-weight: 700; text-decoration: none; border: none; cursor: pointer; transition: opacity .2s; font-family: 'Noto Sans JP', sans-serif; }
    .buy-btn:hover { opacity: .85; }
    .buy-btn.soundhouse { background: var(--soundhouse); color: #fff; }
    .buy-btn.sweetwater { background: var(--sweetwater); color: #fff; }
    .buy-btn.amazon { background: var(--amazon); color: #111; }
    .buy-btn.rakuten { background: var(--rakuten); color: #fff; }
    .buy-btn.reverb { background: var(--reverb); color: #fff; }
    .buy-btn.mercari { background: var(--mercari); color: #fff; }
    .buy-card-disclaimer { font-family: 'Noto Sans JP', sans-serif; font-size: 10px; color: var(--td); text-align: center; margin-top: 12px; line-height: 1.6; }
    .boards-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .boards-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; margin-bottom: 16px; }
    .boards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .board-item { background: var(--sf2); border: 1px solid var(--bd); border-radius: 10px; overflow: hidden; text-decoration: none; color: var(--tx); display: block; transition: border-color .2s; }
    .board-item:hover { border-color: var(--ac); }
    .board-thumb { width: 100%; aspect-ratio: 4/3; background: var(--sf); overflow: hidden; }
    .board-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .board-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--bd); }
    .board-meta { padding: 10px; }
    .board-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .board-user { font-size: 11px; color: var(--tm); }
    .empty-state { text-align: center; padding: 36px 20px; }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; opacity: .4; }
    .empty-state-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--tm); margin-bottom: 8px; }
    .empty-state-text { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--td); line-height: 1.6; margin-bottom: 16px; }
    .empty-state-btn { display: inline-block; padding: 10px 24px; background: var(--ac); border-radius: 4px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600; color: #fff; text-decoration: none; transition: background .15s; }
    .empty-state-btn:hover { background: #cf4c26; }
    /* ★ 評価・レビューパネル */
    .review-panel { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; overflow: hidden; }
    .review-panel-tabs { display: flex; border-bottom: 1px solid var(--bd); }
    .review-panel-tab { flex: 1; padding: 12px 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600; color: var(--tm); text-align: center; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; touch-action: manipulation; }
    .review-panel-tab.on { color: var(--ac); border-bottom-color: var(--ac); }
    .review-panel-body { padding: 16px; }
    /* 星評価 */
    .rating-display { text-align: center; padding: 12px 0 16px; border-bottom: 1px solid var(--bd); margin-bottom: 16px; }
    .rating-avg { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 2px; color: var(--tx); line-height: 1; }
    .rating-stars-display { display: flex; justify-content: center; gap: 4px; margin: 6px 0; }
    .rating-count { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--td); }
    .rating-input-label { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--tm); margin-bottom: 8px; text-align: center; }
    .rating-stars-input { display: flex; justify-content: center; gap: 6px; margin-bottom: 4px; }
    .star-btn { font-size: 24px; cursor: pointer; background: none; border: none; padding: 2px; transition: transform .1s; line-height: 1; touch-action: manipulation; }
    .star-btn:hover { transform: scale(1.2); }
    .star-small { font-size: 16px; }
    /* レビュー */
    .review-form-wrap { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--bd); }
    .review-form-title { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; color: var(--tm); margin-bottom: 10px; }
    .review-textarea { width: 100%; background: var(--sf2); border: 1px solid var(--bd); border-radius: 8px; padding: 10px 12px; font-size: 16px; color: var(--tx); font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color .15s; resize: vertical; min-height: 80px; }
    .review-textarea:focus { border-color: var(--ac); }
    .review-textarea::placeholder { color: var(--td); }
    .review-form-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; gap: 8px; }
    .review-star-row { display: flex; align-items: center; gap: 4px; }
    .review-submit-btn { padding: 8px 18px; background: var(--ac); border: none; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; color: #fff; cursor: pointer; touch-action: manipulation; transition: background .15s; white-space: nowrap; }
    .review-submit-btn:hover { background: #cf4c26; }
    .review-login-prompt { background: rgba(232,85,45,.06); border: 1px solid rgba(232,85,45,.2); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; text-align: center; }
    .review-login-prompt p { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--tm); margin-bottom: 10px; line-height: 1.6; }
    .review-login-btn { display: inline-block; padding: 8px 20px; background: var(--ac); border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; color: #fff; text-decoration: none; }
    .review-item { padding: 12px 0; border-bottom: 1px solid var(--bd); }
    .review-item:last-child { border-bottom: none; }
    .review-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .review-user { font-size: 12px; font-weight: 700; color: var(--tx); text-decoration: none; }
    .review-user:hover { color: var(--ac); }
    .review-date { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--td); margin-left: auto; }
    .review-body { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--tm); line-height: 1.7; margin-bottom: 8px; white-space: pre-wrap; }
    .review-footer { display: flex; align-items: center; gap: 8px; }
    .review-like-btn { display: flex; align-items: center; gap: 4px; background: none; border: 1px solid var(--bd); border-radius: 20px; padding: 3px 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--tm); cursor: pointer; transition: all .15s; touch-action: manipulation; }
    .review-like-btn:hover { border-color: var(--ac); color: var(--ac); }
    .review-like-btn.liked { border-color: var(--ac); color: var(--ac); }
    .wishlist-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; background: var(--sf); border: 1px solid var(--bd); border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 600; color: var(--tm); cursor: pointer; transition: all .18s; margin-bottom: 10px; touch-action: manipulation; }
    .wishlist-btn:hover { border-color: rgba(232,85,45,.5); color: var(--ac); }
    .wishlist-btn.added { border-color: var(--ac); color: var(--ac); background: rgba(232,85,45,.08); }
    .wishlist-modal { position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); z-index: 800; display: none; align-items: center; justify-content: center; padding: 20px; }
    .wishlist-modal.open { display: flex; }
    .wishlist-modal-box { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 24px; max-width: 360px; width: 100%; text-align: center; }
    .wishlist-modal-icon { font-size: 32px; margin-bottom: 12px; }
    .wishlist-modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; margin-bottom: 8px; }
    .wishlist-modal-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--tm); line-height: 1.7; margin-bottom: 16px; }
    .wishlist-modal-benefits { text-align: left; background: var(--sf2); border-radius: 8px; padding: 12px 14px; margin-bottom: 18px; }
    .wishlist-modal-benefits li { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--tm); line-height: 1.8; list-style: none; padding-left: 14px; position: relative; }
    .wishlist-modal-benefits li::before { content: '✓'; position: absolute; left: 0; color: var(--ac); font-size: 10px; }
    .review-edit-btn { background: none; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--td); cursor: pointer; padding: 3px 6px; }
    .review-edit-btn:hover { color: var(--tm); }
    .review-empty { text-align: center; padding: 28px 16px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--td); }
    /* Lightbox */
    .pedal-lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.92); backdrop-filter: blur(6px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; pointer-events: none; transition: opacity .25s; cursor: zoom-out; }
    .pedal-lightbox.open { opacity: 1; pointer-events: all; }
    .pedal-lightbox img { max-width: 92vw; max-height: 86vh; object-fit: contain; border-radius: 8px; border: 1px solid var(--bd); transform: scale(.9); transition: transform .25s; }
    .pedal-lightbox.open img { transform: scale(1); }
    .pedal-lightbox-close { position: absolute; top: 16px; right: 16px; width: 38px; height: 38px; background: rgba(255,255,255,.12); border: none; border-radius: 50%; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }

function initMobSwipe(){
  const container=document.querySelector('.mob-tabs')?.closest('div')?.parentElement;
  // body全体でスワイプ検出
  let startX=0, startY=0, swipeDecided=false, isHoriz=false;
  const THRESHOLD=60, ANGLE=0.5;
  document.addEventListener('touchstart', e=>{
    if(window.innerWidth>=900)return;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    swipeDecided=false; isHoriz=false;
  },{passive:true});
  document.addEventListener('touchmove', e=>{
    if(window.innerWidth>=900)return;
    if(swipeDecided)return;
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;
    if(Math.abs(dx)>10||Math.abs(dy)>10){
      swipeDecided=true;
      isHoriz=Math.abs(dx)>Math.abs(dy)*(1/ANGLE);
    }
  },{passive:true});
  document.addEventListener('touchend', e=>{
    if(window.innerWidth>=900||!isHoriz)return;
    const dx=e.changedTouches[0].clientX-startX;
    const infoActive=document.getElementById('mob-tab-info').classList.contains('on');
    if(dx < -THRESHOLD && infoActive) switchMobTab('review');
    else if(dx > THRESHOLD && !infoActive) switchMobTab('info');
  },{passive:true});
}

const RECOMMEND_LIMIT=6;
let recommendOffset=0,recommendPedalId=null,recommendTypes=[],recommendSeenIds=new Set();
async function loadRecommendedPedals(pedal){
  recommendOffset=0;recommendPedalId=pedal.id;recommendTypes=pedal.types||[];recommendSeenIds=new Set();
  const detailEl=document.getElementById('content');if(!detailEl)return;
  const recSection=document.createElement('div');
  recSection.id='recommend-section';recSection.style.cssText='margin-top:16px';

  recSection.innerHTML=`<div style="background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:20px"><div id="recommend-title" style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;margin-bottom:14px">${title}</div><div id="recommend-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px"></div><button id="recommend-more-btn" onclick="loadMoreRecommended()" style="display:none;width:100%;margin-top:12px;padding:12px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;color:var(--tm);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer">${tr('recommendLoadMore')}</button></div>`;
  detailEl.appendChild(recSection);

async function fetchRecommended(){
  if(!recommendTypes.length)return;
  const STORAGE='https://yzqfockzgyfjmngygbhp.supabase.co/storage/v1/object/public/pedal-images/type-icons/';
  const FETCH_CHUNK=RECOMMEND_LIMIT+2;
  const{data,count,error}=await db.from('pedals').select('id,brand,model,slug,types,image_url,description,view_count',{count:'exact'}).contains('types',[recommendTypes[0]]).not('id','eq',recommendPedalId).not('description','is',null).not('youtube_video_id','is',null).order('view_count',{ascending:false,nullsFirst:false}).order('id',{ascending:true}).range(recommendOffset,recommendOffset+FETCH_CHUNK-1);
  const grid=document.getElementById('recommend-grid');if(!grid)return;
  if(error){console.error('recommend fetch error',error);return;}
  const rawData=data||[];
  // ★ DBから生で取得した件数ぶん、必ずオフセットを進める（重複除外後の件数で進めると同じ範囲を再取得し続けてしまうバグの原因だった）
  recommendOffset+=rawData.length;
  let newData=rawData.filter(p=>!recommendSeenIds.has(p.id));
  const reachedEnd=rawData.length<FETCH_CHUNK||(count!==null&&recommendOffset>=count);
  if(!newData.length){
    if(grid.children.length===0)grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:24px;font-size:13px;color:var(--td)">${tr('recommendEmpty')}</div>`;
    const btn=document.getElementById('recommend-more-btn');
    if(btn)btn.style.display=reachedEnd?'none':'block';
    return;
  }
  // グリッド全体の表示数が常に偶数になるよう調整
  const currentTotal=grid.children.length;
  const targetTotal=currentTotal+newData.length;
  const evenTotal=targetTotal%2===0?targetTotal:targetTotal-1;
  const toShow=Math.max(0,evenTotal-currentTotal);
  if(toShow===0)return;
  newData=newData.slice(0,toShow);
  newData.forEach(p=>{
    recommendSeenIds.add(p.id);
    const typeIcon=p.types&&p.types[0]?`${STORAGE}type_${p.types[0]}.png`:'';
    let imgHtml;
    if(p.image_url){
      const fallback=typeIcon
        ?`this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='flex'};this.src='${typeIcon}'`
        :`this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex'`;
      imgHtml=`<img src="${p.image_url}" alt="${p.model}" loading="lazy" style="width:100%;height:100%;object-fit:contain" onerror="${fallback}"><span style="display:none;font-size:28px;opacity:.2;width:100%;height:100%;align-items:center;justify-content:center">🎛</span>`;
    }else if(typeIcon){
      imgHtml=`<img src="${typeIcon}" alt="" loading="lazy" style="width:60%;height:60%;object-fit:contain;opacity:.4" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;font-size:28px;opacity:.2;width:100%;height:100%;align-items:center;justify-content:center">🎛</span>`;
    }else{
      imgHtml=`<span style="font-size:28px;opacity:.2">🎛</span>`;
    }
    const card=document.createElement('a');
    card.href=`/pedal?slug=${p.slug}`;
    card.style.cssText='background:var(--sf2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;text-decoration:none;color:var(--tx);display:block;transition:border-color .2s';
    card.onmouseover=()=>card.style.borderColor='var(--ac)';card.onmouseout=()=>card.style.borderColor='var(--bd)';
    card.innerHTML=`<div style="width:100%;aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid var(--bd)">${imgHtml}</div><div style="padding:8px"><div style="font-size:10px;color:var(--ac);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.brand}</div><div style="font-size:12px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${p.model}</div></div>`;
    grid.appendChild(card);
  });
  const btn=document.getElementById('recommend-more-btn');
  if(btn)btn.style.display=reachedEnd?'none':'block';
}
async function loadMoreRecommended(){await fetchRecommended();}

async function fetchBoardsByPedal(pedalFullName){
  const{data:aliases}=await db.from('pedal_aliases').select('alias').eq('pedal_full_name',pedalFullName);
  const searchNames=[pedalFullName,...(aliases||[]).map(a=>a.alias)];
  const{data:posts}=await db.from('posts').select('id,title,username,image_urls,gear_list,created_at').order('created_at',{ascending:false}).limit(200);
  if(!posts)return[];
  const lowerNames=searchNames.map(n=>n.replace(/\t/g,' ').replace(/ +/g,' ').toLowerCase().trim());
  return posts.filter(post=>{const gear=Array.isArray(post.gear_list)?post.gear_list:[];return gear.some(g=>{const gName=(g.name||g||'').replace(/\t/g,' ').replace(/ +/g,' ').toLowerCase().trim();return lowerNames.includes(gName);});}).slice(0,6);
}

// ★ 評価・レビュー機能
let _myRating=0, _hoverRating=0, _myReviewId=null, _myReviewScore=0, _editingReview=false;

function starHTML(score, size='normal'){
  const cls=size==='small'?'star-small':'';
  return [1,2,3,4,5].map(i=>`<span class="${cls}" style="color:${i<=score?'#f0a500':'var(--bd)'}">★</span>`).join('');
}

function renderStarInput(current, onClickFn, idPrefix){
  return `<div class="rating-stars-input" id="${idPrefix}-stars">
    ${[1,2,3,4,5].map(i=>`<button class="star-btn" data-val="${i}"
      onmouseover="hoverStar(${i},'${idPrefix}')"
      onmouseout="hoverStar(0,'${idPrefix}')"
      onclick="${onClickFn}(${i})"
      style="color:${i<=current?'#f0a500':'var(--bd)'}">★</button>`).join('')}
  </div>`;
}

function hoverStar(val, prefix){
  document.querySelectorAll(`#${prefix}-stars button`).forEach((btn,idx)=>{
    btn.style.color=(idx+1)<=(val||_hoverRating||_myRating)?'#f0a500':'var(--bd)';
  });
  _hoverRating=val;
}

async function resetRating(){
  if(!cachedPedal)return;
  await db.from('pedal_ratings').delete().eq('pedal_id',cachedPedal.id).eq('session_id',SESSION_ID);
  _myRating=0;
  showToast(lang==='en'?'Rating removed':'評価をリセットしました');
  const pcWrap=document.getElementById('pc-review-panel-wrap');
  if(pcWrap)await renderReviewPanel(pcWrap,cachedPedal,currentSession);
  if(_mobReviewLoaded){const mobWrap=document.getElementById('mob-review-panel-wrap');if(mobWrap)await renderReviewPanel(mobWrap,cachedPedal,currentSession);}
}

async function submitRating(score){
  if(!cachedPedal)return;
  _myRating=score;
  const existing=await db.from('pedal_ratings').select('id').eq('pedal_id',cachedPedal.id).eq('session_id',SESSION_ID).maybeSingle();
  if(existing.data){
    await db.from('pedal_ratings').update({score,updated_at:new Date().toISOString()}).eq('id',existing.data.id);
  }else{
    await db.from('pedal_ratings').insert({pedal_id:cachedPedal.id,session_id:SESSION_ID,score});
  }
  showToast(lang==='en'?`⭐ Rated ${score}/5`:`⭐ ${score}点で評価しました`);
  // 再レンダリング（PC・スマホ両方）
  const pcWrap=document.getElementById('pc-review-panel-wrap');
  if(pcWrap) renderReviewPanel(pcWrap,cachedPedal,currentSession);
  if(_mobReviewLoaded){const mobWrap=document.getElementById('mob-review-panel-wrap');if(mobWrap)renderReviewPanel(mobWrap,cachedPedal,currentSession);}
}

function hoverReviewStar(val){
  _myReviewScore=val;
  document.querySelectorAll('.review-star-input button').forEach((btn,idx)=>{
    btn.style.color=(idx+1)<=val?'#f0a500':'var(--bd)';
  });
}

async function submitReview(){
  if(!currentSession){showToast(tr('reviewLoginMsg'));return;}
  const textarea=document.querySelector('.review-textarea');
  if(!textarea)return;
  const body=textarea.value.trim();
  if(!body){showToast(lang==='en'?'Please write a review.':'レビュー本文を入力してください。');return;}
  const username=currentSession._username||currentSession.user?.user_metadata?.username||null;
  if(_myReviewId){
    // 編集
    await db.from('pedal_reviews').update({body,rating_score:_myReviewScore||null,updated_at:new Date().toISOString()}).eq('id',_myReviewId);
    showToast(lang==='en'?'✅ Review updated':'✅ レビューを更新しました');
  }else{
    // 新規
    await db.from('pedal_reviews').insert({pedal_id:cachedPedal.id,user_id:currentSession.user.id,username,body,rating_score:_myReviewScore||null});
    showToast(lang==='en'?'✅ Review posted!':'✅ レビューを投稿しました！');
  }
  _editingReview=false;
  const pcWrap=document.getElementById('pc-review-panel-wrap');
  if(pcWrap)renderReviewPanel(pcWrap,cachedPedal,currentSession);
  if(_mobReviewLoaded){const mobWrap=document.getElementById('mob-review-panel-wrap');if(mobWrap)renderReviewPanel(mobWrap,cachedPedal,currentSession);}
}

async function toggleReviewLike(reviewId, el){
  const cnt=el.querySelector('.like-count');
  const{data:ex}=await db.from('pedal_review_likes').select('id').eq('review_id',reviewId).eq('session_id',SESSION_ID).maybeSingle();
  if(ex){
    await db.from('pedal_review_likes').delete().eq('review_id',reviewId).eq('session_id',SESSION_ID);
    const n=Math.max(0,(parseInt(cnt.textContent)||1)-1);
    await db.from('pedal_reviews').update({likes:n}).eq('id',reviewId);
    cnt.textContent=n;el.classList.remove('liked');
  }else{
    await db.from('pedal_review_likes').insert({review_id:reviewId,session_id:SESSION_ID});
    const{data:rev}=await db.from('pedal_reviews').select('likes').eq('id',reviewId).single();
    const n=(rev?.likes||0)+1;
    await db.from('pedal_reviews').update({likes:n}).eq('id',reviewId);
    cnt.textContent=n;el.classList.add('liked');showToast(tr('reviewLiked'));
  }
}

function formatDate(isoStr){
  if(!isoStr)return'';const d=new Date(isoStr);
  if(lang==='en')return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

async function renderReviewPanel(wrapEl, pedal, session){
  if(!wrapEl)return;

  // データ取得
  const[ratingsRes, reviewsRes, myRatingRes, myLikesRes]=await Promise.all([
    db.from('pedal_ratings').select('score').eq('pedal_id',pedal.id),
    db.from('pedal_reviews').select('*').eq('pedal_id',pedal.id).order('created_at',{ascending:false}),
    db.from('pedal_ratings').select('score').eq('pedal_id',pedal.id).eq('session_id',SESSION_ID).maybeSingle(),
    db.from('pedal_review_likes').select('review_id').eq('session_id',SESSION_ID),
  ]);

  const ratings=ratingsRes.data||[];
  const reviews=reviewsRes.data||[];
  const myRating=myRatingRes.data?.score||0;
  const myLikedIds=new Set((myLikesRes.data||[]).map(l=>l.review_id));
  // DBの最新値を常に反映（リセット・投票後も正しく表示）
  _myRating=myRating;

  // レビュー件数更新
  _reviewCount=reviews.length;
  updateReviewTabCount();

  // 平均評価
  const avgScore=ratings.length?Math.round((ratings.reduce((s,r)=>s+r.score,0)/ratings.length)*10)/10:0;

  // 自分のレビュー確認
  const myReview=session?reviews.find(r=>r.user_id===session.user.id):null;
  if(myReview&&!_editingReview)_myReviewId=myReview.id;

  // HTML生成
  let html=`<div class="review-panel">
    <div class="review-panel-tabs">
      <div class="review-panel-tab on" id="pc-review-tab">${tr('tabReview')}${reviews.length>0?` (${reviews.length})`:''}</div>
    </div>
    <div class="review-panel-body">`;

  // 星評価セクション
  const ratingPrefix='rating-input-'+Math.random().toString(36).slice(2,7);
  html+=`<div class="rating-display">
    <div style="font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--td);margin-bottom:4px">${tr('ratingYours')}</div>
    <div class="rating-avg">${avgScore>0?avgScore:'—'}</div>
    <div class="rating-stars-display">${starHTML(Math.round(avgScore))}</div>
    <div class="rating-count">${ratings.length}${lang==='en'?' '+tr('ratingVotes'):tr('ratingVotes')}</div>
  </div>
  <div class="rating-input-label">${tr('ratingMine')}</div>
  ${renderStarInput(_myRating,'submitRating',ratingPrefix)}
  ${_myRating>0?`<div style="text-align:center;margin-top:4px"><button onclick="resetRating()" style="background:none;border:none;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--td);cursor:pointer;text-decoration:underline">${tr('ratingReset')}</button></div>`:''}
  <div style="height:16px"></div>`;

  // レビューフォームセクション
  if(session){
    const isEdit=_editingReview&&myReview;
    html+=`<div class="review-form-wrap">
      <div class="review-form-title">${isEdit?tr('reviewEdit'):tr('reviewTitle')}</div>
      <textarea class="review-textarea" placeholder="${tr('reviewPlaceholder')}">${isEdit&&myReview?myReview.body:''}</textarea>
      <div class="review-form-actions">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--td)">${tr('reviewOptionalStar')}</span>
          <div class="review-star-input" style="display:flex;gap:2px">
            ${[1,2,3,4,5].map(i=>`<button class="star-btn" style="font-size:18px;color:${i<=(_myReviewScore||myReview?.rating_score||0)?'#f0a500':'var(--bd)'}" onclick="hoverReviewStar(${i})">★</button>`).join('')}
          </div>
        </div>
        <div style="display:flex;gap:6px">
          ${isEdit?`<button class="review-edit-btn" onclick="cancelEditReview()">${tr('reviewCancel')}</button>`:''}
          <button class="review-submit-btn" onclick="submitReview()">${isEdit?tr('reviewSave'):tr('reviewSubmit')}</button>
        </div>
      </div>
    </div>`;
  }else{
    // 未ログイン：フォームは表示するが投稿ボタンで促す
    html+=`<div class="review-form-wrap">
      <div class="review-form-title">${tr('reviewTitle')}</div>
      <textarea class="review-textarea" placeholder="${tr('reviewPlaceholder')}"></textarea>
      <div class="review-form-actions">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--td)">${tr('reviewOptionalStar')}</span>
          <div style="display:flex;gap:2px">
            ${[1,2,3,4,5].map(i=>`<span style="font-size:18px;color:var(--bd)">★</span>`).join('')}
          </div>
        </div>
        <button class="review-submit-btn" onclick="promptLogin()">${tr('reviewSubmit')}</button>
      </div>
      <div id="login-prompt-msg" style="display:none;margin-top:10px">
        <div class="review-login-prompt">
          <p>${tr('reviewLoginMsg')}</p>
          <a href="/mypage" class="review-login-btn">${tr('reviewLoginBtn')}</a>
        </div>
      </div>
    </div>`;
  }

  // レビュー一覧
  if(!reviews.length){
    html+=`<div class="review-empty">${tr('reviewEmpty')}</div>`;
  }else{
    reviews.forEach(r=>{
      const isOwn=session&&r.user_id===session.user.id;
      const liked=myLikedIds.has(r.id);
      const userLink=r.username?`<a href="/user?username=${encodeURIComponent(r.username)}" class="review-user">@${r.username}</a>`:`<span class="review-user">${tr('reviewAnon')}</span>`;
      const starDisp=r.rating_score?`<span style="margin-left:4px">${starHTML(r.rating_score,'small')}</span>`:'';
      html+=`<div class="review-item">
        <div class="review-header">
          ${userLink}${starDisp}
          <span class="review-date">${formatDate(r.created_at)}</span>
        </div>
        <div class="review-body">${escHtml(r.body)}</div>
        <div class="review-footer">
          <button class="review-like-btn ${liked?'liked':''}" onclick="toggleReviewLike('${r.id}',this)">
            ❤️ <span class="like-count">${r.likes||0}</span>
          </button>
          ${isOwn?`<button class="review-edit-btn" onclick="startEditReview('${r.id}',${JSON.stringify(r.body)},${r.rating_score||0})">${tr('reviewEdit')}</button>`:''}
        </div>
      </div>`;
    });
  }

  html+=`</div></div>`;
  wrapEl.innerHTML=html;
  // 星入力の初期表示更新（クラスで全パネル対応）
  document.querySelectorAll('.rating-stars-input button').forEach((btn,idx)=>{
    btn.style.color=(idx+1)<=_myRating?'#f0a500':'var(--bd)';
  });
}

function escHtml(str){return(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function promptLogin(){
  document.querySelectorAll('#login-prompt-msg').forEach(el=>{
    el.style.display=el.style.display==='none'?'block':'none';
  });
}

  const pedalImg=pedal.image_url||'https://mygearmyboard.com/ogp.png';

  const setMeta=(id,attr,val)=>{const el=document.getElementById(id);if(el)el.setAttribute(attr,val);};
  setMeta('meta-description','content',finalDesc);setMeta('og-title','content',`${pedal.full_name} | My Gear My Board`);
  setMeta('og-description','content',finalDesc);setMeta('og-image','content',pedalImg);
  setMeta('og-url','content',pedalUrl);setMeta('tw-title','content',`${pedal.full_name} | My Gear My Board`);
  setMeta('tw-description','content',finalDesc);setMeta('tw-image','content',pedalImg);
  setMeta('canonical','href',pedalUrl);

  // JSON-LD（aggregateRatingはレビュー読み込み後に更新）
  updateJsonLd(pedal, finalDesc, pedalUrl, pedalImg, 0, 0);

  const posts=await fetchBoardsByPedal(pedal.full_name);
  cachedPosts=posts;
  const{data:affLink}=await db.from('pedal_affiliate_links').select('soundhouse_url,mercari_url').eq('pedal_id',pedal.id).maybeSingle();
  cachedAffLink=affLink||null;
  renderPedal(pedal,cachedPosts);
  handleYouTube(pedal);
  loadRecommendedPedals(pedal);

  // ★ PC右カラム・スマホレビューパネルを並行レンダリング
  const pcWrap=document.getElementById('pc-review-panel-wrap');
  if(pcWrap) await renderReviewPanel(pcWrap,pedal,session);

  // aggregateRating更新
  const{data:ratings}=await db.from('pedal_ratings').select('score').eq('pedal_id',pedal.id);
  if(ratings&&ratings.length){
    const avg=Math.round((ratings.reduce((s,r)=>s+r.score,0)/ratings.length)*10)/10;
    updateJsonLd(pedal,finalDesc,pedalUrl,pedalImg,avg,ratings.length);
  }
}

function updateJsonLd(pedal, desc, url, img, avgScore, ratingCount){
  const jsonLd={
    "@context":"https://schema.org",
    "@type":"Product",
    "name":pedal.full_name,
    "description":desc,
    "image":img,
    "url":url,
    "brand":{"@type":"Brand","name":pedal.brand},
    "category":(pedal.types||[]).join(', '),
  };
  if(avgScore>0&&ratingCount>0){
    jsonLd.aggregateRating={
      "@type":"AggregateRating",
      "ratingValue":avgScore,
      "reviewCount":ratingCount,
      "bestRating":5,
      "worstRating":1,
    };
  }
  const ldEl=document.getElementById('json-ld');if(ldEl)ldEl.textContent=JSON.stringify(jsonLd);
}

function formatUpdatedAt(isoStr){
  if(!isoStr)return'';const d=new Date(isoStr);
  return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function renderPedal(pedal,posts){
  const typesHtml=(pedal.types||[]).map(t=>`<span class="type-badge">${getTypeLabel(t)}</span>`).join('');
  let imageBlockHtml='';
  if(pedal.image_url){
    const hasSource=!!pedal.image_source;
    const safeUrl=pedal.image_url.replace(/'/g,"\\'");
    const safeSource=(pedal.image_source||'').replace(/'/g,"\\'");
    imageBlockHtml=`<div class="pedal-image-block"><div class="pedal-image ${hasSource?'has-source':'no-source'}" onclick="openPedalLightbox('${safeUrl}','${safeSource}')"><img src="${pedal.image_url}" alt="${pedal.model}" loading="lazy"></div>${hasSource?`<div class="image-source">出典: ${pedal.image_source}</div>`:''}</div>`;
  }else{
    const firstType=pedal.types&&pedal.types[0]?pedal.types[0]:null;
    const typeIconUrl=firstType?'https://yzqfockzgyfjmngygbhp.supabase.co/storage/v1/object/public/pedal-images/type-icons/type_'+firstType+'.png':null;
    imageBlockHtml=`<div class="pedal-image-block"><div class="pedal-image no-source no-img">${typeIconUrl?`<img src="${typeIconUrl}" alt="${firstType}" loading="lazy" style="width:72px;height:72px;object-fit:contain;opacity:.5" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}<span class="pedal-image-placeholder" ${typeIconUrl?'style="display:none"':''}>🎛</span></div></div>`;
  }
  const navItems=[
    {href:'#section-video',icon:'📺',labelJa:'デモ動画',labelEn:'Demo'},
    {href:'#section-buy',icon:'🛒',labelJa:'在庫を調べる',labelEn:'Buy'},
    {href:'#section-boards',icon:'🎸',labelJa:'投稿ボード',labelEn:'Boards'},
  ];
  const quickNavHtml=`<nav class="quick-nav" aria-label="ページ内ナビ">${navItems.map(item=>`<a href="${item.href}" class="quick-nav-chip"><span class="quick-nav-chip-icon">${item.icon}</span><span class="quick-nav-chip-label">${lang==='en'?item.labelEn:item.labelJa}</span></a>`).join('')}</nav>`;
  const desc=lang==='en'?(pedal.description_en||pedal.description):pedal.description;
  const updatedStr=formatUpdatedAt(pedal.updated_at);
  const descHtml=desc?`<div class="pedal-description-wrap"><div class="pedal-description" id="desc-text">${desc}</div><button class="desc-toggle-btn" id="desc-toggle-btn">${tr('readMore')}</button>${updatedStr?`<div class="desc-updated">${tr('updatedAt')}${updatedStr}</div>`:''}</div>`:`<div class="pedal-description-wrap"><div class="pedal-description empty">${tr('descEmpty')}</div></div>`;
  const boardsHtml=posts.length>0?posts.map(post=>{const thumb=post.image_urls?.length>0?`<img src="${post.image_urls[0]}" alt="" loading="lazy">`:`<div class="board-thumb-placeholder">🎸</div>`;return`<a href="/post?id=${post.id}" class="board-item"><div class="board-thumb">${thumb}</div><div class="board-meta"><div class="board-title">${post.title||tr('untitled')}</div><div class="board-user">${post.username?'@'+post.username:tr('anonUser')}</div></div></a>`;}).join(''):`<div class="empty-state"><div class="empty-state-icon">🎸</div><div class="empty-state-title">${tr('emptyBoardTitle')}</div><div class="empty-state-text">${tr('emptyBoardText')}</div><a href="/" class="empty-state-btn">${tr('emptyBoardBtn')}</a></div>`;
  const rakutenHref=rakutenUrl(pedal.full_name);
  const soundhouseHref=(cachedAffLink&&cachedAffLink.soundhouse_url)?cachedAffLink.soundhouse_url:soundhouseUrl(pedal.full_name);
  const mercariHref=(cachedAffLink&&cachedAffLink.mercari_url)?cachedAffLink.mercari_url:mercariUrl(pedal.full_name);
  document.getElementById('content').innerHTML=`
    <div class="pedal-card">
      <div class="pedal-top">${imageBlockHtml}<div class="pedal-info"><div class="pedal-brand">${pedal.brand}</div><div class="pedal-name">${pedal.model}</div><div class="type-badges">${typesHtml}</div></div></div>
      ${quickNavHtml}
      ${descHtml}
    </div>
    <!-- ★ 欲しいリストボタン -->
    <div style="margin-bottom:4px">
      <button class="wishlist-btn" id="wishlist-btn" onclick="toggleWishlist()">
        <span id="wishlist-btn-icon">🤍</span>
        <span id="wishlist-btn-text">欲しいリストに追加</span>
      </button>
    </div>
    <div id="yt-section"><div class="yt-card" id="section-video"><div class="yt-card-title">${tr('ytTitle')}</div><div class="yt-loading"><div class="yt-loading-icon">▶</div><div class="yt-loading-text">${tr('ytLoading')}</div></div></div></div>
    <div class="buy-card" id="section-buy">
      <div class="buy-card-title">${tr('buyTitle')}</div>
      <div class="buy-buttons">
        ${lang==='ja'?`
          <a href="${amazonJpUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn amazon">${tr('btnAmazon')}</a>
          <a href="${rakutenHref}" target="_blank" rel="noopener" class="buy-btn rakuten">${tr('btnRakuten')}</a>
          <a href="${soundhouseHref}" target="_blank" rel="noopener" class="buy-btn soundhouse">${tr('btnSoundhouse')}</a>
          <a href="${reverbUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn reverb">${tr('btnReverb')}</a>
          <a href="${mercariHref}" target="_blank" rel="noopener" class="buy-btn mercari">${tr('btnMercari')}</a>
        `:`
          <a href="${amazonUsUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn amazon">${tr('btnAmazonUs')}</a>
          <a href="${sweetwaterUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn sweetwater">${tr('btnSweetwater')}</a>
          <a href="${reverbUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn reverb">${tr('btnReverb')}</a>
        `}
      </div>
      <div class="buy-card-disclaimer">${tr('affDisclaimer')}</div>
    </div>
    <div class="boards-card" id="section-boards"><h3>🎛 ${tr('sectionBoards')}</h3><div class="boards-grid">${boardsHtml}</div></div>`;
  initDescAccordion();
  loadWishlistState(pedal.id);
}

function showError(msg){
  document.getElementById('content').innerHTML=`<div class="error-box"><p>${msg}</p><a href="/" style="color:var(--ac);margin-top:16px;display:block;">${tr('backHome')}</a></div>`;
}

applyLang();
loadPedal();
document.addEventListener('DOMContentLoaded', initMobSwipe);
</script>
