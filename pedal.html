  <style>

      --bg: #0d0d0e; --sf: #151517; --sf2: #1c1c1f;
      --bd: #272729; --ac: #e8552d; --tx: #eae8e2; --tm: #9a9890; --td: #6e6c68;
      --amazon: #f0a500; --sweetwater: #1a73e8; --soundhouse: #e8552d;
      --rakuten: #bf0000; --reverb: #00a99d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--tx); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 100vh; }
    header {
      background: rgba(13,13,14,.96); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--bd); padding: 0;
      display: flex; flex-direction: column; position: sticky; top: 0; z-index: 100;
    }
    .header-row1 {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 8px 16px 4px; border-bottom: 1px solid rgba(39,39,41,.6);
    }
    .header-row2 {
      display: flex; align-items: center; justify-content: flex-start; gap: 6px;
      padding: 4px 16px 6px;
    }
    .header-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex: 1; min-width: 0; }
    .header-logo img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 3px; color: var(--tx); white-space: nowrap; }
    .header-sub { font-size: 9px; letter-spacing: 2px; color: var(--ac); text-transform: uppercase; margin-top: 1px; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .lang-btn {
      display: flex; align-items: center; gap: 4px; padding: 6px 10px;
      background: var(--sf); border: 1px solid var(--bd); border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600;
      color: var(--tm); cursor: pointer; transition: all .15s; touch-action: manipulation;
    }
    .lang-btn:hover { border-color: var(--ac); color: var(--ac); }
    .home-btn {
      display: flex; align-items: center; gap: 4px; padding: 5px 10px;

      font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 600;
      color: var(--tm); cursor: pointer; transition: all .15s; text-decoration: none; white-space: nowrap;
    }
    .home-btn:hover { border-color: var(--ac); color: var(--ac); }
    .breadcrumb {
      background: var(--sf); border-bottom: 1px solid var(--bd);

    }
    .breadcrumb a { color: var(--tm); text-decoration: none; }
    .breadcrumb a:hover { color: var(--tx); }
    .breadcrumb .sep { color: var(--bd); }
    .breadcrumb .current { color: var(--tx); }
    .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
    .loading { text-align: center; padding: 60px 20px; color: var(--tm); font-family: 'Noto Sans JP', sans-serif; }
    .error-box { background: var(--sf); border: 1px solid #c0392b; border-radius: 12px; padding: 40px 20px; text-align: center; color: var(--tm); }

    .pedal-image-block { width: 120px; flex-shrink: 0; }
    .pedal-image {
      width: 120px; height: 120px;
      background: var(--sf2); border: 1px solid var(--bd);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .pedal-image.has-source { border-radius: 12px 12px 0 0; border-bottom-color: #2a2a2a; }
    .pedal-image.no-source { border-radius: 12px; }
    .pedal-image img { width: 100%; height: 100%; object-fit: contain; }
    .pedal-image-placeholder { font-size: 40px; opacity: .3; }
    .image-source {
      width: 120px;
      background: var(--sf2); border: 1px solid var(--bd); border-top: none;
      border-radius: 0 0 12px 12px;

      font-size: 14px; color: var(--tm); line-height: 1.7;

    .yt-loading-text { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--td); }
    .yt-fallback {
      aspect-ratio: 16/9; background: var(--sf2); border-radius: 10px; border: 1px solid var(--bd);

    .yt-fallback-text { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--td); text-align: center; line-height: 1.6; }
    .yt-fallback-btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;

      font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 600;
      color: #fff; text-decoration: none; transition: opacity .15s;

    .yt-fallback-btn:hover { opacity: .85; }
    .buy-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .buy-card-title { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--td); margin-bottom: 12px; text-align: center; letter-spacing: 1px; }
    .buy-buttons { display: flex; flex-direction: column; gap: 10px; }
    .buy-btn {
      display: block; width: 100%; padding: 14px; border-radius: 10px;
      text-align: center; font-size: 15px; font-weight: 700; text-decoration: none;
      border: none; cursor: pointer; transition: opacity .2s; font-family: 'Noto Sans JP', sans-serif;

    .buy-btn:hover { opacity: .85; }
    .buy-btn.soundhouse { background: var(--soundhouse); color: #fff; }
    .buy-btn.sweetwater { background: var(--sweetwater); color: #fff; }
    .buy-btn.amazon { background: var(--amazon); color: #111; }
    .buy-btn.rakuten { background: var(--rakuten); color: #fff; }
    .buy-btn.reverb { background: var(--reverb); color: #fff; }
    .boards-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .boards-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; margin-bottom: 16px; }
    .boards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .board-item {
      background: var(--sf2); border: 1px solid var(--bd); border-radius: 10px;
      overflow: hidden; text-decoration: none; color: var(--tx); display: block; transition: border-color .2s;
    }
    .board-item:hover { border-color: var(--ac); }
    .board-thumb { width: 100%; aspect-ratio: 4/3; background: var(--sf); overflow: hidden; }
    .board-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .board-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--bd); }
    .board-meta { padding: 10px; }
    .board-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .board-user { font-size: 11px; color: var(--tm); font-family: 'Noto Sans JP', sans-serif; }
    .empty-state { text-align: center; padding: 36px 20px; }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; opacity: .4; }
    .empty-state-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--tm); margin-bottom: 8px; }
    .empty-state-text { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--td); line-height: 1.6; margin-bottom: 16px; }
    .empty-state-btn {
      display: inline-block; padding: 10px 24px; background: var(--ac); border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600;
      color: #fff; text-decoration: none; transition: background .15s;
    }
    .empty-state-btn:hover { background: #cf4c26; }
  </style>
</head>

<script>

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cWZvY2t6Z3lmam1uZ3lnYmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxODksImV4cCI6MjA4OTY3MjE4OX0.Cn4UMJ8y6CHuIMDeFEShej4t1p4syweLgo5ZXZNs-_g';

const db = createClient(SUPABASE_URL, SUPABASE_KEY);
function detectLang() {
  const saved = localStorage.getItem('mgmb_lang');
  if (saved) return saved;
  const bl = navigator.language || navigator.userLanguage || 'ja';
  return bl.toLowerCase().startsWith('ja') ? 'ja' : 'en';
}
let lang = detectLang();
const I18N = {

    updatedAt:'Last updated: ',
  }
};
function tr(key) { return (I18N[lang]||I18N.ja)[key]||I18N.ja[key]||key; }
const TYPE_LABELS = {
  'overdrive':'OD','od':'OD','distortion':'Dist','dist':'Dist','fuzz':'Fuzz',
  'boost':'Boost','reverb':'Reverb','delay':'Delay','chorus':'Chorus',
  'flanger':'Flanger','phaser':'Phaser','modulation':'Mod','mod':'Mod',
  'tremolo':'Tremolo','vibrato':'Vibrato','pitch':'Pitch','wah':'Wah',
  'compressor':'Comp','comp':'Comp','eq':'EQ','noise_gate':'Noise Gate',
  'looper':'Looper','volume':'Volume','tuner':'Tuner','multi':'Multi FX',
  'preamp':'Preamp','switcher':'Switcher','buffer':'Buffer','pre':'Preamp'
};
function getTypeLabel(t) { return TYPE_LABELS[t?.toLowerCase()]||t; }
function soundhouseUrl(n) { return 'https://www.soundhouse.co.jp/search/index?search_all='+encodeURIComponent(n); }
function sweetwaterUrl(n) { return 'https://www.sweetwater.com/store/search.php?s='+encodeURIComponent(n); }
function amazonJpUrl(n) { return 'https://www.amazon.co.jp/s?k='+encodeURIComponent(n)+'&tag=mgmb-22'; }
function amazonUsUrl(n) { return 'https://www.amazon.com/s?k='+encodeURIComponent(n)+'&tag=mgmb-20'; }
function rakutenUrl(n) { return 'https://search.rakuten.co.jp/search/mall/'+encodeURIComponent(n)+'/'; }
function reverbUrl(n) { return 'https://reverb.com/marketplace?query='+encodeURIComponent(n); }
function ytSearchUrl(n) { return 'https://www.youtube.com/results?search_query='+encodeURIComponent(n+' demo'); }
function applyLang() {
  document.getElementById('header-sub').textContent = tr('headerSub');
  document.getElementById('home-text').textContent = tr('home');
  const gt=document.getElementById('gacha-text');if(gt)gt.textContent=tr('gacha');
  document.getElementById('lang-label').textContent = tr('langLabel');
  document.getElementById('bc-home').textContent = tr('bcHome');
}
function toggleLang() {
  lang = lang==='ja'?'en':'ja';
  localStorage.setItem('mgmb_lang', lang);
  applyLang();
  if (cachedPedal) renderPedal(cachedPedal, cachedPosts);
}
let cachedPedal = null;
let cachedPosts = [];

function initDescAccordion() {
  const desc = document.getElementById('desc-text');
  const btn = document.getElementById('desc-toggle-btn');
  if (!desc || !btn) return;
  if (desc.scrollHeight <= desc.clientHeight + 4) {
    btn.classList.add('hidden');
    return;
  }
  btn.onclick = function() {
    const expanded = desc.classList.toggle('expanded');
    btn.textContent = expanded ? tr('readLess') : tr('readMore');
  };
}

async function fetchVideoId(pedalName) {
  try {
    const res = await fetch(`/.netlify/functions/youtube?q=${encodeURIComponent(pedalName)}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data.videoId || null;
  } catch(e) {
    console.error('YT Function error:', e);
    return null;
  }
}
async function cacheVideoId(pedalId, videoId) {
  await db.from('pedals').update({ youtube_video_id: videoId }).eq('id', pedalId);
}
function renderYouTube(pedalId, pedalName, videoId) {
  const el = document.getElementById('yt-section');
  if (!el) return;
  if (videoId) {
    el.innerHTML = `
      <div class="yt-card" id="section-video">
        <div class="yt-card-title">${tr('ytTitle')}</div>
        <div class="yt-embed-wrap">
          <iframe src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen loading="lazy" title="${pedalName} demo"></iframe>
        </div>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="yt-card" id="section-video">
        <div class="yt-card-title">${tr('ytTitle')}</div>
        <div class="yt-fallback">
          <div class="yt-fallback-icon">▶</div>
          <div class="yt-fallback-text">${tr('ytFallbackText')}</div>
          <a href="${ytSearchUrl(pedalName)}" target="_blank" rel="noopener" class="yt-fallback-btn">▶ ${tr('ytFallbackBtn')}</a>
        </div>
      </div>`;
  }
}
async function handleYouTube(pedal) {
  if (pedal.youtube_video_id) {
    renderYouTube(pedal.id, pedal.full_name, pedal.youtube_video_id);
    return;
  }
  const videoId = await fetchVideoId(pedal.full_name);
  if (videoId) {
    cacheVideoId(pedal.id, videoId);
    cachedPedal.youtube_video_id = videoId;
  }
  renderYouTube(pedal.id, pedal.full_name, videoId);
}

// ★ おすすめペダル
const RECOMMEND_LIMIT = 4;
let recommendOffset = 0;
let recommendPedalId = null;
let recommendTypes = [];

async function loadRecommendedPedals(pedal) {
  recommendOffset = 0;
  recommendPedalId = pedal.id;
  recommendTypes = pedal.types || [];
  const detailEl = document.getElementById('content');
  if (!detailEl) return;
  const recSection = document.createElement('div');
  recSection.id = 'recommend-section';
  recSection.style.cssText = 'margin-top:16px';
  recSection.innerHTML = `
    <div style="background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:20px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;margin-bottom:14px">${tr('recommendTitle')}</div>
      <div id="recommend-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px"></div>
      <button id="recommend-more-btn" onclick="loadMoreRecommended()" style="display:none;width:100%;margin-top:12px;padding:12px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;color:var(--tm);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:color .2s,border-color .2s" onmouseover="this.style.borderColor='var(--ac)';this.style.color='var(--tx)'" onmouseout="this.style.borderColor='var(--bd)';this.style.color='var(--tm)'">${tr('recommendLoadMore')}</button>
    </div>`;
  detailEl.appendChild(recSection);
  await fetchRecommended();
}

async function fetchRecommended() {
  if (!recommendTypes.length) return;
  const primaryType = recommendTypes[0];
  const { data, count } = await db.from('pedals')
    .select('id, brand, model, slug, types, image_url, description, view_count', { count: 'exact' })
    .contains('types', [primaryType])
    .not('id', 'eq', recommendPedalId)
    .not('description', 'is', null)
    .not('youtube_video_id', 'is', null)
    .order('view_count', { ascending: false, nullsFirst: false })
    .range(recommendOffset, recommendOffset + RECOMMEND_LIMIT - 1);

  const grid = document.getElementById('recommend-grid');
  if (!grid) return;
  if (!data || !data.length) {
    if (recommendOffset === 0) grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:24px;font-size:13px;color:var(--td)">${tr('recommendEmpty')}</div>`;
    return;
  }
  const SUPABASE_STORAGE = 'https://yzqfockzgyfjmngygbhp.supabase.co/storage/v1/object/public/pedal-images/type-icons/';
  data.forEach(p => {
    let imgHtml;
    if (p.image_url) {
      imgHtml = `<img src="${p.image_url}" alt="${p.model}" loading="lazy" style="width:100%;height:100%;object-fit:contain">`;
    } else {
      const iconUrl = p.types && p.types[0] ? SUPABASE_STORAGE + 'type_' + p.types[0] + '.png' : null;
      imgHtml = iconUrl
        ? `<img src="${iconUrl}" alt="" loading="lazy" style="width:60%;height:60%;object-fit:contain;opacity:.4">`
        : `<span style="font-size:28px;opacity:.2">🎛</span>`;
    }
    const card = document.createElement('a');
    card.href = `/pedal?slug=${p.slug}`;
    card.style.cssText = 'background:var(--sf2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;text-decoration:none;color:var(--tx);display:block;transition:border-color .2s';
    card.onmouseover = () => card.style.borderColor = 'var(--ac)';
    card.onmouseout = () => card.style.borderColor = 'var(--bd)';
    card.innerHTML = `
      <div style="width:100%;aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid var(--bd)">${imgHtml}</div>
      <div style="padding:8px">
        <div style="font-size:10px;color:var(--ac);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.brand}</div>
        <div style="font-size:12px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${p.model}</div>
      </div>`;
    grid.appendChild(card);
  });
  recommendOffset += RECOMMEND_LIMIT;
  const btn = document.getElementById('recommend-more-btn');
  if (btn) btn.style.display = (count && recommendOffset < count) ? 'block' : 'none';
}

async function loadMoreRecommended() {
  await fetchRecommended();
}

async function fetchBoardsByPedal(pedalFullName) {
  const { data: aliases } = await db
    .from('pedal_aliases')
    .select('alias')
    .eq('pedal_full_name', pedalFullName);
  const searchNames = [pedalFullName, ...(aliases||[]).map(a => a.alias)];
  const { data: posts } = await db
    .from('posts')
    .select('id, title, username, image_urls, gear_list, created_at')
    .order('created_at', { ascending: false })
    .limit(200);
  if (!posts) return [];
  const lowerNames = searchNames.map(n => n.replace(/\t/g,' ').replace(/ +/g,' ').toLowerCase().trim());
  return posts
    .filter(post => {
      const gear = Array.isArray(post.gear_list) ? post.gear_list : [];
      return gear.some(g => {
        const gName = (g.name || g || '').replace(/\t/g,' ').replace(/ +/g,' ').toLowerCase().trim();
        return lowerNames.includes(gName);
      });
    })
    .slice(0, 6);
}

async function loadPedal() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  if (!slug) { showError(tr('notFound')); return; }

  const { data: pedals } = await db.from('pedals')
    .select('id, brand, model, full_name, slug, types, image_url, image_source, description, description_en, youtube_video_id, updated_at')
    .eq('slug', decodeURIComponent(slug)).limit(1);
  if (!pedals?.length) { showError(tr('notFound')); return; }
  const pedal = pedals[0];
  cachedPedal = pedal;
  // ★ view_countをインクリメント
  db.from('pedals').update({ view_count: (pedal.view_count||0) + 1 }).eq('id', pedal.id).then(() => {});
  document.getElementById('bc-brand').textContent = pedal.brand;
  document.getElementById('bc-brand').href = `/brand?name=${encodeURIComponent(pedal.brand)}`;
  document.getElementById('bc-pedal').textContent = pedal.model;
  document.title = `${pedal.full_name} | My Gear My Board`;

  // ★ SEO: meta description・OGP・canonical・JSON-LD動的更新
  const pedalDesc = pedal.description
    ? pedal.description.replace(/<[^>]+>/g,'').slice(0, 120) + '...'
    : `${pedal.full_name}のペダル詳細ページ。使用ボードや購入リンクをチェック。`;
  const pedalDescEn = pedal.description_en
    ? pedal.description_en.replace(/<[^>]+>/g,'').slice(0, 120) + '...'
    : `${pedal.full_name} pedal details. Check boards and purchase links.`;
  const finalDesc = lang === 'en' ? pedalDescEn : pedalDesc;
  const pedalUrl = `https://mygearmyboard.com/pedal?slug=${pedal.slug}`;
  const pedalImg = pedal.image_url || 'https://mygearmyboard.com/ogp.png';

  const setMeta = (id, attr, val) => { const el=document.getElementById(id); if(el) el.setAttribute(attr, val); };
  setMeta('meta-description','content', finalDesc);
  setMeta('og-title','content', `${pedal.full_name} | My Gear My Board`);
  setMeta('og-description','content', finalDesc);
  setMeta('og-image','content', pedalImg);
  setMeta('og-url','content', pedalUrl);
  setMeta('tw-title','content', `${pedal.full_name} | My Gear My Board`);
  setMeta('tw-description','content', finalDesc);
  setMeta('tw-image','content', pedalImg);
  setMeta('canonical','href', pedalUrl);

  // JSON-LD（構造化データ）★ WebPageスキーマに変更（Productはレビュー機能実装時に戻す）
  const jsonLd = {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": pedal.full_name + " | My Gear My Board",
    "description": finalDesc,
    "image": pedalImg,
    "url": pedalUrl,
    "about": {
      "@type": "Product",
      "name": pedal.full_name,
      "brand": { "@type": "Brand", "name": pedal.brand },
      "category": (pedal.types||[]).join(', ')
    }
  };
  const ldEl = document.getElementById('json-ld');
  if(ldEl) ldEl.textContent = JSON.stringify(jsonLd);

  const posts = await fetchBoardsByPedal(pedal.full_name);
  cachedPosts = posts;

  renderPedal(pedal, cachedPosts);
  handleYouTube(pedal);
  loadRecommendedPedals(pedal);
}

function formatUpdatedAt(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}.${m}.${day}`;
}
function renderPedal(pedal, posts) {
  const typesHtml = (pedal.types||[]).map(t => `<span class="type-badge">${getTypeLabel(t)}</span>`).join('');
  let imageBlockHtml = '';
  if (pedal.image_url) {
    const hasSource = !!pedal.image_source;
    imageBlockHtml = `
      <div class="pedal-image-block">
        <div class="pedal-image ${hasSource?'has-source':'no-source'}">
          <img src="${pedal.image_url}" alt="${pedal.model}" loading="lazy">
        </div>
        ${hasSource?`<div class="image-source">出典: ${pedal.image_source}</div>`:''}
      </div>`;
  } else {
    const firstType = (pedal.types && pedal.types[0]) ? pedal.types[0] : null;
    const typeIconUrl = firstType
      ? 'https://yzqfockzgyfjmngygbhp.supabase.co/storage/v1/object/public/pedal-images/type-icons/type_' + firstType + '.png'
      : null;
    imageBlockHtml = `
      <div class="pedal-image-block">
        <div class="pedal-image no-source">
          ${typeIconUrl
            ? `<img src="${typeIconUrl}" alt="${firstType}" loading="lazy" style="width:72px;height:72px;object-fit:contain;opacity:.5" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''}
          <span class="pedal-image-placeholder" ${typeIconUrl ? 'style="display:none"' : ''}>🎛</span>
        </div>
      </div>`;
  }

  const navItems = [
    {href:'#section-video', icon:'📺', labelJa:'デモ動画', labelEn:'Demo'},
    {href:'#section-buy',   icon:'🛒', labelJa:'在庫を調べる', labelEn:'Buy'},
    {href:'#section-boards',icon:'🎸', labelJa:'投稿ボード', labelEn:'Boards'},
  ];
  const quickNavHtml = `
    <nav class="quick-nav" aria-label="ページ内ナビ">
      ${navItems.map(item=>`
        <a href="${item.href}" class="quick-nav-chip">
          <span class="quick-nav-chip-icon">${item.icon}</span>
          <span class="quick-nav-chip-label">${lang==='en'?item.labelEn:item.labelJa}</span>
        </a>`).join('')}
    </nav>`;

  const desc = lang === 'en' ? (pedal.description_en || pedal.description) : pedal.description;
  const updatedStr = formatUpdatedAt(pedal.updated_at);
  let descHtml = '';
  if (desc) {
    descHtml = `
      <div class="pedal-description-wrap">
        <div class="pedal-description" id="desc-text">${desc}</div>
        <button class="desc-toggle-btn" id="desc-toggle-btn">${tr('readMore')}</button>
        ${updatedStr ? `<div class="desc-updated">${tr('updatedAt')}${updatedStr}</div>` : ''}
      </div>`;
  } else {
    descHtml = `
      <div class="pedal-description-wrap">
        <div class="pedal-description empty">${tr('descEmpty')}</div>
      </div>`;
  }

  let boardsHtml = '';
  if (posts.length > 0) {
    boardsHtml = posts.map(post => {
      const thumb = post.image_urls?.length > 0
        ? `<img src="${post.image_urls[0]}" alt="" loading="lazy">`
        : `<div class="board-thumb-placeholder">🎸</div>`;
      return `<a href="/post?id=${post.id}" class="board-item">
        <div class="board-thumb">${thumb}</div>
        <div class="board-meta">
          <div class="board-title">${post.title||tr('untitled')}</div>
          <div class="board-user">${post.username?'@'+post.username:tr('anonUser')}</div>
        </div>
      </a>`;
    }).join('');
  } else {
    boardsHtml = `
      <div class="empty-state">
        <div class="empty-state-icon">🎸</div>
        <div class="empty-state-title">${tr('emptyBoardTitle')}</div>
        <div class="empty-state-text">${tr('emptyBoardText')}</div>
        <a href="/" class="empty-state-btn">${tr('emptyBoardBtn')}</a>
      </div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="pedal-card">
      <div class="pedal-top">
        ${imageBlockHtml}
        <div class="pedal-info">
          <div class="pedal-brand">${pedal.brand}</div>
          <div class="pedal-name">${pedal.model}</div>
          <div class="type-badges">${typesHtml}</div>
        </div>
      </div>
      ${quickNavHtml}
      ${descHtml}
    </div>
    <div id="yt-section">
      <div class="yt-card" id="section-video">
        <div class="yt-card-title">${tr('ytTitle')}</div>
        <div class="yt-loading">
          <div class="yt-loading-icon">▶</div>
          <div class="yt-loading-text">${tr('ytLoading')}</div>
        </div>
      </div>
    </div>
    <div class="buy-card" id="section-buy">
      <div class="buy-card-title">${tr('buyTitle')}</div>
      <div class="buy-buttons">
        ${lang === 'ja' ? `
          <a href="${amazonJpUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn amazon">${tr('btnAmazon')}</a>
          <a href="${soundhouseUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn soundhouse">${tr('btnSoundhouse')}</a>
          <a href="${rakutenUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn rakuten">${tr('btnRakuten')}</a>
          <a href="${reverbUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn reverb">${tr('btnReverb')}</a>
        ` : `
          <a href="${amazonUsUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn amazon">${tr('btnAmazonUs')}</a>
          <a href="${sweetwaterUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn sweetwater">${tr('btnSweetwater')}</a>
          <a href="${reverbUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn reverb">${tr('btnReverb')}</a>
        `}
      </div>
    </div>
    <div class="boards-card" id="section-boards">
      <h3>🎛 ${tr('sectionBoards')}</h3>
      <div class="boards-grid">${boardsHtml}</div>
    </div>`;

  initDescAccordion();
}

      <p>${msg}</p>
      <a href="/" style="color:var(--ac);margin-top:16px;display:block;">${tr('backHome')}</a>
    </div>`;
}
