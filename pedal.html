<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペダル詳細 | My Gear My Board</title>
  <meta name="description" content="">
  <link rel="icon" href="/IMG_0206.PNG">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #111;
      --card: #1a1a1a;
      --card2: #222;
      --border: #333;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #e05a00;
      --accent2: #1a73e8;
      --amazon: #f0a500;
      --sweetwater: #1a73e8;
      --soundhouse: #e05a00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: #0a0a0a;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .header-logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    .header-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 10px;
      color: var(--muted);
    }
    .header-home {
      margin-left: auto;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      text-decoration: none;
      white-space: nowrap;
    }

    /* パンくずリスト */
    .breadcrumb {
      background: #1e1e1e;
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
    }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb .sep { color: #555; }
    .breadcrumb .current { color: var(--text); }

    /* メインコンテンツ */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    /* ローディング */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    /* エラー */
    .error-box {
      background: var(--card);
      border: 1px solid #c0392b;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }

    /* ペダルメインカード */
    .pedal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .pedal-top {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .pedal-image {
      width: 120px;
      height: 120px;
      flex-shrink: 0;
      background: var(--card2);
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .pedal-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .pedal-image-placeholder {
      font-size: 40px;
      opacity: 0.3;
    }
    .pedal-info {
      flex: 1;
      min-width: 0;
    }
    .pedal-brand {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .pedal-name {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
      word-break: break-word;
    }
    .type-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .type-badge {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .pedal-description {
      margin-top: 16px;
      font-size: 14px;
      color: #ccc;
      line-height: 1.7;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .pedal-description.empty {
      color: var(--muted);
      font-style: italic;
    }

    /* 購入ボタンカード */
    .buy-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .buy-card h3 {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      text-align: center;
    }
    .buy-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .buy-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .buy-btn:hover { opacity: 0.85; }
    .buy-btn.soundhouse { background: var(--soundhouse); color: #fff; }
    .buy-btn.sweetwater { background: var(--sweetwater); color: #fff; }
    .buy-btn.amazon { background: var(--amazon); color: #111; }

    /* 使用ボードセクション */
    .boards-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .boards-card h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .boards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (max-width: 480px) {
      .boards-grid { grid-template-columns: 1fr 1fr; }
    }
    .board-item {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: border-color 0.2s;
    }
    .board-item:hover { border-color: var(--accent); }
    .board-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      background: #2a2a2a;
      overflow: hidden;
    }
    .board-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .board-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--border);
    }
    .board-meta {
      padding: 10px;
    }
    .board-title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .board-user {
      font-size: 11px;
      color: var(--muted);
    }
    .no-boards {
      text-align: center;
      padding: 30px;
      color: var(--muted);
      font-size: 14px;
    }
    .no-boards a {
      color: var(--accent);
      text-decoration: none;
      display: block;
      margin-top: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="header-logo">
    <img src="/IMG_0206.PNG" alt="MGMB">
    <div>
      <div class="header-title">MY GEAR MY BOARD</div>
      <div class="header-sub">ペダルボードSNS</div>
    </div>
  </a>
  <a href="/" class="header-home">🏠 ホーム</a>
</header>

<div class="breadcrumb">
  <a href="/">ホーム</a>
  <span class="sep">›</span>
  <span id="breadcrumb-brand"></span>
  <span class="sep" id="breadcrumb-sep2" style="display:none">›</span>
  <span id="breadcrumb-model" class="current"></span>
</div>

<div class="container">
  <div id="content">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://yzqfockzgyfjmngygbhp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cWZvY2t6Z3lmam1uZ3lnYmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxODksImV4cCI6MjA4OTY3MjE4OX0.Cn4UMJ8y6CHuIMDeFEShej4t1p4syweLgo5ZXZNs-_g';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// タイプ表示名マッピング
const TYPE_LABELS = {
  'overdrive': 'OD', 'od': 'OD', 'distortion': 'Dist', 'dist': 'Dist',
  'fuzz': 'Fuzz', 'boost': 'Boost', 'reverb': 'Reverb', 'delay': 'Delay',
  'chorus': 'Chorus', 'flanger': 'Flanger', 'phaser': 'Phaser',
  'modulation': 'Mod', 'mod': 'Mod', 'tremolo': 'Tremolo', 'vibrato': 'Vibrato',
  'pitch': 'Pitch', 'wah': 'Wah', 'compressor': 'Comp', 'comp': 'Comp',
  'eq': 'EQ', 'noise_gate': 'Noise Gate', 'looper': 'Looper',
  'volume': 'Volume', 'tuner': 'Tuner', 'multi': 'Multi FX',
  'preamp': 'Preamp', 'switcher': 'Switcher', 'buffer': 'Buffer',
  'junction_box': 'Junction Box', 'pre': 'Preamp'
};

function getTypeLabel(t) {
  return TYPE_LABELS[t?.toLowerCase()] || t;
}

// URLからslugを取得
function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('slug');
}

async function loadPedal() {
  const slug = getSlug();
  if (!slug) {
    showError('ペダルが指定されていません。');
    return;
  }

  // ペダル情報取得
  const { data: pedal, error } = await db
    .from('pedals')
    .select('*')
    .eq('slug', slug)
    .single();

  if (error || !pedal) {
    showError('ペダルが見つかりませんでした。');
    return;
  }

  // ページタイトル・description更新
  document.title = `${pedal.full_name} | My Gear My Board`;
  document.querySelector('meta[name="description"]').setAttribute(
    'content',
    `${pedal.full_name}のペダル情報と、実際のエフェクターボードでの使用例をチェック。`
  );

  // 使用ボード取得（gear_list jsonbの中でfull_nameが一致するもの）
  const { data: posts } = await db
    .from('posts')
    .select('id, title, username, image_urls, gear_list')
    .contains('gear_list', JSON.stringify([{name: pedal.full_name}]))
    .order('created_at', { ascending: false })
    .limit(6);

  // もしcontainsで取れない場合はILIKEで再試行
  let boards = posts || [];
  if (boards.length === 0) {
    const { data: posts2 } = await db
      .from('posts')
      .select('id, title, username, image_urls, gear_list')
      .filter('gear_list', 'cs', `[{"name":"${pedal.full_name}"}]`)
      .order('created_at', { ascending: false })
      .limit(6);
    boards = posts2 || [];
  }

  renderPedal(pedal, boards);
}

function renderPedal(pedal, boards) {
  // パンくずリスト更新
  document.getElementById('breadcrumb-brand').innerHTML =
    `<a href="/brand?name=${encodeURIComponent(pedal.brand)}" style="color:#aaa;text-decoration:none;">${pedal.brand}</a>`;
  document.getElementById('breadcrumb-model').textContent = pedal.model;
  document.getElementById('breadcrumb-sep2').style.display = 'inline';

  // 購入リンク生成
  const soundhouseUrl = pedal.soundhouse_url ||
    `https://www.soundhouse.co.jp/search/index?searchkey=${encodeURIComponent(pedal.full_name)}`;
  const sweetwaterUrl =
    `https://www.sweetwater.com/store/search.php?q=${encodeURIComponent(pedal.full_name)}`;
  const amazonUrl = pedal.amazon_url ||
    `https://www.amazon.co.jp/s?k=${encodeURIComponent(pedal.full_name)}`;

  // タイプバッジ
  const typesHtml = (pedal.types || []).map(t =>
    `<span class="type-badge">${getTypeLabel(t)}</span>`
  ).join('');

  // 画像
  const imageHtml = pedal.image_url
    ? `<img src="${pedal.image_url}" alt="${pedal.full_name}" loading="lazy">`
    : `<span class="pedal-image-placeholder">🎛</span>`;

  // 説明文
  const descHtml = pedal.description
    ? `<div class="pedal-description">${pedal.description}</div>`
    : `<div class="pedal-description empty">説明文は準備中です。</div>`;

  // ボード一覧
  let boardsHtml = '';
  if (boards.length > 0) {
    boardsHtml = boards.map(post => {
      const thumb = (post.image_urls && post.image_urls.length > 0)
        ? `<img src="${post.image_urls[0]}" alt="${post.title || ''}" loading="lazy">`
        : `<div class="board-thumb-placeholder">🎸</div>`;
      const user = post.username ? `@${post.username}` : '匿名';
      const title = post.title || '無題のボード';
      return `
        <a href="/post?id=${post.id}" class="board-item">
          <div class="board-thumb">${thumb}</div>
          <div class="board-meta">
            <div class="board-title">${title}</div>
            <div class="board-user">${user}</div>
          </div>
        </a>`;
    }).join('');
  } else {
    boardsHtml = `
      <div class="no-boards">
        このペダルを使ったボードはまだありません。<br>
        <a href="/">あなたのボードを投稿する →</a>
      </div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="pedal-card">
      <div class="pedal-top">
        <div class="pedal-image">${imageHtml}</div>
        <div class="pedal-info">
          <div class="pedal-brand">${pedal.brand}</div>
          <div class="pedal-name">${pedal.model}</div>
          <div class="type-badges">${typesHtml}</div>
        </div>
      </div>
      ${descHtml}
    </div>

    <div class="buy-card">
      <h3>🛒 購入・価格をチェック</h3>
      <div class="buy-buttons">
        <a href="${soundhouseUrl}" target="_blank" rel="noopener" class="buy-btn soundhouse">🎸 サウンドハウスで探す</a>
        <a href="${sweetwaterUrl}" target="_blank" rel="noopener" class="buy-btn sweetwater">🎵 Sweetwaterで探す</a>
        <a href="${amazonUrl}" target="_blank" rel="noopener" class="buy-btn amazon">📦 Amazonで探す</a>
      </div>
    </div>

    <div class="boards-card">
      <h3>🎛 このペダルを使ったボード</h3>
      <div class="boards-grid">${boardsHtml}</div>
    </div>
  `;
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="error-box">
      <p>${msg}</p>
      <a href="/" style="color:var(--accent);margin-top:16px;display:block;">← ホームに戻る</a>
    </div>`;
}

loadPedal();
</script>
</body>
</html>
