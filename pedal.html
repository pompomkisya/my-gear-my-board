<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペダル詳細 | My Gear My Board</title>
  <meta name="description" content="エフェクターペダルの詳細情報と、実際のボードでの使用例">
  <link rel="icon" href="/IMG_0206.PNG">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #eee;
    }
    .header-logo img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
    }
    .header-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.05em;
    }
    .header-subtitle {
      font-size: 10px;
      color: #aaa;
    }
    .header-spacer { flex: 1; }
    .header-home-btn {
      background: #333;
      color: #eee;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }

    /* パンくず */
    .breadcrumb {
      padding: 12px 16px;
      font-size: 12px;
      color: #888;
    }
    .breadcrumb a { color: #f60; text-decoration: none; }
    .breadcrumb span { margin: 0 6px; }

    /* メインコンテンツ */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    /* ペダル情報カード */
    .pedal-card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid #2a2a2a;
    }
    .pedal-header {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .pedal-image {
      width: 140px;
      height: 140px;
      object-fit: contain;
      background: #2a2a2a;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .pedal-image-placeholder {
      width: 140px;
      height: 140px;
      background: #2a2a2a;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      flex-shrink: 0;
      color: #555;
    }
    .pedal-info { flex: 1; }
    .pedal-brand {
      font-size: 13px;
      color: #f60;
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pedal-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .pedal-types {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .type-badge {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #ccc;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .pedal-price {
      font-size: 20px;
      font-weight: 700;
      color: #f60;
    }
    .pedal-price-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 2px;
    }

    /* 説明文 */
    .pedal-description {
      font-size: 14px;
      line-height: 1.7;
      color: #ccc;
      border-top: 1px solid #2a2a2a;
      padding-top: 16px;
    }
    .no-description {
      font-size: 13px;
      color: #666;
      font-style: italic;
    }

    /* 購入ボタン */
    .buy-section {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid #2a2a2a;
    }
    .buy-section h2 {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .buy-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .buy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .buy-btn:hover { opacity: 0.85; }
    .buy-btn-soundhouse {
      background: #e8380d;
      color: #fff;
    }
    .buy-btn-sweetwater {
      background: #0066cc;
      color: #fff;
    }
    .buy-btn-amazon {
      background: #ff9900;
      color: #111;
    }
    .buy-btn-search {
      background: #333;
      color: #eee;
      border: 1px solid #555;
    }

    /* 使用ボード */
    .boards-section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title-count {
      background: #f60;
      color: #fff;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .boards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 600px) {
      .boards-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .board-card {
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s;
    }
    .board-card:hover { border-color: #f60; }
    .board-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #2a2a2a;
    }
    .board-card-info {
      padding: 8px 10px;
    }
    .board-card-title {
      font-size: 12px;
      font-weight: 600;
      color: #eee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .board-card-user {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .no-boards {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      color: #666;
      font-size: 14px;
      border: 1px solid #2a2a2a;
    }
    .no-boards a {
      color: #f60;
      text-decoration: none;
    }

    /* 同ブランド */
    .related-section { margin-bottom: 24px; }
    .related-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .related-item {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 12px 16px;
      text-decoration: none;
      color: #eee;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s;
    }
    .related-item:hover { border-color: #f60; }
    .related-item-name { font-size: 13px; font-weight: 600; }
    .related-item-types { font-size: 11px; color: #888; margin-top: 2px; }
    .related-item-arrow { color: #555; font-size: 16px; }

    /* ローディング */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 14px;
    }
    .error-msg {
      text-align: center;
      padding: 60px 20px;
      color: #e55;
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <a href="/" class="header-logo">
    <img src="/IMG_0206.PNG" alt="MGMB">
    <div>
      <div class="header-title">MY GEAR MY BOARD</div>
      <div class="header-subtitle">ペダルボードSNS</div>
    </div>
  </a>
  <div class="header-spacer"></div>
  <a href="/" class="header-home-btn">🏠 ホーム</a>
</header>

<!-- パンくず -->
<div class="breadcrumb">
  <a href="/">ホーム</a>
  <span>›</span>
  <a href="/pedals.html">ペダル一覧</a>
  <span>›</span>
  <span id="breadcrumb-name">読み込み中...</span>
</div>

<!-- メイン -->
<div class="container">
  <div id="main-content" class="loading">読み込み中...</div>
</div>

<script>
const SUPABASE_URL = 'https://yzqfockzgyfjmngygbhp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cWZvY2t6Z3lmam1uZ3lnYmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxODksImV4cCI6MjA4OTY3MjE4OX0.Cn4UMJ8y6CHuIMDeFEShej4t1p4syweLgo5ZXZNs-_g';

// URLからslugを取得
function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('slug');
}

// Supabase fetch
async function supabaseFetch(endpoint) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  if (!res.ok) throw new Error('fetch error');
  return res.json();
}

// タイプ表示名
const TYPE_LABELS = {
  'overdrive': 'OD', 'distortion': 'Dist', 'fuzz': 'Fuzz', 'boost': 'Boost',
  'reverb': 'Reverb', 'delay': 'Delay', 'chorus': 'Chorus', 'flanger': 'Flanger',
  'phaser': 'Phaser', 'tremolo': 'Tremolo', 'vibrato': 'Vibrato', 'pitch': 'Pitch',
  'wah': 'Wah', 'comp': 'Comp', 'eq': 'EQ', 'noise_gate': 'Noise Gate',
  'looper': 'Looper', 'volume': 'Volume', 'tuner': 'Tuner', 'multi': 'Multi FX',
  'preamp': 'Preamp', 'switcher': 'Switcher', 'buffer': 'Buffer',
  'mod': 'Mod', 'pre': 'Preamp', 'boost': 'Boost'
};

function formatType(t) {
  return TYPE_LABELS[t] || t;
}

// 価格フォーマット
function formatPrice(price) {
  if (!price) return null;
  return '¥' + price.toLocaleString();
}

// メイン処理
async function init() {
  const slug = getSlug();
  const container = document.getElementById('main-content');

  if (!slug) {
    container.innerHTML = '<div class="error-msg">ペダルが見つかりません。<br><a href="/" style="color:#f60">ホームに戻る</a></div>';
    return;
  }

  try {
    // ペダル情報取得
    const pedals = await supabaseFetch(`pedals?slug=eq.${encodeURIComponent(slug)}&limit=1`);
    if (!pedals || pedals.length === 0) {
      container.innerHTML = '<div class="error-msg">ペダルが見つかりません。<br><a href="/" style="color:#f60">ホームに戻る</a></div>';
      return;
    }
    const pedal = pedals[0];

    // ページタイトル・メタ更新
    document.title = `${pedal.full_name} | My Gear My Board`;
    document.querySelector('meta[name="description"]').content =
      `${pedal.full_name}の情報と、実際のボードでの使用例をチェック。`;
    document.getElementById('breadcrumb-name').textContent = pedal.full_name;

    // このペダルを使っているpostを取得
    // postsテーブルのgear_listにfull_nameが含まれるものを検索
    const posts = await supabaseFetch(
      `posts?select=id,title,username,image_urls,gear_list&gear_list=cs.["${pedal.full_name}"]&limit=12&order=created_at.desc`
    );

    // 同ブランドの他ペダル
    const related = await supabaseFetch(
      `pedals?brand=eq.${encodeURIComponent(pedal.brand)}&slug=neq.${encodeURIComponent(slug)}&limit=6&order=model.asc`
    );

    // HTML構築
    container.innerHTML = buildHTML(pedal, posts || [], related || []);

  } catch (e) {
    console.error(e);
    container.innerHTML = '<div class="error-msg">読み込みに失敗しました。<br><a href="/" style="color:#f60">ホームに戻る</a></div>';
  }
}

function buildHTML(pedal, posts, related) {
  const types = pedal.types || [];
  const price = formatPrice(pedal.price_jpy);

  // 購入ボタン
  const soundhouseUrl = pedal.soundhouse_url ||
    `https://www.soundhouse.co.jp/search/index?s.searchWord=${encodeURIComponent(pedal.full_name)}`;
  const sweetwaterUrl =
    `https://www.sweetwater.com/store/search.php?s=${encodeURIComponent(pedal.full_name)}`;
  const amazonUrl = pedal.amazon_url ||
    `https://www.amazon.co.jp/s?k=${encodeURIComponent(pedal.full_name)}`;

  // 使用ボード
  let boardsHTML = '';
  if (posts.length > 0) {
    const cards = posts.map(p => {
      const img = p.image_urls && p.image_urls.length > 0
        ? `<img src="${p.image_urls[0]}" alt="${p.title || 'ボード'}" loading="lazy">`
        : `<div style="width:100%;aspect-ratio:4/3;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:28px;">🎛</div>`;
      const title = p.title || '無題のボード';
      const user = p.username ? `@${p.username}` : '匿名ユーザー';
      return `
        <a href="/post.html?id=${p.id}" class="board-card">
          ${img}
          <div class="board-card-info">
            <div class="board-card-title">${title}</div>
            <div class="board-card-user">${user}</div>
          </div>
        </a>`;
    }).join('');
    boardsHTML = `<div class="boards-grid">${cards}</div>`;
  } else {
    boardsHTML = `
      <div class="no-boards">
        このペダルを使ったボードはまだありません。<br>
        <a href="/">あなたのボードを投稿する →</a>
      </div>`;
  }

  // 同ブランド
  let relatedHTML = '';
  if (related.length > 0) {
    relatedHTML = related.map(r => {
      const rtypes = (r.types || []).map(formatType).join(' · ');
      return `
        <a href="/pedal.html?slug=${r.slug}" class="related-item">
          <div>
            <div class="related-item-name">${r.model}</div>
            <div class="related-item-types">${rtypes}</div>
          </div>
          <div class="related-item-arrow">›</div>
        </a>`;
    }).join('');
  }

  return `
    <!-- ペダル情報 -->
    <div class="pedal-card">
      <div class="pedal-header">
        ${pedal.image_url
          ? `<img src="${pedal.image_url}" alt="${pedal.full_name}" class="pedal-image">`
          : `<div class="pedal-image-placeholder">🎛</div>`
        }
        <div class="pedal-info">
          <div class="pedal-brand">${pedal.brand}</div>
          <div class="pedal-name">${pedal.model}</div>
          <div class="pedal-types">
            ${types.map(t => `<span class="type-badge">${formatType(t)}</span>`).join('')}
          </div>
          ${price ? `
            <div class="pedal-price-label">参考価格</div>
            <div class="pedal-price">${price}</div>
          ` : ''}
        </div>
      </div>
      <div class="pedal-description">
        ${pedal.description
          ? pedal.description
          : `<span class="no-description">説明文は準備中です。</span>`
        }
      </div>
    </div>

    <!-- 購入 -->
    <div class="buy-section">
      <h2>🛒 購入・価格をチェック</h2>
      <div class="buy-buttons">
        <a href="${soundhouseUrl}" target="_blank" rel="noopener" class="buy-btn buy-btn-soundhouse">
          🎸 サウンドハウスで探す
        </a>
        <a href="${sweetwaterUrl}" target="_blank" rel="noopener" class="buy-btn buy-btn-sweetwater">
          🎵 Sweetwaterで探す
        </a>
        <a href="${amazonUrl}" target="_blank" rel="noopener" class="buy-btn buy-btn-amazon">
          📦 Amazonで探す
        </a>
      </div>
    </div>

    <!-- 使用ボード -->
    <div class="boards-section">
      <div class="section-title">
        🎛 このペダルを使ったボード
        ${posts.length > 0 ? `<span class="section-title-count">${posts.length}件</span>` : ''}
      </div>
      ${boardsHTML}
    </div>

    <!-- 同ブランド -->
    ${related.length > 0 ? `
    <div class="related-section">
      <div class="section-title">
        🏷 ${pedal.brand}の他のペダル
      </div>
      <div class="related-list">
        ${relatedHTML}
      </div>
    </div>
    ` : ''}
  `;
}

init();
</script>
</body>
</html>
