<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペダル詳細 | My Gear My Board</title>
  <meta name="description" content="">
  <link rel="icon" href="/IMG_0206.PNG">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0e; --sf: #151517; --sf2: #1c1c1f;
      --bd: #272729; --ac: #e8552d; --tx: #eae8e2; --tm: #9a9890; --td: #6e6c68;
      --amazon: #f0a500; --sweetwater: #1a73e8; --soundhouse: #e8552d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--tx); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 100vh; }
    header {
      background: rgba(13,13,14,.96); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--bd); padding: 0 20px; height: 58px;
      display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex: 1; }
    .header-logo img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: var(--tx); }
    .header-sub { font-size: 9px; letter-spacing: 2px; color: var(--ac); text-transform: uppercase; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .lang-btn {
      display: flex; align-items: center; gap: 4px; padding: 6px 10px;
      background: var(--sf); border: 1px solid var(--bd); border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600;
      color: var(--tm); cursor: pointer; transition: all .15s; touch-action: manipulation;
    }
    .lang-btn:hover { border-color: var(--ac); color: var(--ac); }
    .home-btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 14px;
      background: var(--sf); border: 1px solid var(--bd); border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 600;
      color: var(--tm); cursor: pointer; transition: all .15s; text-decoration: none; white-space: nowrap;
    }
    .home-btn:hover { border-color: var(--ac); color: var(--ac); }
    .breadcrumb {
      background: var(--sf); border-bottom: 1px solid var(--bd);
      padding: 10px 16px; font-size: 12px; color: var(--tm);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .breadcrumb a { color: var(--tm); text-decoration: none; }
    .breadcrumb a:hover { color: var(--tx); }
    .breadcrumb .sep { color: var(--bd); }
    .breadcrumb .current { color: var(--tx); }
    .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
    .loading { text-align: center; padding: 60px 20px; color: var(--tm); font-family: 'Noto Sans JP', sans-serif; }
    .error-box { background: var(--sf); border: 1px solid #c0392b; border-radius: 12px; padding: 40px 20px; text-align: center; color: var(--tm); }
    /* ペダルカード */
    .pedal-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .pedal-top { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
    .pedal-image {
      width: 120px; height: 120px; flex-shrink: 0;
      background: var(--sf2); border-radius: 12px; border: 1px solid var(--bd);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .pedal-image img { width: 100%; height: 100%; object-fit: contain; }
    .pedal-image-placeholder { font-size: 40px; opacity: .3; }
    .pedal-info { flex: 1; min-width: 0; }
    .pedal-brand { font-size: 12px; font-weight: 700; color: var(--ac); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
    .pedal-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; line-height: 1.2; margin-bottom: 10px; word-break: break-word; }
    .type-badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .type-badge { background: var(--sf2); border: 1px solid var(--bd); color: var(--tm); font-size: 11px; padding: 3px 10px; border-radius: 20px; }
    .pedal-description { margin-top: 16px; font-size: 14px; color: var(--tm); line-height: 1.7; padding-top: 16px; border-top: 1px solid var(--bd); font-family: 'Noto Sans JP', sans-serif; }
    .pedal-description.empty { font-style: italic; color: var(--td); }
    /* 購入ボタン */
    .buy-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .buy-card-title { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--td); margin-bottom: 12px; text-align: center; letter-spacing: 1px; }
    .buy-buttons { display: flex; flex-direction: column; gap: 10px; }
    .buy-btn {
      display: block; width: 100%; padding: 14px; border-radius: 10px;
      text-align: center; font-size: 15px; font-weight: 700; text-decoration: none;
      border: none; cursor: pointer; transition: opacity .2s; font-family: 'Noto Sans JP', sans-serif;
    }
    .buy-btn:hover { opacity: .85; }
    .buy-btn.soundhouse { background: var(--soundhouse); color: #fff; }
    .buy-btn.sweetwater { background: var(--sweetwater); color: #fff; }
    .buy-btn.amazon { background: var(--amazon); color: #111; }
    /* ボードセクション */
    .boards-card { background: var(--sf); border: 1px solid var(--bd); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .boards-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .boards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (max-width: 480px) { .boards-grid { grid-template-columns: 1fr 1fr; } }
    .board-item {
      background: var(--sf2); border: 1px solid var(--bd); border-radius: 10px;
      overflow: hidden; text-decoration: none; color: var(--tx); display: block; transition: border-color .2s;
    }
    .board-item:hover { border-color: var(--ac); }
    .board-thumb { width: 100%; aspect-ratio: 4/3; background: var(--sf); overflow: hidden; }
    .board-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .board-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--bd); }
    .board-meta { padding: 10px; }
    .board-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .board-user { font-size: 11px; color: var(--tm); font-family: 'Noto Sans JP', sans-serif; }
    /* 空状態 */
    .empty-state { text-align: center; padding: 36px 20px; }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; opacity: .4; }
    .empty-state-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--tm); margin-bottom: 8px; }
    .empty-state-text { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--td); line-height: 1.6; margin-bottom: 16px; }
    .empty-state-btn {
      display: inline-block; padding: 10px 24px;
      background: var(--ac); border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 600;
      color: #fff; text-decoration: none; transition: background .15s;
    }
    .empty-state-btn:hover { background: #cf4c26; }
  </style>
</head>
<body>
<header>
  <a href="/" class="header-logo">
    <img src="/IMG_0206.PNG" alt="MGMB" onerror="this.style.display='none'">
    <div>
      <div class="header-title">MY GEAR MY BOARD</div>
      <div class="header-sub" id="header-sub">ペダルボードSNS</div>
    </div>
  </a>
  <div class="header-right">
    <div class="lang-btn" id="lang-btn" onclick="toggleLang()">🌐 <span id="lang-label">EN</span></div>
    <a href="/" class="home-btn">🏠 <span id="home-text">ホーム</span></a>
  </div>
</header>

<div class="breadcrumb">
  <a href="/" id="bc-home">ホーム</a>
  <span class="sep">›</span>
  <a href="#" id="bc-brand">...</a>
  <span class="sep">›</span>
  <span id="bc-pedal" class="current">読み込み中...</span>
</div>

<div class="container">
  <div id="content"><div class="loading" id="loading-msg">読み込み中...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://yzqfockzgyfjmngygbhp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cWZvY2t6Z3lmam1uZ3lnYmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxODksImV4cCI6MjA4OTY3MjE4OX0.Cn4UMJ8y6CHuIMDeFEShej4t1p4syweLgo5ZXZNs-_g';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

function detectLang() {
  const saved = localStorage.getItem('mgmb_lang');
  if (saved) return saved;
  const bl = navigator.language || navigator.userLanguage || 'ja';
  return bl.toLowerCase().startsWith('ja') ? 'ja' : 'en';
}
let lang = detectLang();

const I18N = {
  ja: {
    headerSub:'ペダルボードSNS', home:'ホーム', langLabel:'EN',
    bcHome:'ホーム',
    descEmpty:'説明文は準備中です。',
    buyTitle:'🛒 購入・価格をチェック',
    btnSoundhouse:'🎸 サウンドハウスで探す',
    btnSweetwater:'🎵 Sweetwaterで探す',
    btnAmazon:'📦 Amazonで探す',
    sectionBoards:'このペダルを使ったボード',
    emptyBoardTitle:'まだ投稿がありません',
    emptyBoardText:'このペダルを使ったボードをあなたが最初に投稿しましょう！',
    emptyBoardBtn:'ボードを投稿する →',
    loading:'読み込み中...', notFound:'ペダルが見つかりませんでした。',
    backHome:'← ホームに戻る', anonUser:'匿名',
    untitled:'無題のボード',
  },
  en: {
    headerSub:'Pedalboard SNS', home:'Home', langLabel:'JA',
    bcHome:'Home',
    descEmpty:'Description coming soon.',
    buyTitle:'🛒 Check Prices',
    btnSoundhouse:'🎸 Find on Soundhouse',
    btnSweetwater:'🎵 Find on Sweetwater',
    btnAmazon:'📦 Find on Amazon',
    sectionBoards:'Boards using this pedal',
    emptyBoardTitle:'No boards yet',
    emptyBoardText:"Be the first to post a board featuring this pedal!",
    emptyBoardBtn:'Post your board →',
    loading:'Loading...', notFound:'Pedal not found.',
    backHome:'← Back to Home', anonUser:'Anonymous',
    untitled:'Untitled Board',
  }
};
function tr(key) { return (I18N[lang] || I18N.ja)[key] || I18N.ja[key] || key; }

const TYPE_LABELS = {
  'overdrive':'OD','od':'OD','distortion':'Dist','dist':'Dist',
  'fuzz':'Fuzz','boost':'Boost','reverb':'Reverb','delay':'Delay',
  'chorus':'Chorus','flanger':'Flanger','phaser':'Phaser',
  'modulation':'Mod','mod':'Mod','tremolo':'Tremolo','vibrato':'Vibrato',
  'pitch':'Pitch','wah':'Wah','compressor':'Comp','comp':'Comp','eq':'EQ',
  'noise_gate':'Noise Gate','looper':'Looper','volume':'Volume','tuner':'Tuner',
  'multi':'Multi FX','preamp':'Preamp','switcher':'Switcher','buffer':'Buffer',
  'junction_box':'Junction Box','pre':'Preamp'
};
function getTypeLabel(t) { return TYPE_LABELS[t?.toLowerCase()] || t; }

function soundhouseUrl(name) { return 'https://www.soundhouse.co.jp/search/index?search_all=' + encodeURIComponent(name); }
function sweetwaterUrl(name) { return 'https://www.sweetwater.com/store/search.php?s=' + encodeURIComponent(name); }
function amazonUrl(name) { return 'https://www.amazon.co.jp/s?k=' + encodeURIComponent(name); }

function applyLang() {
  document.getElementById('header-sub').textContent = tr('headerSub');
  document.getElementById('home-text').textContent = tr('home');
  document.getElementById('lang-label').textContent = tr('langLabel');
  document.getElementById('bc-home').textContent = tr('bcHome');
}

function toggleLang() {
  lang = lang === 'ja' ? 'en' : 'ja';
  localStorage.setItem('mgmb_lang', lang);
  applyLang();
  if (cachedPedal) renderPedal(cachedPedal, cachedPosts);
}

let cachedPedal = null;
let cachedPosts = [];

async function loadPedal() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  if (!slug) { showError(tr('notFound')); return; }

  const { data: pedals } = await db.from('pedals')
    .select('id, brand, model, full_name, slug, types, image_url, description')
    .eq('slug', decodeURIComponent(slug)).limit(1);

  if (!pedals || !pedals.length) { showError(tr('notFound')); return; }
  const pedal = pedals[0];
  cachedPedal = pedal;

  // パンくず更新
  document.getElementById('bc-brand').textContent = pedal.brand;
  document.getElementById('bc-brand').href = `/brand?name=${encodeURIComponent(pedal.brand)}`;
  document.getElementById('bc-pedal').textContent = pedal.model;
  document.title = `${pedal.full_name} | My Gear My Board`;

  // このペダルを使った投稿を取得
  const { data: allPosts } = await db.from('posts')
    .select('id, title, username, image_urls, gear_list')
    .order('created_at', { ascending: false });

  const posts = (allPosts || []).filter(p => {
    const gear = Array.isArray(p.gear_list) ? p.gear_list : [];
    return gear.some(g => (g.name || '').toLowerCase() === pedal.full_name.toLowerCase());
  }).slice(0, 6);
  cachedPosts = posts;

  renderPedal(pedal, posts);
}

function renderPedal(pedal, posts) {
  const typesHtml = (pedal.types || []).map(t =>
    `<span class="type-badge">${getTypeLabel(t)}</span>`
  ).join('');

  const imageHtml = pedal.image_url
    ? `<img src="${pedal.image_url}" alt="${pedal.model}" loading="lazy">`
    : `<span class="pedal-image-placeholder">🎛</span>`;

  const descHtml = pedal.description
    ? `<div class="pedal-description">${pedal.description}</div>`
    : `<div class="pedal-description empty">${tr('descEmpty')}</div>`;

  // ボードセクション
  let boardsHtml = '';
  if (posts.length > 0) {
    boardsHtml = posts.map(post => {
      const thumb = (post.image_urls?.length > 0)
        ? `<img src="${post.image_urls[0]}" alt="" loading="lazy">`
        : `<div class="board-thumb-placeholder">🎸</div>`;
      return `<a href="/post?id=${post.id}" class="board-item">
        <div class="board-thumb">${thumb}</div>
        <div class="board-meta">
          <div class="board-title">${post.title || tr('untitled')}</div>
          <div class="board-user">${post.username ? '@' + post.username : tr('anonUser')}</div>
        </div>
      </a>`;
    }).join('');
  } else {
    boardsHtml = `
      <div class="empty-state">
        <div class="empty-state-icon">🎸</div>
        <div class="empty-state-title">${tr('emptyBoardTitle')}</div>
        <div class="empty-state-text">${tr('emptyBoardText')}</div>
        <a href="/" class="empty-state-btn">${tr('emptyBoardBtn')}</a>
      </div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="pedal-card">
      <div class="pedal-top">
        <div class="pedal-image">${imageHtml}</div>
        <div class="pedal-info">
          <div class="pedal-brand">${pedal.brand}</div>
          <div class="pedal-name">${pedal.model}</div>
          <div class="type-badges">${typesHtml}</div>
        </div>
      </div>
      ${descHtml}
    </div>

    <div class="buy-card">
      <div class="buy-card-title">${tr('buyTitle')}</div>
      <div class="buy-buttons">
        <a href="${soundhouseUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn soundhouse">${tr('btnSoundhouse')}</a>
        <a href="${sweetwaterUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn sweetwater">${tr('btnSweetwater')}</a>
        <a href="${amazonUrl(pedal.full_name)}" target="_blank" rel="noopener" class="buy-btn amazon">${tr('btnAmazon')}</a>
      </div>
    </div>

    <div class="boards-card">
      <h3>🎛 ${tr('sectionBoards')}</h3>
      <div class="boards-grid">${boardsHtml}</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="error-box">
      <p>${msg}</p>
      <a href="/" style="color:var(--ac);margin-top:16px;display:block;">${tr('backHome')}</a>
    </div>`;
}

applyLang();
loadPedal();
</script>
</body>
</html>
