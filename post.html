<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Gear My Board</title>
<meta property="og:title" content="My Gear My Board">
<meta property="og:description" content="ペダルボード・機材を投稿・共有するSNS">
<meta property="og:image" content="">
<meta property="og:url" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="robots" content="index, follow">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0e;--sf:#151517;--sf2:#1c1c1f;--bd:#272729;--ac:#e8552d;--ac2:#f0a500;--tx:#eae8e2;--tm:#78766f;--td:#3e3c3a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh}
header{position:sticky;top:0;z-index:300;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(13,13,14,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd)}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--ac);text-transform:uppercase;margin-top:2px}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--tm);cursor:pointer;transition:all .15s;touch-action:manipulation}
.back-btn:hover{border-color:var(--ac);color:var(--ac)}
.lang-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--sf);border:1px solid var(--bd);border-radius:4px;font-size:14px;cursor:pointer;touch-action:manipulation}
.page{max-width:900px;margin:0 auto;padding:32px 20px;position:relative;z-index:1}
.slider{position:relative;background:var(--sf2);border-radius:8px;overflow:hidden;margin-bottom:24px;border:1px solid var(--bd)}
.slide{min-width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
.slide img{width:100%;height:100%;object-fit:contain;background:#000}
.slide-track{display:flex;transition:transform .35s cubic-bezier(.25,.46,.45,.94)}
.s-btn{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;background:rgba(13,13,14,.75);border:1px solid var(--bd);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--tx);transition:all .15s;z-index:10;touch-action:manipulation}
.s-btn:hover{background:var(--ac);border-color:var(--ac)}
.s-btn.prev{left:12px}.s-btn.next{right:12px}
.s-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.s-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .2s;touch-action:manipulation}
.s-dot.on{background:#fff;transform:scale(1.2)}
.no-img{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:60px;opacity:.15;margin-bottom:24px;background:var(--sf);border-radius:8px;border:1px solid var(--bd)}
.yt-section{margin-bottom:20px}
.yt-embed-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;border:1px solid var(--bd);background:#000}
.yt-embed-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.meta{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:2px solid var(--bd);flex-shrink:0;background:linear-gradient(135deg,#e85c2f,#b03020)}
.meta-info{flex:1}
.meta-name{font-size:14px;font-weight:500}
.meta-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);margin-top:2px}
.post-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;line-height:1.2;margin-bottom:16px}
.type-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.type-badge.board{background:rgba(232,85,45,.12);color:var(--ac);border:1px solid rgba(232,85,45,.25)}
.type-badge.gear{background:#1a3a1a;color:#6aba6a;border:1px solid #2a5a2a}
.actions{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;border:1px solid var(--bd);background:var(--sf);color:var(--tm);touch-action:manipulation}
.act-btn:hover{border-color:var(--ac);color:var(--ac)}
.act-btn.liked{color:var(--ac);border-color:rgba(232,85,45,.4)}
.act-btn.x-act{background:#000;border-color:#333;color:#fff}
.act-btn.x-act:hover{background:#111;border-color:var(--ac)}
.section{border-top:1px solid var(--bd);padding-top:20px;margin-top:20px}
.section-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--td);margin-bottom:12px}
.gear-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;margin-bottom:6px}
.gear-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0;margin-right:10px}
.gear-name{font-size:13px;font-weight:400;flex:1}
.sh-link{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:600;letter-spacing:.5px;color:var(--ac);text-decoration:none;padding:4px 10px;border:1px solid rgba(232,85,45,.3);border-radius:3px;white-space:nowrap;transition:all .15s}
.sh-link:hover{background:rgba(232,85,45,.1);border-color:var(--ac)}
.genre-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.gtag{padding:4px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tm)}
.desc{font-size:13.5px;line-height:1.8;color:var(--tm);white-space:pre-wrap}
.desc-toggle{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ac);cursor:pointer;margin-top:8px;display:inline-block}
.comment-name-input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:3px 3px 0 0;padding:8px 12px;font-size:16px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s;border-bottom:none}
.comment-name-input:focus{border-color:var(--ac)}
.comment-name-input::placeholder{color:var(--td)}
.comment-input-wrap{display:flex;gap:8px;margin-bottom:20px;align-items:flex-end}
.comment-input-col{flex:1;display:flex;flex-direction:column}
.comment-input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:0 0 4px 4px;padding:10px 12px;font-size:16px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;resize:none;min-height:44px;transition:border-color .15s}
.comment-input:focus{border-color:var(--ac)}
.comment-input::placeholder{color:var(--td)}
.comment-submit{padding:10px 16px;background:var(--ac);border:none;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .15s;white-space:nowrap;touch-action:manipulation;min-height:44px}
.comment-submit:hover{background:#cf4c26}
.comment{padding:14px 0;border-bottom:1px solid var(--bd)}
.comment:last-child{border-bottom:none}
.c-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.c-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:linear-gradient(135deg,#e85c2f,#b03020);flex-shrink:0}
.c-name{font-size:12px;font-weight:500}
.c-time{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--td);margin-left:auto}
.c-body{font-size:13px;line-height:1.65;color:var(--tm);padding-left:36px}
.c-reply-btn{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--ac);cursor:pointer;margin-top:8px;transition:all .15s;touch-action:manipulation;background:transparent;border:none;padding:5px 10px 5px 36px;border-radius:3px}
.c-reply-btn:hover{background:rgba(232,85,45,.1)}
.c-mention{color:var(--ac);font-weight:500}
.reply-indent{padding-left:28px;border-left:2px solid var(--bd);margin-top:8px}
.reply-form{padding-left:36px;margin-top:8px;display:none}
.reply-form.open{display:flex;flex-direction:column;gap:4px}
.reply-name-input{background:var(--sf2);border:1px solid var(--bd);border-radius:3px 3px 0 0;padding:6px 10px;font-size:16px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;border-bottom:none}
.reply-name-input:focus{border-color:var(--ac)}
.reply-name-input::placeholder{color:var(--td)}
.reply-row{display:flex;gap:6px}
.reply-input{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:0 0 3px 3px;padding:7px 10px;font-size:16px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s}
.reply-input:focus{border-color:var(--ac)}
.reply-submit{padding:7px 12px;background:var(--ac);border:none;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sf);border:1px solid var(--bd);border-radius:4px;padding:10px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ebd{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(6px);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .22s}
.ebd.open{opacity:1;pointer-events:all}
.eform{background:var(--sf);border:1px solid var(--bd);border-radius:8px;width:100%;max-width:460px;padding:28px;position:relative;transform:scale(.94) translateY(10px);transition:transform .24s;max-height:90vh;overflow-y:auto}
.ebd.open .eform{transform:scale(1) translateY(0)}
.eform-close{position:absolute;top:14px;right:14px;width:28px;height:28px;background:var(--sf2);border:1px solid var(--bd);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--tm)}
.eform-close:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
.eform-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:6px}
.eform-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);letter-spacing:1px;margin-bottom:20px}
.pin-row{display:flex;gap:8px;justify-content:center;margin:12px 0 18px}
.pin-d{width:56px;height:62px;background:var(--sf2);border:2px solid var(--bd);border-radius:6px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;color:var(--tx);outline:none;transition:border-color .15s;caret-color:var(--ac)}
.pin-d:focus{border-color:var(--ac)}
.pin-err{font-family:'JetBrains Mono',monospace;font-size:10px;color:#e05050;text-align:center;min-height:16px;margin-bottom:6px}
.form-row{margin-bottom:14px}
.form-lbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:#9a9890;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;padding:9px 12px;font-size:16px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--ac)}
textarea.form-input{resize:vertical;min-height:80px}
.yt-input-wrap{position:relative;display:flex;align-items:center}
.yt-input-wrap .yt-icon{position:absolute;left:10px;font-size:16px;pointer-events:none}
.yt-input-wrap .form-input{padding-left:34px}
.submit-btn{width:100%;background:var(--ac);border:none;border-radius:4px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .18s;margin-top:4px;touch-action:manipulation}
.submit-btn:hover{background:#cf4c26}
.del-btn{width:100%;background:transparent;border:1px solid #5a1a1a;border-radius:4px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#e05050;cursor:pointer;transition:all .18s;margin-top:6px;touch-action:manipulation}
.del-btn:hover{background:rgba(224,80,80,.1);border-color:#e05050}
.report-bd{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .22s}
.report-bd.open{opacity:1;pointer-events:all}
.report-form{background:var(--sf);border:1px solid var(--bd);border-radius:8px;width:100%;max-width:400px;padding:24px;position:relative}
.report-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:14px}
.report-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.report-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;cursor:pointer;font-size:12px;transition:all .15s;touch-action:manipulation}
.report-opt:hover{border-color:rgba(224,80,80,.4);color:#e05050}
.report-opt.on{border-color:#e05050;background:rgba(224,80,80,.08);color:#e05050}
.report-submit{width:100%;background:#c03030;border:none;border-radius:4px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#fff;cursor:pointer;touch-action:manipulation}
.report-close{position:absolute;top:14px;right:14px;width:26px;height:26px;background:var(--sf2);border:1px solid var(--bd);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--tm)}
.report-close:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
/* 編集モーダル 画像サムネイル */
.edit-img-small{position:relative;width:90px;height:90px;border-radius:4px;overflow:hidden;border:1px solid var(--bd);flex-shrink:0;background:#000}
.edit-img-small img{width:100%;height:100%;object-fit:contain}
.edit-img-edit-btn{position:absolute;bottom:0;left:0;right:0;background:rgba(232,85,45,.85);border:none;color:#fff;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;padding:4px;cursor:pointer;text-align:center;touch-action:manipulation}
/* サジェスト入力（機材） */
.gear-input-wrap{position:relative}
.gear-tags{display:flex;flex-wrap:wrap;gap:5px;min-height:36px;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;padding:6px 8px;cursor:text;transition:border-color .15s}
.gear-tags:focus-within{border-color:var(--ac)}
.gear-tag{display:flex;align-items:center;gap:4px;background:rgba(232,85,45,.12);border:1px solid rgba(232,85,45,.3);border-radius:2px;padding:2px 7px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ac);white-space:nowrap}
.gear-tag-x{cursor:pointer;font-size:12px;color:var(--ac);opacity:.7;background:none;border:none;padding:0}
.gear-text-input{background:transparent;border:none;outline:none;font-size:16px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;min-width:140px;flex:1;padding:1px 2px}
.gear-text-input::placeholder{color:var(--td)}
.ac-dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:4px;z-index:700;max-height:200px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ac-dropdown.open{display:block}
.ac-item{padding:8px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .12s;border-bottom:1px solid var(--bd)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.focus{background:rgba(232,85,45,.1)}
.ac-item-name{flex:1;color:var(--tx)}
.ac-item-brand{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td)}
.ac-empty{padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--td);text-align:center}
/* 画像エディター */
.img-editor-bd{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:800;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .22s}
.img-editor-bd.open{opacity:1;pointer-events:all}
.img-editor-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.img-editor-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.img-editor-subtitle{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);margin-top:2px}
.img-editor-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:#000}
#editor-canvas{max-width:100%;max-height:100%;display:block;touch-action:none}
.img-editor-toolbar{display:flex;align-items:center;gap:6px;padding:10px 12px;border-top:1px solid var(--bd);flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;background:var(--sf)}
.editor-tool-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--sf2);color:var(--tm);font-family:'JetBrains Mono',monospace;font-size:7.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;flex-shrink:0;min-width:58px;min-height:52px;touch-action:manipulation;transition:all .15s}
.editor-tool-btn:hover{border-color:var(--ac);color:var(--ac)}
.editor-tool-btn.active{background:rgba(232,85,45,.2);border-color:var(--ac);color:var(--ac)}
.editor-tool-icon{font-size:18px;line-height:1}
.editor-done-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 14px;border-radius:6px;border:none;background:var(--ac);color:#fff;font-family:'JetBrains Mono',monospace;font-size:7.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;flex-shrink:0;min-width:58px;min-height:52px;touch-action:manipulation;margin-left:auto}
.editor-done-btn:hover{background:#cf4c26}
.editor-done-icon{font-size:18px;line-height:1}
.img-editor-hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);text-align:center;padding:5px;flex-shrink:0;background:var(--bg)}
.img-tab-bar{display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg)}
.img-tab{padding:5px 12px;border-radius:3px;border:1px solid var(--bd);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:var(--tm);cursor:pointer;min-height:32px;touch-action:manipulation}
.img-tab.on{background:rgba(232,85,45,.15);border-color:var(--ac);color:var(--ac)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@media(max-width:600px){
.page{padding:16px 14px}
.post-title{font-size:22px}
.actions{gap:6px}
.act-btn{padding:7px 12px;font-size:8px}
}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="goBack()">
    <img class="logo-img" src="IMG_0206.PNG" alt="MGMB" onerror="this.style.display='none'">
    <div class="logo-text">
      <div class="logo-main">My Gear My Board</div>
      <div class="logo-sub">ペダルボードSNS · Japan</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="back-btn" onclick="goBack()">← ボード一覧へ</div>
    <div class="lang-btn" onclick="toggleLang()" title="EN / JA">🌐</div>
  </div>

function getSessionId(){let s=localStorage.getItem('mgmb_sid');if(!s){s='sid_'+Math.random().toString(36).slice(2)+Date.now();localStorage.setItem('mgmb_sid',s);}return s;}

function soundhouseUrl(name){return'https://www.soundhouse.co.jp/search/index?search_all='+encodeURIComponent(name);}

function parseGenre(genre){
  if(!genre)return[];
  if(Array.isArray(genre))return genre;
  if(typeof genre==='string'){try{const p=JSON.parse(genre);return Array.isArray(p)?p:[genre];}catch(e){return[genre];}}
  return[];
}

function getYouTubeId(url){
  if(!url)return null;
  const patterns=[
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/
  ];
  for(const p of patterns){const m=url.match(p);if(m)return m[1];}
  return null;
}

async function loadPost(){
  if(!POST_ID){document.getElementById('page-content').innerHTML='<div style="text-align:center;padding:60px;color:var(--td);font-family:JetBrains Mono,monospace">投稿が見つかりません</div>';return;}
  const{data,error}=await sb.from('posts').select('*').eq('id',POST_ID).single();
  if(error||!data){document.getElementById('page-content').innerHTML='<div style="text-align:center;padding:60px;color:var(--td);font-family:JetBrains Mono,monospace">投稿が見つかりません</div>';return;}
  currentPost=data;
  document.title=data.title+' — My Gear My Board';
  document.querySelector('meta[property="og:title"]').setAttribute('content',data.title+' — My Gear My Board');
  document.querySelector('meta[property="og:url"]').setAttribute('content',location.href);
  if(data.image_urls&&data.image_urls[0]){
    document.querySelector('meta[property="og:image"]').setAttribute('content',data.image_urls[0]);
  }
  renderPost(data);
  loadComments();
}

function renderPost(p){
  const isGear=p.post_type==='gear';
  const imgs=p.image_urls||[];
  const gear=Array.isArray(p.gear_list)?p.gear_list:[];
  const genres=parseGenre(p.genre);
  const init=(p.username||'匿')[0].toUpperCase();
  const liked=localStorage.getItem('liked_'+p.id)==='1';
  const ytId=getYouTubeId(p.youtube_url);
  let html='';

  // ① 画像スライダー
  if(imgs.length){
    html+='<div class="slider"><div class="slide-track" id="slide-track">';
    imgs.forEach(u=>html+='<div class="slide"><img src="'+u+'" loading="lazy"></div>');
    html+='</div>';
    if(imgs.length>1){
      html+='<div class="s-btn prev" onclick="slide(-1)">‹</div>';
      html+='<div class="s-btn next" onclick="slide(1)">›</div>';
      html+='<div class="s-dots">';
      imgs.forEach((_,i)=>html+='<div class="s-dot'+(i===0?' on':'')+'" onclick="goSlide('+i+')"></div>');
      html+='</div>';
    }
    html+='</div>';
  }else{
    html+='<div class="no-img">'+(isGear?'🎸':'🎛')+'</div>';
  }

  // ② タイプバッジ・タイトル・投稿者
  html+='<div class="type-badge '+(isGear?'gear':'board')+'">'+(isGear?(lang==='en'?'Gear':'機材'):(lang==='en'?'Pedalboard':'エフェクターボード'))+'</div>';
  html+='<div class="post-title">'+p.title+'</div>';
  // ✏️アイコンは削除（編集ボタンと役割重複のため）
  html+='<div class="meta">'
    +'<div class="av">'+init+'</div>'
    +'<div class="meta-info"><div class="meta-name">'+(p.username||'匿名ユーザー')+'</div>'
    +'<div class="meta-time">'+timeAgo(p.created_at)+'</div></div>'
    +'</div>';

  // ③ アクションボタン
  html+='<div class="actions">'
    +'<div class="act-btn'+(liked?' liked':'')+'" id="like-btn" onclick="toggleLike()">'+(liked?'❤️':'🤍')+(lang==='en'?' Like ':' いいね ')+'<span id="like-count">'+(p.likes||0)+'</span></div>'
    +'<div class="act-btn" onclick="copyUrl()">🔗 '+(lang==='en'?'Copy URL':'URLをコピー')+'</div>'
    +'<div class="act-btn x-act" onclick="postToX()">𝕏 Xに投稿</div>'
    +'<div class="act-btn" onclick="openEditModal()">✏️ '+(lang==='en'?'Edit':'編集')+'</div>'
    +'<div class="act-btn" style="color:#e05050;border-color:rgba(224,80,80,.3)" onclick="openReport()">🚩 '+(lang==='en'?'Report':'通報')+'</div>'
    +'</div>';

  // ④ タグ（ジャンル）
  if(genres.length){html+='<div class="genre-tags">'+genres.map(g=>'<span class="gtag">'+g+'</span>').join('')+'</div>';}

  // ⑤ 機材リスト
  if(gear.length){
    html+='<div class="section"><div class="section-lbl">'+(lang==='en'?'Gear List':'使用機材リスト')+'</div>';
    gear.forEach(g=>{
      const name=g.name||g;
      html+='<div class="gear-item"><div class="gear-dot"></div><div class="gear-name">'+name+'</div>'
        +'<a class="sh-link" href="'+soundhouseUrl(name)+'" target="_blank" rel="noopener">'+(lang==='en'?'View on Soundhouse →':'サウンドハウスで見る →')+'</a></div>';
    });
    html+='</div>';
  }

  // ⑥ 本文
  if(p.description){
    const desc=p.description;const limit=200;
    html+='<div class="section">';
    if(desc.length>limit){
      html+='<div class="desc" id="desc-text">'+escHtml(desc.slice(0,limit))+'...</div>';
      html+='<span class="desc-toggle" onclick="expandDesc()">'+(lang==='en'?'Read more':'もっと見る')+'</span>';
      window._fullDesc=desc;
    }else{
      html+='<div class="desc">'+escHtml(desc)+'</div>';
    }
    html+='</div>';
  }

  // ⑦ YouTube
  if(ytId){
    html+='<div class="section yt-section">'
      +'<div class="section-lbl" style="margin-bottom:10px">▶ YouTube動画</div>'
      +'<div class="yt-embed-wrap">'
      +'<iframe src="https://www.youtube.com/embed/'+ytId+'" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>'
      +'</div></div>';
  }

  // ⑧ コメント
  const _cL=lang==='en'?'Comments':'コメント',_cN=lang==='en'?'Name (optional)':'名前（任意）',_cP=lang==='en'?'Write a comment...':'コメントを投稿する...',_cB=lang==='en'?'Post':'投稿';
  html+='<div class="section" id="comment-section">'
    +'<div class="section-lbl">'+_cL+'</div>'
    +'<div class="comment-input-wrap">'
    +'<div class="comment-input-col">'
    +'<input class="comment-name-input" id="comment-name" type="text" placeholder="'+_cN+'" maxlength="30">'
    +'<textarea class="comment-input" id="comment-input" placeholder="'+_cP+'" rows="2"></textarea>'
    +'</div>'
    +'<button class="comment-submit" onclick="postComment(null)">'+_cB+'</button>'
    +'</div>'
    +'<div id="comments-list"></div>'
    +'</div>';

  document.getElementById('page-content').innerHTML=html;
  initSlider(imgs.length);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function expandDesc(){
  const el=document.getElementById('desc-text');if(el&&window._fullDesc)el.innerHTML=escHtml(window._fullDesc);
  const toggle=document.querySelector('.desc-toggle');if(toggle)toggle.style.display='none';
}
function timeAgo(ts){
  const d=Math.floor((Date.now()-new Date(ts))/1000);
  if(d<60)return'たった今';if(d<3600)return Math.floor(d/60)+'分前';if(d<86400)return Math.floor(d/3600)+'時間前';return Math.floor(d/86400)+'日前';
}

let slideIdx=0;
function initSlider(count){slideIdx=0;}
function slide(dir){const imgs=currentPost.image_urls||[];if(imgs.length<=1)return;slideIdx=(slideIdx+dir+imgs.length)%imgs.length;goSlide(slideIdx);}
function goSlide(i){const track=document.getElementById('slide-track');if(!track)return;slideIdx=i;track.style.transform='translateX(-'+i+'00%)';document.querySelectorAll('.s-dot').forEach((d,j)=>d.classList.toggle('on',j===i));}

async function toggleLike(){
  const btn=document.getElementById('like-btn');const cnt=document.getElementById('like-count');
  const liked=localStorage.getItem('liked_'+POST_ID)==='1';
  if(liked){
    await sb.from('likes').delete().eq('post_id',POST_ID).eq('session_id',SESSION_ID);
    const n=Math.max(0,(parseInt(cnt.textContent)||1)-1);
    await sb.from('posts').update({likes:n}).eq('id',POST_ID);
    btn.innerHTML='🤍 いいね <span id="like-count">'+n+'</span>';
    btn.classList.remove('liked');localStorage.removeItem('liked_'+POST_ID);
  }else{
    await sb.from('likes').insert({post_id:POST_ID,session_id:SESSION_ID});
    const n=(parseInt(cnt.textContent)||0)+1;
    await sb.from('posts').update({likes:n}).eq('id',POST_ID);
    btn.innerHTML='❤️ いいね <span id="like-count">'+n+'</span>';
    btn.classList.add('liked');localStorage.setItem('liked_'+POST_ID,'1');showToast('❤️ いいねしました');
  }
}

function copyUrl(){
  navigator.clipboard.writeText(location.href).then(()=>showToast('🔗 URLをコピーしました')).catch(()=>{
    const el=document.createElement('textarea');el.value=location.href;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);showToast('🔗 URLをコピーしました');
  });
}
function postToX(){
  if(!currentPost)return;
  const text=encodeURIComponent(currentPost.title+' #MyGearMyBoard #エフェクターボード');
  const url=encodeURIComponent(location.href);
  window.open('https://twitter.com/intent/tweet?text='+text+'&url='+url,'_blank','width=550,height=420');
}

async function loadComments(){
  const{data}=await sb.from('comments').select('*').eq('post_id',POST_ID).order('created_at',{ascending:true});
  allComments=data||[];renderComments();
}
function renderComments(){
  const el=document.getElementById('comments-list');if(!el)return;
  const roots=allComments.filter(c=>!c.parent_id);
  if(!roots.length){el.innerHTML='<div style="font-size:13px;color:var(--td);padding:16px 0">'+(lang==='en'?'No comments yet. Be the first!':'まだコメントはありません。最初のコメントを書いてみましょう！')+'</div>';return;}
  el.innerHTML=roots.map(c=>renderComment(c,0)).join('');
}
function renderComment(c,depth){
  const init=(c.username||'匿')[0].toUpperCase();
  const children=allComments.filter(x=>x.parent_id===c.id);
  const mention=c.reply_to_name?'<span class="c-mention">@'+c.reply_to_name+'</span> ':'';
  let html='<div class="comment" id="c-'+c.id+'">'
    +'<div class="c-head"><div class="c-av">'+init+'</div>'
    +'<div class="c-name">'+(c.username||(lang==='en'?'Anonymous':'匿名ユーザー'))+'</div>'
    +'<div class="c-time">'+timeAgo(c.created_at)+'</div></div>'
    +'<div class="c-body">'+mention+escHtml(c.content)+'</div>'
    +'<span class="c-reply-btn" onclick="openReply(\''+c.id+'\',\''+escHtml(c.username||'匿名')+'\')">↩ '+(lang==='en'?'Reply':'返信')+'</span>'
    +'<div class="reply-form" id="rf-'+c.id+'">'
    +'<input class="reply-name-input" id="rn-'+c.id+'" type="text" placeholder="'+(lang==='en'?'Name (optional)':'名前（任意）')+'" maxlength="30">'
    +'<div class="reply-row">'
    +'<input class="reply-input" id="ri-'+c.id+'" placeholder="@'+(c.username||'匿名')+'への返信..." type="text">'
    +'<button class="reply-submit" onclick="postComment(\''+c.id+'\',\''+escHtml(c.username||'匿名')+'\')">'+(lang==='en'?'Post':'投稿')+'</button>'
    +'</div></div>';
  if(children.length){html+='<div class="reply-indent">'+children.map(ch=>renderComment(ch,depth+1)).join('')+'</div>';}
  html+='</div>';
  return html;
}
function openReply(parentId,name){
  document.querySelectorAll('.reply-form').forEach(f=>f.classList.remove('open'));
  const form=document.getElementById('rf-'+parentId);
  if(form){form.classList.add('open');document.getElementById('rn-'+parentId).focus();}
}
async function postComment(parentId,replyToName){
  const nameEl=parentId?document.getElementById('rn-'+parentId):document.getElementById('comment-name');
  const inputEl=parentId?document.getElementById('ri-'+parentId):document.getElementById('comment-input');
  const content=inputEl.value.trim();
  const username=nameEl?nameEl.value.trim()||null:null;
  if(!content){showToast(lang==='en'?'❌ Please enter a comment':'❌ コメントを入力してください');return;}
  const{error}=await sb.from('comments').insert({post_id:POST_ID,parent_id:parentId||null,username,content,reply_to_name:replyToName||null});
  if(error){showToast(lang==='en'?'❌ Failed to post':'❌ 投稿に失敗しました');console.error(error);return;}
  inputEl.value='';if(nameEl)nameEl.value='';
  if(parentId){const form=document.getElementById('rf-'+parentId);if(form)form.classList.remove('open');}
  showToast(lang==='en'?'💬 Comment posted':'💬 コメントしました');
  await loadComments();
}

    // 既存画像プレビュー
    editPhotoUrls=[...(currentPost.image_urls||[])];

    renderEditPhotoPreviews();
    document.getElementById('edit-step2').style.display='block';
    if(isMaster)showToast('🔑 管理者としてログインしました');
  }else{
    document.getElementById('pin-err').textContent='❌ パスワードが違います';
    ['pin1','pin2','pin3','pin4'].forEach(id=>{document.getElementById(id).value='';});
    document.getElementById('pin1').focus();
  }
}

async function handleEditPhotos(e){
  const files=Array.from(e.target.files);
  const max=3-(editPhotoUrls.length+editNewPhotos.length);
  if(max<=0){showToast('⚠️ 最大3枚まで');e.target.value='';return;}
  for(const f of files.slice(0,max)){
    const compressed=await compressEditImage(f);
    editNewPhotos.push(compressed);
    renderEditPhotoPreviews();
  }
  e.target.value='';
}
function compressEditImage(file){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let{width,height}=img;const MAX=1280;
        if(width>MAX||height>MAX){const ratio=Math.min(MAX/width,MAX/height);width=Math.round(width*ratio);height=Math.round(height*ratio);}
        const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;
        canvas.getContext('2d').drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg',0.82));
      };img.src=ev.target.result;
    };r.readAsDataURL(file);
  });
}
async function uploadEditPhoto(b64){
  const byteStr=atob(b64.split(',')[1]);
  const mime=b64.split(',')[0].split(':')[1].split(';')[0];
  const ab=new ArrayBuffer(byteStr.length);const ia=new Uint8Array(ab);
  for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
  const blob=new Blob([ab],{type:mime});
  const fn='posts/'+Date.now()+'_edit.'+(mime.includes('png')?'png':'jpg');
  const{error}=await sb.storage.from('post-images').upload(fn,blob,{contentType:mime});
  if(error)return null;
  const{data:u}=sb.storage.from('post-images').getPublicUrl(fn);
  return u.publicUrl;
}
async function saveEdit(){

  if(!title){showToast('タイトルを入力してください');return;}
  // 機材はサジェスト入力から取得

  let newUrls=[];

  }

}

// ── 画像エディター（編集モーダル用）
let editorCanvas=null,editorCtx=null,editorImage=null;
let editorNumbers=[],editorMode='normal';
let cropStart=null,cropBox={x:0,y:0,w:0,h:0},cropActive=false,cropDragging=false,cropHandleDrag=null;
let isDraggingNum=false,dragNumIdx=-1,dragOffX=0,dragOffY=0,dragMoved=false;
let currentStickerSize='large';
const DEFAULT_STICKER_SIZE=20;

function getStickerSize(){return currentStickerSize==='large'?20:currentStickerSize==='medium'?15:10;}
function cycleStickerSize(){
  currentStickerSize=currentStickerSize==='large'?'medium':currentStickerSize==='medium'?'small':'large';
  editorNumbers.forEach(n=>n.size=getStickerSize());
  drawEditor();renderEditorToolbar();
}
function stickerSizeLabel(){return currentStickerSize==='large'?'大':'medium'===currentStickerSize?'中':'小';}
function getStickerPosition(num,canvasW,canvasH){
  const cols=6;const idx=num-1;const row=Math.floor(idx/cols);const colInRow=idx%cols;
  const col=(cols-1)-colInRow;const cellW=canvasW/cols;
  const totalRows=Math.ceil(24/cols);const cellH=canvasH/Math.max(totalRows,4);const margin=DEFAULT_STICKER_SIZE+4;
  return{x:Math.min(canvasW-margin,Math.max(margin,cellW*(col+0.5))),y:Math.min(canvasH-margin,Math.max(margin,cellH*(row+0.5)))};
}

function openEditImgEditor(target,idx){
  editImgEditorTarget=target;editImgEditorTargetIdx=idx;
  editorNumbers=[];editorMode='normal';
  cropStart=null;cropBox={x:0,y:0,w:0,h:0};cropActive=false;cropDragging=false;cropHandleDrag=null;
  document.getElementById('img-tab-bar').innerHTML='';
  document.getElementById('img-editor-bd').classList.add('open');

function loadEditorImage(src){
  const canvas=document.getElementById('editor-canvas');
  const wrap=document.getElementById('canvas-wrap');
  editorCanvas=canvas;editorCtx=canvas.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    editorImage=img;
    const maxW=wrap.clientWidth||360;const maxH=wrap.clientHeight||400;
    const scale=Math.min(maxW/img.width,maxH/img.height,1);
    canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
    drawEditor();renderEditorToolbar();
  };img.src=src;
}
function drawEditor(){
  if(!editorCtx||!editorImage)return;
  const c=editorCanvas,ctx=editorCtx;
  ctx.clearRect(0,0,c.width,c.height);
  ctx.drawImage(editorImage,0,0,c.width,c.height);
  if(editorMode==='crop'&&cropActive){
    ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,c.width,c.height);
    ctx.clearRect(cropBox.x,cropBox.y,cropBox.w,cropBox.h);
    ctx.drawImage(editorImage,cropBox.x/c.width*editorImage.naturalWidth,cropBox.y/c.height*editorImage.naturalHeight,
      cropBox.w/c.width*editorImage.naturalWidth,cropBox.h/c.height*editorImage.naturalHeight,
      cropBox.x,cropBox.y,cropBox.w,cropBox.h);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([]);ctx.strokeRect(cropBox.x,cropBox.y,cropBox.w,cropBox.h);
    [{x:cropBox.x,y:cropBox.y},{x:cropBox.x+cropBox.w,y:cropBox.y},{x:cropBox.x,y:cropBox.y+cropBox.h},{x:cropBox.x+cropBox.w,y:cropBox.y+cropBox.h}].forEach(h=>{
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(h.x,h.y,8,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#e8552d';ctx.lineWidth=2;ctx.stroke();
    });ctx.setLineDash([]);
  }
  editorNumbers.forEach(n=>{
    const r=n.size||DEFAULT_STICKER_SIZE;
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.95)';ctx.fill();
    ctx.strokeStyle='#e8552d';ctx.lineWidth=2.5;ctx.stroke();
    ctx.fillStyle='#111';
    const fs=Math.max(10,Math.round(r*0.65));
    ctx.font='bold '+fs+'px JetBrains Mono,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.num,n.x,n.y);
  });
}
function renderEditorToolbar(){

      +'<button class="editor-tool-btn" onclick="rotateImage()"><span class="editor-tool-icon">🔄</span>回転</button>'
      +'<button class="editor-tool-btn" onclick="enterNumberMode()" style="background:var(--ac);color:#fff;border-color:var(--ac);font-weight:700"><span class="editor-tool-icon">➕</span>番号を追加</button>'
      +'<button class="editor-tool-btn" onclick="showEditorMenu(this)" style="min-width:44px"><span class="editor-tool-icon" style="font-size:22px">⋯</span></button>'
      +'<button class="editor-done-btn" onclick="finishEditPhoto()"><span class="editor-done-icon">✅</span>完了</button>';
    if(hint)hint.textContent=editorMode==='crop'?'ドラッグしてトリミング範囲を選択':'「番号を追加」で機材に番号をつけられます';
  }else if(editorMode==='number'){
    toolbar.innerHTML=
      '<button class="editor-tool-btn" onclick="exitNumberMode()" style="flex:0 0 auto"><span class="editor-tool-icon">◀</span>← 戻る</button>'
      +'<button class="editor-tool-btn" onclick="addNumberSticker()" style="background:var(--ac);color:#fff;border-color:var(--ac);font-weight:700"><span class="editor-tool-icon">➕</span>番号を追加</button>'
      +'<button class="editor-tool-btn" onclick="cycleStickerSize()" style="min-width:48px;font-family:JetBrains Mono,monospace;font-size:10px;font-weight:700">'+stickerSizeLabel()+'</button>'
      +'<div style="flex:1;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:9px;color:var(--tm)">'+editorNumbers.length+' 個</div>'
      +'<button class="editor-done-btn" onclick="finishEditPhoto()"><span class="editor-done-icon">✅</span>完了</button>';
    if(hint)hint.textContent='ドラッグで移動・タップで削除';
  }
}
function enterCropMode(){editorMode=editorMode==='crop'?'normal':'crop';cropActive=false;cropStart=null;cropBox={x:0,y:0,w:0,h:0};renderEditorToolbar();drawEditor();}
function enterNumberMode(){editorMode='number';addNumberSticker();renderEditorToolbar();}
function exitNumberMode(){editorMode='normal';renderEditorToolbar();drawEditor();}
function showEditorMenu(btn){

    +'<div onclick="removeAllNumbers();closeEditorMenu()" style="padding:12px 16px;font-family:JetBrains Mono,monospace;font-size:10px;font-weight:600;cursor:pointer;color:#e05050">🗑 番号をすべて削除</div>';

function closeEditorMenu(){const m=document.getElementById('editor-menu');if(m)m.remove();}
function closeEditorMenuOnce(){closeEditorMenu();}
function removeAllNumbers(){editorNumbers=[];drawEditor();renderEditorToolbar();showToast('番号をすべて削除しました');}
function addNumberSticker(){
  if(!editorCanvas)return;
  const num=editorNumbers.length+1;
  const pos=getStickerPosition(num,editorCanvas.width,editorCanvas.height);
  editorNumbers.push({x:pos.x,y:pos.y,num,size:getStickerSize()});
  drawEditor();showToast('番号 '+num+' を追加しました');
  if(editorMode==='number')renderEditorToolbar();
}
function updateToolUI(){}
function resetAllEdits(){
  editorNumbers=[];cropBox={x:0,y:0,w:0,h:0};cropActive=false;cropStart=null;editorMode='normal';
  const src=editImgEditorTarget==='url'?editPhotoUrls[editImgEditorTargetIdx]:editNewPhotos[editImgEditorTargetIdx];
  loadEditorImage(src);renderEditorToolbar();showToast('↩️ リセットしました');
}
function resetEdits(){resetAllEdits();}
function rotateImage(){
  if(!editorImage)return;
  const canvas=document.createElement('canvas');
  canvas.width=editorImage.naturalHeight;canvas.height=editorImage.naturalWidth;
  const ctx=canvas.getContext('2d');
  ctx.translate(canvas.width/2,canvas.height/2);ctx.rotate(Math.PI/2);
  ctx.drawImage(editorImage,-editorImage.naturalWidth/2,-editorImage.naturalHeight/2);
  const rotated=canvas.toDataURL('image/jpeg',0.92);
  if(editImgEditorTarget==='url'){
    // URL画像を回転した場合は新規扱いに変換してeditNewPhotosへ
    editPhotoUrls.splice(editImgEditorTargetIdx,1);
    editNewPhotos.unshift(rotated);
    editImgEditorTarget='new';editImgEditorTargetIdx=0;
  }else{
    editNewPhotos[editImgEditorTargetIdx]=rotated;
  }
  editorNumbers=[];cropBox={x:0,y:0,w:0,h:0};cropActive=false;
  loadEditorImage(rotated);showToast('🔄 90度回転しました');
}
function finishEditPhoto(){
  if(!editorCanvas||!editorImage){document.getElementById('img-editor-bd').classList.remove('open');document.body.style.overflow='hidden';return;}
  const c=editorCanvas;let sx=0,sy=0,sw=editorImage.naturalWidth,sh=editorImage.naturalHeight;
  if(cropActive&&cropBox.w>10&&cropBox.h>10){
    const scaleX=editorImage.naturalWidth/c.width;const scaleY=editorImage.naturalHeight/c.height;
    sx=cropBox.x*scaleX;sy=cropBox.y*scaleY;sw=cropBox.w*scaleX;sh=cropBox.h*scaleY;
  }
  const out=document.createElement('canvas');out.width=Math.round(sw);out.height=Math.round(sh);
  const ctx=out.getContext('2d');ctx.drawImage(editorImage,sx,sy,sw,sh,0,0,out.width,out.height);
  editorNumbers.forEach(n=>{
    const realX=n.x/c.width*editorImage.naturalWidth-sx;
    const realY=n.y/c.height*editorImage.naturalHeight-sy;
    if(realX<0||realY<0||realX>sw||realY>sh)return;
    const r=Math.round((n.size||DEFAULT_STICKER_SIZE)/c.width*editorImage.naturalWidth);
    const fs=Math.max(10,Math.round(r*0.65));
    ctx.beginPath();ctx.arc(realX,realY,r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.95)';ctx.fill();
    ctx.strokeStyle='#e8552d';ctx.lineWidth=Math.max(2,Math.round(r*0.1));ctx.stroke();
    ctx.fillStyle='#111';ctx.font='bold '+fs+'px JetBrains Mono,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.num,realX,realY);
  });
  const result=out.toDataURL('image/jpeg',0.92);
  if(editImgEditorTarget==='url'){
    // URL画像を編集した場合は新規扱いに変換
    editPhotoUrls.splice(editImgEditorTargetIdx,1);
    editNewPhotos.unshift(result);
  }else{
    editNewPhotos[editImgEditorTargetIdx]=result;
  }
  document.getElementById('img-editor-bd').classList.remove('open');
  document.body.style.overflow='hidden';
  renderEditPhotoPreviews();showToast('✅ 編集を保存しました');
}

function getCanvasPos(touch){
  const rect=editorCanvas.getBoundingClientRect();
  const scaleX=editorCanvas.width/rect.width;const scaleY=editorCanvas.height/rect.height;
  return{x:(touch.clientX-rect.left)*scaleX,y:(touch.clientY-rect.top)*scaleY};
}
function getTouchDist(t1,t2){return Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);}
function getCropHandle(pos){
  if(!cropActive)return null;
  const handles=[{id:'tl',x:cropBox.x,y:cropBox.y},{id:'tr',x:cropBox.x+cropBox.w,y:cropBox.y},{id:'bl',x:cropBox.x,y:cropBox.y+cropBox.h},{id:'br',x:cropBox.x+cropBox.w,y:cropBox.y+cropBox.h}];
  return handles.find(h=>Math.hypot(h.x-pos.x,h.y-pos.y)<20)||null;
}
function canvasPointerDown(e){
  e.preventDefault();
  if(e.touches&&e.touches.length===2)return;
  const touch=e.touches?e.touches[0]:e;const pos=getCanvasPos(touch);dragMoved=false;
  if(editorMode==='number'){
    const hit=editorNumbers.findIndex(n=>Math.hypot(n.x-pos.x,n.y-pos.y)<(n.size||DEFAULT_STICKER_SIZE)+8);
    if(hit>=0){isDraggingNum=true;dragNumIdx=hit;dragOffX=pos.x-editorNumbers[hit].x;dragOffY=pos.y-editorNumbers[hit].y;}
    else isDraggingNum=false;
  }else if(editorMode==='crop'){
    const handle=getCropHandle(pos);
    if(handle){cropHandleDrag=handle;cropDragging=true;}
    else if(cropActive&&pos.x>=cropBox.x&&pos.x<=cropBox.x+cropBox.w&&pos.y>=cropBox.y&&pos.y<=cropBox.y+cropBox.h){cropHandleDrag={id:'move'};cropDragging=true;dragOffX=pos.x-cropBox.x;dragOffY=pos.y-cropBox.y;}
    else{cropStart=pos;cropDragging=true;cropHandleDrag=null;cropActive=false;}
  }
}
function canvasPointerMove(e){
  e.preventDefault();if(!editorCanvas)return;
  if(e.touches&&e.touches.length===2)return;
  const touch=e.touches?e.touches[0]:e;const pos=getCanvasPos(touch);const c=editorCanvas;
  if(editorMode==='number'&&isDraggingNum&&dragNumIdx>=0){
    editorNumbers[dragNumIdx].x=Math.max(10,Math.min(c.width-10,pos.x-dragOffX));
    editorNumbers[dragNumIdx].y=Math.max(10,Math.min(c.height-10,pos.y-dragOffY));
    dragMoved=true;drawEditor();
  }else if(editorMode==='crop'&&cropDragging){
    if(cropHandleDrag){
      const id=cropHandleDrag.id;
      if(id==='move'){cropBox.x=Math.max(0,Math.min(c.width-cropBox.w,pos.x-dragOffX));cropBox.y=Math.max(0,Math.min(c.height-cropBox.h,pos.y-dragOffY));}
      else{let{x,y,w,h}=cropBox;
        if(id==='tl'){const nx=Math.min(pos.x,x+w-20);const ny=Math.min(pos.y,y+h-20);w=x+w-nx;h=y+h-ny;x=nx;y=ny;}
        else if(id==='tr'){w=Math.max(20,pos.x-x);const ny=Math.min(pos.y,y+h-20);h=y+h-ny;y=ny;}
        else if(id==='bl'){const nx=Math.min(pos.x,x+w-20);w=x+w-nx;x=nx;h=Math.max(20,pos.y-y);}
        else if(id==='br'){w=Math.max(20,pos.x-x);h=Math.max(20,pos.y-y);}
        cropBox={x:Math.max(0,x),y:Math.max(0,y),w:Math.min(c.width-x,w),h:Math.min(c.height-y,h)};
      }
    }else if(cropStart){
      const x=Math.min(cropStart.x,pos.x);const y=Math.min(cropStart.y,pos.y);
      cropBox={x:Math.max(0,x),y:Math.max(0,y),w:Math.min(c.width-x,Math.abs(pos.x-cropStart.x)),h:Math.min(c.height-y,Math.abs(pos.y-cropStart.y))};cropActive=true;
    }
    dragMoved=true;drawEditor();
  }
}
function canvasPointerUp(e){
  e.preventDefault();
  if(e.touches&&e.touches.length>=2)return;
  if(editorMode==='number'){
    if(isDraggingNum&&!dragMoved&&dragNumIdx>=0){editorNumbers.splice(dragNumIdx,1);editorNumbers.forEach((n,i)=>n.num=i+1);showToast('番号を削除しました');drawEditor();}
    isDraggingNum=false;dragNumIdx=-1;dragMoved=false;
  }else if(editorMode==='crop'){
    cropDragging=false;if(cropBox.w>10&&cropBox.h>10)cropActive=true;else cropActive=false;
    cropHandleDrag=null;cropStart=null;drawEditor();
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    const c=document.getElementById('editor-canvas');if(!c)return;
    c.addEventListener('mousedown',canvasPointerDown);
    c.addEventListener('mousemove',canvasPointerMove);
    c.addEventListener('mouseup',canvasPointerUp);
    c.addEventListener('touchstart',canvasPointerDown,{passive:false});
    c.addEventListener('touchmove',canvasPointerMove,{passive:false});
    c.addEventListener('touchend',canvasPointerUp,{passive:false});
  },500);
});

// ── 通報
let selectedReason='';
function openReport(){document.getElementById('report-bd').classList.add('open');}
function selectReport(el,reason){selectedReason=reason;document.querySelectorAll('.report-opt').forEach(o=>o.classList.remove('on'));el.classList.add('on');}
function submitReport(){if(!selectedReason){showToast('⚠️ 理由を選択してください');return;}closeModal('report-bd');showToast('🚩 通報を受け付けました');selectedReason='';document.querySelectorAll('.report-opt').forEach(o=>o.classList.remove('on'));}

function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}
function closeOnBd(e,id){if(e.target===document.getElementById(id))closeModal(id);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

['pin1','pin2','pin3','pin4'].forEach((id,i,arr)=>{
  const el=document.getElementById(id);
  el.addEventListener('input',()=>{if(el.value&&i<arr.length-1)document.getElementById(arr[i+1]).focus();if(el.value&&i===arr.length-1)verifyPin();});
  el.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!el.value&&i>0)document.getElementById(arr[i-1]).focus();});
});

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('edit-bd');closeModal('report-bd');}});
document.addEventListener('DOMContentLoaded',()=>{loadPost();});
</script>
