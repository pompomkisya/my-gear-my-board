<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Gear My Board</title>
<meta property="og:title" content="My Gear My Board">
<meta property="og:description" content="ペダルボード・機材を投稿・共有するSNS">
<meta property="og:image" content="">
<meta property="og:url" content="">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0e;--sf:#151517;--sf2:#1c1c1f;--bd:#272729;--ac:#e8552d;--ac2:#f0a500;--tx:#eae8e2;--tm:#78766f;--td:#3e3c3a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(232,85,45,.04) 0%,transparent 60%);pointer-events:none;z-index:0}

/* ─ HEADER ─ */
header{position:sticky;top:0;z-index:300;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(13,13,14,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd)}
.logo{display:flex;flex-direction:column;line-height:1;cursor:pointer}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--ac);text-transform:uppercase;margin-top:2px}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--tm);cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--ac);color:var(--ac)}
.lang-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--sf);border:1px solid var(--bd);border-radius:4px;font-size:14px;cursor:pointer;transition:all .15s}
.lang-btn:hover{border-color:var(--ac)}

/* ─ MAIN LAYOUT ─ */
.page{max-width:900px;margin:0 auto;padding:32px 20px;position:relative;z-index:1}

/* ─ SLIDER ─ */
.slider{position:relative;background:var(--sf2);border-radius:8px;overflow:hidden;margin-bottom:24px;border:1px solid var(--bd)}
.slide{min-width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
.slide img{width:100%;height:100%;object-fit:contain;background:#000}
.slide-track{display:flex;transition:transform .35s cubic-bezier(.25,.46,.45,.94)}
.s-btn{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;background:rgba(13,13,14,.75);border:1px solid var(--bd);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--tx);transition:all .15s;z-index:10}
.s-btn:hover{background:var(--ac);border-color:var(--ac)}
.s-btn.prev{left:12px}.s-btn.next{right:12px}
.s-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.s-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .2s}
.s-dot.on{background:#fff;transform:scale(1.2)}
.no-img{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:60px;opacity:.15;margin-bottom:24px;background:var(--sf);border-radius:8px;border:1px solid var(--bd)}

/* ─ META ─ */
.meta{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:2px solid var(--bd);flex-shrink:0;background:linear-gradient(135deg,#e85c2f,#b03020)}
.meta-info{flex:1}
.meta-name{font-size:14px;font-weight:500}
.meta-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);margin-top:2px}
.edit-btn-wrap{margin-left:auto}
.edit-icon-btn{width:34px;height:34px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--tm);transition:all .15s}
.edit-icon-btn:hover{border-color:var(--ac);color:var(--ac)}
.post-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;line-height:1.2;margin-bottom:16px}
.type-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.type-badge.board{background:rgba(232,85,45,.12);color:var(--ac);border:1px solid rgba(232,85,45,.25)}
.type-badge.gear{background:#1a3a1a;color:#6aba6a;border:1px solid #2a5a2a}

/* ─ ACTION BUTTONS ─ */
.actions{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;border:1px solid var(--bd);background:var(--sf);color:var(--tm)}
.act-btn:hover{border-color:var(--ac);color:var(--ac)}
.act-btn.liked{color:var(--ac);border-color:rgba(232,85,45,.4)}
.act-btn.edit-act{color:var(--ac2);border-color:rgba(240,165,0,.3)}
.act-btn.report-act{color:#e05050;border-color:rgba(224,80,80,.3)}

/* ─ SECTION ─ */
.section{border-top:1px solid var(--bd);padding-top:20px;margin-top:20px}
.section-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--td);margin-bottom:12px}

/* ─ GEAR LIST ─ */
.gear-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;margin-bottom:6px;transition:border-color .15s}
.gear-item:hover{border-color:rgba(232,85,45,.3)}
.gear-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0;margin-right:10px}
.gear-name{font-size:13px;font-weight:400;flex:1}
.sh-link{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:600;letter-spacing:.5px;color:var(--ac);text-decoration:none;padding:4px 10px;border:1px solid rgba(232,85,45,.3);border-radius:3px;white-space:nowrap;transition:all .15s}
.sh-link:hover{background:rgba(232,85,45,.1);border-color:var(--ac)}

/* ─ GENRES ─ */
.genre-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.gtag{padding:4px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tm)}

/* ─ DESCRIPTION ─ */
.desc{font-size:13.5px;line-height:1.8;color:var(--tm);white-space:pre-wrap}
.desc-toggle{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ac);cursor:pointer;margin-top:8px;display:inline-block}

/* ─ COMMENTS ─ */
.comment-input-wrap{display:flex;gap:8px;margin-bottom:20px;align-items:flex-start}
.comment-input{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:10px 12px;font-size:16px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;resize:none;min-height:44px;transition:border-color .15s}
.comment-input:focus{border-color:var(--ac)}
.comment-input::placeholder{color:var(--td)}
.comment-submit{padding:10px 16px;background:var(--ac);border:none;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}
.comment-submit:hover{background:#cf4c26}
.comment{padding:14px 0;border-bottom:1px solid var(--bd)}
.comment:last-child{border-bottom:none}
.c-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.c-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:linear-gradient(135deg,#e85c2f,#b03020);flex-shrink:0}
.c-name{font-size:12px;font-weight:500}
.c-time{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--td);margin-left:auto}
.c-body{font-size:13px;line-height:1.65;color:var(--tm);padding-left:36px}
.c-reply-btn{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);cursor:pointer;margin-top:6px;padding-left:36px;transition:color .15s;display:inline-block}
.c-reply-btn:hover{color:var(--ac)}
.c-mention{color:var(--ac);font-weight:500}
.reply-indent{padding-left:28px;border-left:2px solid var(--bd);margin-top:8px}
.reply-form{padding-left:36px;margin-top:8px;display:none}
.reply-form.open{display:flex;gap:6px}
.reply-input{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;padding:7px 10px;font-size:14px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s}
.reply-input:focus{border-color:var(--ac)}
.reply-submit{padding:7px 12px;background:var(--ac);border:none;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sf);border:1px solid var(--bd);border-radius:4px;padding:10px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─ EDIT MODAL ─ */
.ebd{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(6px);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .22s}
.ebd.open{opacity:1;pointer-events:all}
.eform{background:var(--sf);border:1px solid var(--bd);border-radius:8px;width:100%;max-width:460px;padding:28px;position:relative;transform:scale(.94) translateY(10px);transition:transform .24s;max-height:90vh;overflow-y:auto}
.ebd.open .eform{transform:scale(1) translateY(0)}
.eform-close{position:absolute;top:14px;right:14px;width:28px;height:28px;background:var(--sf2);border:1px solid var(--bd);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--tm);transition:all .15s}
.eform-close:hover{background:var(--ac);color:#fff;border-color:var(--ac)}
.eform-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:6px}
.eform-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);letter-spacing:1px;margin-bottom:20px}
.pin-row{display:flex;gap:8px;justify-content:center;margin:12px 0 18px}
.pin-d{width:56px;height:62px;background:var(--sf2);border:2px solid var(--bd);border-radius:6px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;color:var(--tx);outline:none;transition:border-color .15s;caret-color:var(--ac)}
.pin-d:focus{border-color:var(--ac)}
.pin-err{font-family:'JetBrains Mono',monospace;font-size:10px;color:#e05050;text-align:center;min-height:16px;margin-bottom:6px}
.form-row{margin-bottom:14px}
.form-lbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:#9a9890;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;padding:9px 12px;font-size:16px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--ac)}
textarea.form-input{resize:vertical;min-height:80px}
.submit-btn{width:100%;background:var(--ac);border:none;border-radius:4px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .18s;margin-top:4px}
.submit-btn:hover{background:#cf4c26}
.del-btn{width:100%;background:transparent;border:1px solid #5a1a1a;border-radius:4px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#e05050;cursor:pointer;transition:all .18s;margin-top:6px}
.del-btn:hover{background:rgba(224,80,80,.1);border-color:#e05050}

/* ─ REPORT MODAL ─ */
.report-bd{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .22s}
.report-bd.open{opacity:1;pointer-events:all}
.report-form{background:var(--sf);border:1px solid var(--bd);border-radius:8px;width:100%;max-width:400px;padding:24px;position:relative}
.report-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:14px}
.report-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.report-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;cursor:pointer;font-size:12px;transition:all .15s}
.report-opt:hover{border-color:rgba(224,80,80,.4);color:#e05050}
.report-opt.on{border-color:#e05050;background:rgba(224,80,80,.08);color:#e05050}
.report-submit{width:100%;background:#c03030;border:none;border-radius:4px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#fff;cursor:pointer;transition:background .15s}
.report-submit:hover{background:#a02020}
.report-close{position:absolute;top:14px;right:14px;width:26px;height:26px;background:var(--sf2);border:1px solid var(--bd);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--tm)}
.report-close:hover{background:var(--ac);color:#fff;border-color:var(--ac)}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

@media(max-width:600px){
  .page{padding:16px 14px}
  .post-title{font-size:22px}
  .actions{gap:6px}
  .act-btn{padding:7px 12px;font-size:8px}
  .sh-link{font-size:8px;padding:3px 8px}
}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="goBack()">
    <div class="logo-main">My Gear My Board</div>
    <div class="logo-sub" id="logo-sub">ペダルボードSNS · Japan</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="back-btn" onclick="goBack()">← <span data-i="back">ボード一覧へ</span></div>
    <div class="lang-btn" onclick="toggleLang()" title="EN / JA">🌐</div>
  </div>
</header>

<div class="page" id="page-content">
  <div style="text-align:center;padding:60px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--td)">読み込み中...</div>
</div>

<!-- EDIT MODAL -->
<div class="ebd" id="edit-bd" onclick="closeOnBd(event,'edit-bd')">
  <div class="eform">
    <div class="eform-close" onclick="closeModal('edit-bd')">✕</div>
    <div id="edit-step1">
      <div class="eform-title" data-i="edit_title">記事を編集・削除</div>
      <div class="eform-sub" data-i="edit_sub">投稿時に設定した4桁パスワードを入力してください</div>
      <div class="pin-row">
        <input class="pin-d" id="pin1" type="password" inputmode="numeric" maxlength="1">
        <input class="pin-d" id="pin2" type="password" inputmode="numeric" maxlength="1">
        <input class="pin-d" id="pin3" type="password" inputmode="numeric" maxlength="1">
        <input class="pin-d" id="pin4" type="password" inputmode="numeric" maxlength="1">
      </div>
      <div class="pin-err" id="pin-err"></div>
      <button class="submit-btn" onclick="verifyPin()" data-i="verify_btn">確認する</button>
    </div>
    <div id="edit-step2" style="display:none">
      <div class="eform-title" data-i="edit_title2">記事を編集</div>
      <div class="eform-sub" style="color:#4caf50">✅ <span data-i="auth_ok">パスワード認証が完了しました</span></div>
      <div class="form-row" style="margin-top:16px">
        <label class="form-lbl" data-i="lbl_title">タイトル</label>
        <input class="form-input" id="edit-title" type="text">
      </div>
      <div class="form-row">
        <label class="form-lbl" data-i="lbl_pedals">使用機材（カンマ区切り）</label>
        <input class="form-input" id="edit-pedals" type="text">
      </div>
      <div class="form-row">
        <label class="form-lbl" data-i="lbl_desc">コメント・説明</label>
        <textarea class="form-input" id="edit-desc"></textarea>
      </div>
      <button class="submit-btn" onclick="saveEdit()" data-i="save_btn">変更を保存する</button>
      <button class="del-btn" onclick="confirmDelete()" data-i="del_btn">🗑 この投稿を削除する</button>
    </div>
  </div>
</div>

<!-- REPORT MODAL -->
<div class="report-bd" id="report-bd" onclick="closeOnBd(event,'report-bd')">
  <div class="report-form">
    <div class="report-close" onclick="closeModal('report-bd')">✕</div>
    <div class="report-title">通報する</div>
    <div class="report-opts" id="report-opts">
      <div class="report-opt" onclick="selectReport(this,'spam')">🚫 スパム・宣伝</div>
      <div class="report-opt" onclick="selectReport(this,'inappropriate')">⚠️ 不適切なコンテンツ</div>
      <div class="report-opt" onclick="selectReport(this,'copyright')">©️ 著作権侵害</div>
      <div class="report-opt" onclick="selectReport(this,'other')">💬 その他</div>
    </div>
    <button class="report-submit" onclick="submitReport()">通報を送信する</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://yzqfockzgyfjmngygbhp.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cWZvY2t6Z3lmam1uZ3lnYmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTYxODksImV4cCI6MjA4OTY3MjE4OX0.Cn4UMJ8y6CHuIMDeFEShej4t1p4syweLgo5ZXZNs-_g';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const MASTER_KEY='MSTR';

function getSessionId(){let s=localStorage.getItem('mgmb_sid');if(!s){s='sid_'+Math.random().toString(36).slice(2)+Date.now();localStorage.setItem('mgmb_sid',s);}return s;}
const SESSION_ID=getSessionId();

const params=new URLSearchParams(location.search);
const POST_ID=params.get('id');
let lang=params.get('lang')||'ja';
let currentPost=null;
let allComments=[];

const i18n={
  ja:{back:'ボード一覧へ',logo_sub:'ペダルボードSNS · Japan',like:'いいね',share:'シェア',edit:'編集',report:'通報',gear_section:'使用機材リスト',comment_section:'コメント',comment_ph:'コメントを投稿する...',comment_btn:'投稿',reply:'返信',sh_link:'サウンドハウスで見る →',no_comment:'まだコメントはありません。最初のコメントを書いてみましょう！',edit_title:'記事を編集・削除',edit_sub:'投稿時に設定した4桁パスワードを入力してください',edit_title2:'記事を編集',auth_ok:'パスワード認証が完了しました',verify_btn:'確認する',save_btn:'変更を保存する',del_btn:'🗑 この投稿を削除する',lbl_title:'タイトル',lbl_pedals:'使用機材（カンマ区切り）',lbl_desc:'コメント・説明',type_board:'エフェクターボード',type_gear:'機材'},
  en:{back:'Back to List',logo_sub:'Pedalboard SNS · Japan',like:'Like',share:'Share',edit:'Edit',report:'Report',gear_section:'Gear List',comment_section:'Comments',comment_ph:'Add a comment...',comment_btn:'Post',reply:'Reply',sh_link:'View on Soundhouse →',no_comment:'No comments yet. Be the first to comment!',edit_title:'Edit / Delete Post',edit_sub:'Enter the 4-digit PIN you set when posting',edit_title2:'Edit Post',auth_ok:'Authentication successful',verify_btn:'Verify',save_btn:'Save Changes',del_btn:'🗑 Delete this post',lbl_title:'Title',lbl_pedals:'Gear (comma separated)',lbl_desc:'Comment / Description',type_board:'Pedalboard',type_gear:'Gear'}
};
function t(k){return(i18n[lang]&&i18n[lang][k])||i18n.ja[k]||k;}
function applyLang(){
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i');
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')el.placeholder=t(k);
    else el.textContent=t(k);
  });
  const ls=document.getElementById('logo-sub');if(ls)ls.textContent=t('logo_sub');
}
function toggleLang(){lang=lang==='ja'?'en':'ja';applyLang();if(currentPost)renderPost(currentPost);}

function goBack(){location.href='/'+(lang==='en'?'?lang=en':'');}

// サウンドハウス検索URL生成
function soundhouseUrl(name){
  return'https://www.soundhouse.co.jp/search/index?search_all='+encodeURIComponent(name);
}

async function loadPost(){
  if(!POST_ID){document.getElementById('page-content').innerHTML='<div style="text-align:center;padding:60px;color:var(--td);font-family:JetBrains Mono,monospace">投稿が見つかりません</div>';return;}
  const{data,error}=await sb.from('posts').select('*').eq('id',POST_ID).single();
  if(error||!data){document.getElementById('page-content').innerHTML='<div style="text-align:center;padding:60px;color:var(--td);font-family:JetBrains Mono,monospace">投稿が見つかりません</div>';return;}
  currentPost=data;
  // OGP更新
  document.title=data.title+' — My Gear My Board';
  document.querySelector('meta[property="og:title"]').setAttribute('content',data.title);
  if(data.image_urls&&data.image_urls[0])document.querySelector('meta[property="og:image"]').setAttribute('content',data.image_urls[0]);
  renderPost(data);
  loadComments();
}

function renderPost(p){
  const isGear=p.post_type==='gear';
  const imgs=p.image_urls||[];
  const gear=Array.isArray(p.gear_list)?p.gear_list:[];
  const genres=Array.isArray(p.genre)?p.genre:(p.genre?[p.genre]:[]);
  const init=(p.username||'匿')[0].toUpperCase();

  // いいね済み確認
  const liked=localStorage.getItem('liked_'+p.id)==='1';

  let html='';

  // 画像スライダー
  if(imgs.length){
    html+='<div class="slider"><div class="slide-track" id="slide-track">';
    imgs.forEach(u=>html+='<div class="slide"><img src="'+u+'" loading="lazy"></div>');
    html+='</div>';
    if(imgs.length>1){
      html+='<div class="s-btn prev" onclick="slide(-1)">‹</div>';
      html+='<div class="s-btn next" onclick="slide(1)">›</div>';
      html+='<div class="s-dots">';
      imgs.forEach((_,i)=>html+='<div class="s-dot'+(i===0?' on':'')+'" onclick="goSlide('+i+')"></div>');
      html+='</div>';
    }
    html+='</div>';
  }else{
    html+='<div class="no-img">'+(isGear?'🎸':'🎛')+'</div>';
  }

  // タイプバッジ
  html+='<div class="type-badge '+(isGear?'gear':'board')+'">'+(isGear?t('type_gear'):t('type_board'))+'</div>';

  // メタ
  html+='<div class="meta">'
    +'<div class="av">'+init+'</div>'
    +'<div class="meta-info"><div class="meta-name">'+(p.username||(lang==='en'?'Anonymous':'匿名ユーザー'))+'</div>'
    +'<div class="meta-time">'+timeAgo(p.created_at)+'</div></div>'
    +'<div class="edit-btn-wrap"><div class="edit-icon-btn" onclick="openEditModal()" title="'+(lang==='en'?'Edit':'編集')+'">[ ]</div></div>'
    +'</div>';

  // タイトル
  html+='<div class="post-title">'+p.title+'</div>';

  // アクションボタン
  html+='<div class="actions">'
    +'<div class="act-btn'+(liked?' liked':'')+'" id="like-btn" onclick="toggleLike()">'
    +(liked?'❤️':'🤍')+' <span data-i="like">'+t('like')+'</span> <span id="like-count">'+(p.likes||0)+'</span></div>'
    +'<div class="act-btn" onclick="sharePost()">🔗 <span data-i="share">'+t('share')+'</span></div>'
    +'<div class="act-btn edit-act" onclick="openEditModal()">✏️ <span data-i="edit">'+t('edit')+'</span></div>'
    +'<div class="act-btn report-act" onclick="openReport()">🚩 <span data-i="report">'+t('report')+'</span></div>'
    +'</div>';

  // ジャンル
  if(genres.length){
    html+='<div class="genre-tags">'+genres.map(g=>'<span class="gtag">'+g+'</span>').join('')+'</div>';
  }

  // 使用機材リスト
  if(gear.length){
    html+='<div class="section"><div class="section-lbl" data-i="gear_section">'+t('gear_section')+'</div>';
    gear.forEach(g=>{
      const name=g.name||g;
      const shUrl=soundhouseUrl(name);
      html+='<div class="gear-item">'
        +'<div class="gear-dot"></div>'
        +'<div class="gear-name">'+name+'</div>'
        +'<a class="sh-link" href="'+shUrl+'" target="_blank" rel="noopener" title="サウンドハウスで見る">サウンドハウスで見る →</a>'
        +'</div>';
    });
    html+='</div>';
  }

  // 説明文
  if(p.description){
    const desc=p.description;
    const limit=200;
    html+='<div class="section">';
    if(desc.length>limit){
      html+='<div class="desc" id="desc-text">'+escHtml(desc.slice(0,limit))+'...</div>';
      html+='<span class="desc-toggle" onclick="expandDesc(\''+escHtml(desc).replace(/'/g,"\\'")+'\')" data-i-more>'+(lang==='en'?'Show more':'もっと見る')+'</span>';
    }else{
      html+='<div class="desc">'+escHtml(desc)+'</div>';
    }
    html+='</div>';
  }

  // コメント欄
  html+='<div class="section" id="comment-section">'
    +'<div class="section-lbl" data-i="comment_section">'+t('comment_section')+'</div>'
    +'<div class="comment-input-wrap">'
    +'<textarea class="comment-input" id="comment-input" placeholder="'+t('comment_ph')+'" rows="2"></textarea>'
    +'<button class="comment-submit" onclick="postComment(null)" data-i="comment_btn">'+t('comment_btn')+'</button>'
    +'</div>'
    +'<div id="comments-list"></div>'
    +'</div>';

  document.getElementById('page-content').innerHTML=html;
  applyLang();
  initSlider(imgs.length);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function expandDesc(full){
  const el=document.getElementById('desc-text');
  if(el)el.innerHTML=escHtml(full);
  const toggle=document.querySelector('[data-i-more]');
  if(toggle)toggle.style.display='none';
}

function timeAgo(ts){
  const d=Math.floor((Date.now()-new Date(ts))/1000);
  if(lang==='en'){if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}
  if(d<60)return'たった今';if(d<3600)return Math.floor(d/60)+'分前';if(d<86400)return Math.floor(d/3600)+'時間前';return Math.floor(d/86400)+'日前';
}

// スライダー
let slideIdx=0;
function initSlider(count){slideIdx=0;if(count<=1)return;}
function slide(dir){
  const imgs=currentPost.image_urls||[];
  if(imgs.length<=1)return;
  slideIdx=(slideIdx+dir+imgs.length)%imgs.length;
  goSlide(slideIdx);
}
function goSlide(i){
  const track=document.getElementById('slide-track');if(!track)return;
  slideIdx=i;
  track.style.transform='translateX(-'+i+'00%)';
  document.querySelectorAll('.s-dot').forEach((d,j)=>d.classList.toggle('on',j===i));
}

// いいね
async function toggleLike(){
  const btn=document.getElementById('like-btn');
  const cnt=document.getElementById('like-count');
  const liked=localStorage.getItem('liked_'+POST_ID)==='1';
  if(liked){
    await sb.from('likes').delete().eq('post_id',POST_ID).eq('session_id',SESSION_ID);
    const n=Math.max(0,(parseInt(cnt.textContent)||1)-1);
    await sb.from('posts').update({likes:n}).eq('id',POST_ID);
    cnt.textContent=n;btn.classList.remove('liked');btn.querySelector('span:first-child')||null;
    btn.innerHTML='🤍 <span data-i="like">'+t('like')+'</span> <span id="like-count">'+n+'</span>';
    localStorage.removeItem('liked_'+POST_ID);
  }else{
    await sb.from('likes').insert({post_id:POST_ID,session_id:SESSION_ID});
    const n=(parseInt(cnt.textContent)||0)+1;
    await sb.from('posts').update({likes:n}).eq('id',POST_ID);
    btn.innerHTML='❤️ <span data-i="like">'+t('like')+'</span> <span id="like-count">'+n+'</span>';
    btn.classList.add('liked');
    localStorage.setItem('liked_'+POST_ID,'1');
    showToast('❤️ いいねしました');
  }
}

// シェア
function sharePost(){
  if(navigator.share){navigator.share({title:currentPost.title,url:location.href});}
  else{navigator.clipboard.writeText(location.href);showToast('🔗 URLをコピーしました');}
}

// コメント
async function loadComments(){
  const{data}=await sb.from('comments').select('*').eq('post_id',POST_ID).order('created_at',{ascending:true});
  allComments=data||[];
  renderComments();
}

function renderComments(){
  const el=document.getElementById('comments-list');if(!el)return;
  const roots=allComments.filter(c=>!c.parent_id);
  if(!roots.length){el.innerHTML='<div style="font-size:13px;color:var(--td);padding:16px 0">'+t('no_comment')+'</div>';return;}
  el.innerHTML=roots.map(c=>renderComment(c,0)).join('');
}

function renderComment(c,depth){
  const init=(c.username||'匿')[0].toUpperCase();
  const children=allComments.filter(x=>x.parent_id===c.id);
  const mention=c.reply_to_name?'<span class="c-mention">@'+c.reply_to_name+'</span> ':'';
  let html='<div class="comment" id="c-'+c.id+'"'+(depth>0?' style="margin-left:0"':'')+'>'+
    '<div class="c-head"><div class="c-av">'+init+'</div>'+
    '<div class="c-name">'+(c.username||(lang==='en'?'Anonymous':'匿名ユーザー'))+'</div>'+
    '<div class="c-time">'+timeAgo(c.created_at)+'</div></div>'+
    '<div class="c-body">'+mention+escHtml(c.content)+'</div>'+
    '<span class="c-reply-btn" onclick="openReply(\''+c.id+'\',\''+escHtml(c.username||'匿名')+'\')">'+(lang==='en'?'↩ Reply':'↩ 返信')+'</span>'+
    '<div class="reply-form" id="rf-'+c.id+'">'+
    '<input class="reply-input" id="ri-'+c.id+'" placeholder="@'+(c.username||'匿名')+'への返信..." type="text">'+
    '<button class="reply-submit" onclick="postComment(\''+c.id+'\',\''+escHtml(c.username||'匿名')+'\')">'+(lang==='en'?'Post':'投稿')+'</button>'+
    '</div>';
  if(children.length){
    html+='<div class="reply-indent">'+children.map(ch=>renderComment(ch,depth+1)).join('')+'</div>';
  }
  html+='</div>';
  return html;
}

function openReply(parentId,name){
  document.querySelectorAll('.reply-form').forEach(f=>f.classList.remove('open'));
  const form=document.getElementById('rf-'+parentId);
  if(form){form.classList.add('open');document.getElementById('ri-'+parentId).focus();}
}

async function postComment(parentId,replyToName){
  const inputEl=parentId?document.getElementById('ri-'+parentId):document.getElementById('comment-input');
  const content=inputEl.value.trim();
  if(!content){showToast('❌ コメントを入力してください');return;}
  const username=lang==='en'?'Anonymous':'匿名ユーザー';
  const{error}=await sb.from('comments').insert({
    post_id:POST_ID,parent_id:parentId||null,
    username,content,reply_to_name:replyToName||null
  });
  if(error){showToast('❌ 投稿に失敗しました');return;}
  inputEl.value='';
  if(parentId){const form=document.getElementById('rf-'+parentId);if(form)form.classList.remove('open');}
  showToast('💬 コメントしました');
  await loadComments();
}

// 編集モーダル
function openEditModal(){
  ['pin1','pin2','pin3','pin4'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('pin-err').textContent='';
  document.getElementById('edit-step1').style.display='block';
  document.getElementById('edit-step2').style.display='none';
  document.getElementById('edit-bd').classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('pin1').focus(),300);
}

function verifyPin(){
  const entered=['pin1','pin2','pin3','pin4'].map(id=>document.getElementById(id).value).join('');
  if(entered.length<4){document.getElementById('pin-err').textContent='4桁すべて入力してください';return;}
  const isMaster=entered.toUpperCase()===MASTER_KEY;
  if(currentPost&&(isMaster||entered===currentPost.pin_hash)){
    document.getElementById('pin-err').textContent='';
    document.getElementById('edit-step1').style.display='none';
    document.getElementById('edit-title').value=currentPost.title||'';
    const gear=Array.isArray(currentPost.gear_list)?currentPost.gear_list:[];
    document.getElementById('edit-pedals').value=gear.map(g=>g.name||g).join(', ');
    document.getElementById('edit-desc').value=currentPost.description||'';
    document.getElementById('edit-step2').style.display='block';
    if(isMaster)showToast('🔑 管理者としてログインしました');
  }else{
    document.getElementById('pin-err').textContent='❌ パスワードが違います';
    ['pin1','pin2','pin3','pin4'].forEach(id=>{document.getElementById(id).value='';});
    document.getElementById('pin1').focus();
  }
}

async function saveEdit(){
  const title=document.getElementById('edit-title').value.trim();
  if(!title){showToast('タイトルを入力してください');return;}
  const gt=document.getElementById('edit-pedals').value.trim();
  const gear_list=gt?gt.split(',').map(s=>({name:s.trim()})).filter(g=>g.name):[];
  const description=document.getElementById('edit-desc').value.trim();
  const{error}=await sb.from('posts').update({title,gear_list,description}).eq('id',POST_ID);
  if(error){showToast('❌ 更新に失敗しました');return;}
  closeModal('edit-bd');showToast('✅ 投稿を更新しました');
  await loadPost();
}

async function confirmDelete(){
  if(!confirm('本当にこの投稿を削除しますか？\nこの操作は取り消せません。'))return;
  const{error}=await sb.from('posts').delete().eq('id',POST_ID);
  if(error){showToast('❌ 削除に失敗しました');return;}
  showToast('🗑 投稿を削除しました');
  setTimeout(()=>location.href='/',1500);
}

// 通報
let selectedReason='';
function openReport(){document.getElementById('report-bd').classList.add('open');}
function selectReport(el,reason){
  selectedReason=reason;
  document.querySelectorAll('.report-opt').forEach(o=>o.classList.remove('on'));
  el.classList.add('on');
}
function submitReport(){
  if(!selectedReason){showToast('⚠️ 理由を選択してください');return;}
  closeModal('report-bd');
  showToast('🚩 通報を受け付けました');
  selectedReason='';
  document.querySelectorAll('.report-opt').forEach(o=>o.classList.remove('on'));
}

function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}
function closeOnBd(e,id){if(e.target===document.getElementById(id))closeModal(id);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

['pin1','pin2','pin3','pin4'].forEach((id,i,arr)=>{
  const el=document.getElementById(id);
  el.addEventListener('input',()=>{if(el.value&&i<arr.length-1)document.getElementById(arr[i+1]).focus();if(el.value&&i===arr.length-1)verifyPin();});
  el.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!el.value&&i>0)document.getElementById(arr[i-1]).focus();});
});

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('edit-bd');closeModal('report-bd');}});
document.addEventListener('DOMContentLoaded',()=>{applyLang();loadPost();});
</script>
</body>
